      <div style="display:flex; gap:6px; margin-bottom:16px;">
        ${rangeBtn(7, '7 Days')} ${rangeBtn(30, '30 Days')} ${rangeBtn(0, 'All Time')}
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${filtered.length}</div><div class="stat-label">${rangeLabel}</div></div>
        <div class="stat"><div class="stat-num">${last7} <span style="font-size:14px;">${trend}</span></div><div class="stat-label">This Week</div></div>
        <div class="stat"><div class="stat-num">${last30}</div><div class="stat-label">This Month</div></div>
      </div>

      <div class="card">
        <div class="card-title">🏗️ Construction Stage Concentration <span style="font-weight:400; text-transform:none; color:var(--ink-dim);">(all ${allLeads.length} leads)</span></div>
        ${Core.CATEGORIES.map(c => barRow(`${c.icon} ${c.label}`, catCounts[c.key], catTotal)).join('')}
        ${noCat > 0 ? barRow('❓ Not Set', noCat, catTotal) : ''}
      </div>

      <div class="card">
        <div class="card-title">Pipeline Stage Breakdown <span style="font-weight:400; text-transform:none; color:var(--ink-dim);">(${rangeLabel})</span></div>
        ${activeSt.map(s => barRow(statusLabel(s), stCounts[s], stTotal)).join('')}
      </div>

      <div class="card">
        <div class="card-title">Lead Type <span style="font-weight:400; text-transform:none; color:var(--ink-dim);">(${rangeLabel})</span></div>
        ${barRow('🆕 New Site', newSite, filtered.length || 1)}
        ${barRow('🔄 Existing Client', existing, filtered.length || 1)}
      </div>

      <div class="card">
        <div class="card-title">Recently Added</div>
        ${recent.length ? recent.map(l => `
          <div style="padding:8px 0; border-bottom:1px solid var(--paper-dim); font-size:13px; display:flex; justify-content:space-between;">
            <span><b>${esc(l.company || l.name)}</b> <span class="badge ${(l.status || 'new').toLowerCase()}">${esc(l.status)}</span></span>
            <span class="hint">${fmtDate(l.created_at)}</span>
          </div>
        `).join('') : `<div class="empty">No leads in this range.</div>`}
      </div>
    `;
    document.querySelectorAll('.view-tab').forEach(b => b.onclick = () => { leadsView = b.dataset.view; render(); });
    document.querySelectorAll('.range-btn').forEach(b => b.onclick = () => { insightDays = Number(b.dataset.days); render(); });
  }

  function rangeBtn(days, label) {
    return `<button class="btn ${insightDays === days ? '' : 'ghost'} sm range-btn" data-days="${days}">${label}</button>`;
  }
  function barRow(label, count, total) {
    const pct = Math.round((count / (total || 1)) * 100);
    return `
      <div style="margin-bottom:10px;">
        <div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:3px;">
          <span>${label}</span><span style="color:var(--ink-dim);">${count} (${pct}%)</span>
        </div>
        <div style="height:6px; background:var(--paper-dim); border-radius:3px; overflow:hidden;">
          <div style="height:100%; width:${pct}%; background:var(--amber);"></div>
        </div>
      </div>
    `;
  }

  return { render, openLeadForm, openCallForm };
})();

/* ===== inventory.js ===== */
/* =========================================================================
   INVENTORY module — Phase 1
   Item master, pricing, and stock. Quotation reads prices from here;
   confirmed sales deduct stock here. Closing-stock view groups items by
   brand and renders the wire colour matrix / pipe size matrix exactly like
   the original standalone Godown Inventory app.
   Still to come (Phase 2+): damage tracking, transfers, full ledgers, reports.
   ========================================================================= */

const Inventory = (() => {

  let view = 'stock';      // 'stock' | 'master' | 'damage' | 'transfer'
  let brandFilter = '';
  let currentLoc = 'GODOWN'; // 'GODOWN' | 'OFFICE'
  let dmgQueue = [];
  let dmgSelItemId = '';
  let trSelItemId = '';

  function render() {
    if (view === 'si') { renderSI(); return; }
    if (view === 'so') { renderSO(); return; }
    if (view === 'master') { renderMaster(); return; }
    if (view === 'damage') { renderDamage(); return; }
    if (view === 'transfer') { renderTransfer(); return; }
    if (view === 'partymaster') { renderPartyMaster(); return; }
    if (view === 'partyledger') { renderPartyLedgerView(); return; }
    if (view === 'supplierledger') { renderRoleLedger('SUPPLIER'); return; }
    if (view === 'customerledger') { renderRoleLedger('CUSTOMER'); return; }
    if (view === 'pipestock') { renderPipeStock(); return; }
    if (view === 'dashboard') { renderInvDashboard(); return; }
    if (view === 'alerts') { renderAlerts(); return; }
    if (view === 'history') { renderHistory(); return; }
    if (view === 'fastmoving') { renderFastMoving(); return; }
    if (view === 'reports') { renderReports(); return; }
    if (view === 'stockvalue') { renderStockValue(); return; }
    renderClosingStock();
  }

  function tabsHtml() {
    const lowCount = Core.lowStockItems().filter(i => (i.location || 'GODOWN') === currentLoc).length;
    return `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <button class="btn ${view === 'dashboard' ? '' : 'ghost'} sm view-tab" data-view="dashboard">🏠 Dashboard</button>
          <button class="btn ${view === 'si' ? '' : 'ghost'} sm view-tab" data-view="si">📥 Stock In</button>
          <button class="btn ${view === 'so' ? '' : 'ghost'} sm view-tab" data-view="so">📤 Stock Out</button>
          <button class="btn ${view === 'history' ? '' : 'ghost'} sm view-tab" data-view="history">🕘 History</button>
          <button class="btn ${view === 'alerts' ? '' : 'ghost'} sm view-tab" data-view="alerts">🔔 Alerts${lowCount ? ` <span class="badge lost" style="margin-left:2px;">${lowCount}</span>` : ''}</button>
          <button class="btn ${view === 'transfer' ? '' : 'ghost'} sm view-tab" data-view="transfer">🔁 Transfer</button>
          <button class="btn ${view === 'fastmoving' ? '' : 'ghost'} sm view-tab" data-view="fastmoving">🔥 Fast Moving</button>
          <button class="btn ${view === 'reports' ? '' : 'ghost'} sm view-tab" data-view="reports">📈 Reports</button>
          <button class="btn ${view === 'stock' ? '' : 'ghost'} sm view-tab" data-view="stock">📊 Closing Stock</button>
          <button class="btn ${view === 'pipestock' ? '' : 'ghost'} sm view-tab" data-view="pipestock">🪠 Pipe Stock</button>
          <button class="btn ${view === 'stockvalue' ? '' : 'ghost'} sm view-tab" data-view="stockvalue">💰 Stock Value</button>
          <button class="btn ${view === 'master' ? '' : 'ghost'} sm view-tab" data-view="master">🗂 Item Master</button>
          <button class="btn ${view === 'damage' ? '' : 'ghost'} sm view-tab" data-view="damage">🔴 Damage/Return</button>
          <button class="btn ${view === 'partymaster' ? '' : 'ghost'} sm view-tab" data-view="partymaster">👥 Party Master</button>
          <button class="btn ${view === 'partyledger' ? '' : 'ghost'} sm view-tab" data-view="partyledger">📒 Party Ledger</button>
          <button class="btn ${view === 'supplierledger' ? '' : 'ghost'} sm view-tab" data-view="supplierledger">🏷 Supplier Ledger</button>
          <button class="btn ${view === 'customerledger' ? '' : 'ghost'} sm view-tab" data-view="customerledger">🧾 Customer Ledger</button>
        </div>
        <div style="display:flex; gap:4px; background:var(--paper-dim); padding:3px; border-radius:6px;">
          <button class="btn sm ${currentLoc === 'GODOWN' ? 'amber' : 'ghost'} loc-btn" data-loc="GODOWN" style="${currentLoc !== 'GODOWN' ? 'border:none;' : ''}">🏭 Godown</button>
          <button class="btn sm ${currentLoc === 'OFFICE' ? 'amber' : 'ghost'} loc-btn" data-loc="OFFICE" style="${currentLoc !== 'OFFICE' ? 'border:none;' : ''}">🏢 Office</button>
        </div>
      </div>
    `;
  }
  function wireTabEvents() {
    document.querySelectorAll('.view-tab').forEach(b => b.onclick = () => { view = b.dataset.view; render(); });
    document.querySelectorAll('.loc-btn').forEach(b => b.onclick = () => { currentLoc = b.dataset.loc; brandFilter = ''; render(); });
  }

  /* ---------- CLOSING STOCK: brand-grouped, wire/pipe matrix ---------- */

  function renderClosingStock() {
    const main = document.getElementById('main');
    const brands = Core.itemBrands(currentLoc);
    const locItems = Core.listItems({ location: currentLoc });
    const low = locItems.filter(i => i.min_stock > 0 && i.stock_qty <= i.min_stock);

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Inventory</div>
          <div class="page-desc">Closing stock by brand — wire colours and pipe sizes laid out the way the godown actually thinks about them.</div>
        </div>
        <button class="btn amber" id="btn-add-item">+ Add Item</button>
      </div>

      ${tabsHtml()}

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${locItems.length}</div><div class="stat-label">Items (${currentLoc === 'GODOWN' ? 'Godown' : 'Office'})</div></div>
        <div class="stat"><div class="stat-num">${brands.length}</div><div class="stat-label">Brands</div></div>
        <div class="stat"><div class="stat-num" style="color:${low.length ? 'var(--red)' : 'inherit'}">${low.length}</div><div class="stat-label">Low Stock Alerts</div></div>
      </div>

      ${low.length ? `
        <div class="card" style="border-color:#e6c9c5;">
          <div class="card-title" style="color:var(--red);">⚠ Low Stock</div>
          ${low.map(i => `<div style="font-size:13px; padding:4px 0;"><b>${esc(i.name)}</b> ${i.brand ? '(' + esc(i.brand) + ')' : ''} — ${i.stock_qty} ${esc(i.unit)} left (min ${i.min_stock})</div>`).join('')}
        </div>
      ` : ''}

      <div class="card" style="padding-bottom:10px;">
        <label>Select Brand</label>
        <select id="cs-brand">
          <option value="">— Choose a brand —</option>
          ${brands.map(b => `<option value="${esc(b)}" ${b === brandFilter ? 'selected' : ''}>${esc(b)}</option>`).join('')}
        </select>
      </div>

      <div id="cs-results"></div>
    `;

    document.getElementById('btn-add-item').onclick = openAddItemModal;
    wireTabEvents();
    document.getElementById('cs-brand').onchange = (e) => { brandFilter = e.target.value; renderBrandStock(); };
    if (brandFilter) renderBrandStock();
  }

  function renderBrandStock() {
    const el = document.getElementById('cs-results');
    if (!brandFilter) { el.innerHTML = ''; return; }
    const items = Core.listItems({ location: currentLoc }).filter(i => (i.brand || 'Unknown Brand') === brandFilter);
    if (!items.length) { el.innerHTML = `<div class="empty">No items for this brand.</div>`; return; }

    const wireItems = items.filter(Core.isWire);
    const pipeItems = items.filter(i => Core.isPipe(i));
    // wires that DO end in a known colour go in the matrix; wires that
    // don't (e.g. "...WIRE (KEI FR)" — a grade, not a colour) must still
    // show up somewhere instead of silently disappearing.
    const coloredWireItems = wireItems.filter(i => Core.WIRE_COLORS.some(c => i.name.toUpperCase().endsWith(' ' + c)));
    const plainWireItems = wireItems.filter(i => !Core.WIRE_COLORS.some(c => i.name.toUpperCase().endsWith(' ' + c)));
    const otherItems = items.filter(i => !Core.isWire(i) && !Core.isPipe(i));

    let html = `<div class="card" style="padding:0; overflow:hidden;">`;
    if (coloredWireItems.length) html += wireMatrixHtml(coloredWireItems);
    if (pipeItems.length) html += pipeMatrixHtml(pipeItems);
    html += `</div>`;

    if (plainWireItems.length) {
      html += `<div class="card" style="padding:0; overflow:hidden; margin-top:12px;">
        <div style="font-size:13px; font-weight:700; color:#185FA5; padding:10px 16px; background:#e8f0fb; border-bottom:1px solid #d0ddf5;">🔌 Other Wires &amp; Cables</div>
        ${plainItemTable(plainWireItems.sort((a, b) => a.name.localeCompare(b.name)))}
      </div>`;
    }

    if (otherItems.length) {
      const byCat = {};
      otherItems.forEach(i => { const c = i.category || 'Other'; (byCat[c] = byCat[c] || []).push(i); });
      Object.keys(byCat).sort().forEach(cat => {
        html += `<div class="card" style="padding:0; overflow:hidden; margin-top:12px;">
          <div style="font-size:13px; font-weight:700; color:var(--navy-700); padding:10px 16px; background:#e8f0fb; border-bottom:1px solid #d0ddf5;">📂 ${esc(cat)}</div>
          ${plainItemTable(byCat[cat].sort((a, b) => a.name.localeCompare(b.name)))}
        </div>`;
      });
    }
    el.innerHTML = html;
    el.querySelectorAll('.stock-in-btn').forEach(b => b.onclick = () => openStockModal(b.dataset.id, 'in'));
    el.querySelectorAll('.stock-out-btn').forEach(b => b.onclick = () => openStockModal(b.dataset.id, 'out'));
  }

  function wireMatrixHtml(wireItems) {
    const usedColors = Core.WIRE_COLORS.filter(c => wireItems.some(i => i.name.toUpperCase().endsWith(' ' + c)));
    if (!usedColors.length) return '';
    const rows = {};
    wireItems.forEach(i => {
      const color = Core.WIRE_COLORS.find(c => i.name.toUpperCase().endsWith(' ' + c));
      const base = Core.baseName(i.name);
      (rows[base] = rows[base] || {})[color || 'OTHER'] = i;
    });
    let h = `<div style="font-size:13px; font-weight:700; color:#185FA5; padding:10px 16px; background:#e8f0fb; border-bottom:1px solid #d0ddf5;">🔌 Wires &amp; Cables — Colour Matrix</div>`;
    h += `<table style="border-collapse:collapse; width:100%; font-size:13px;"><thead><tr>
      <th style="background:#f8f9fa; padding:9px 12px; border:1px solid #ddd; text-align:left; min-width:180px;">Wire Type</th>
      ${usedColors.map(c => `<th style="background:${Core.CS_BG[c]}; color:${Core.CS_TX[c]}; padding:9px 14px; border:1px solid #ddd; text-align:center; font-weight:700;">${c}</th>`).join('')}
    </tr></thead><tbody>`;
    Object.keys(rows).sort().forEach((base, idx) => {
      h += `<tr style="background:${idx % 2 === 0 ? '#fff' : '#fafafa'};">
        <td style="padding:9px 12px; border:1px solid #e0e0e0; font-weight:500;">${esc(base)}</td>
        ${usedColors.map(c => {
          const v = rows[base][c];
          if (!v) return `<td style="padding:9px 14px; border:1px solid #e0e0e0; text-align:center; color:#ccc;">--</td>`;
          const low = v.stock_qty <= v.min_stock && v.min_stock > 0;
          return `<td class="wire-cell" data-id="${v.id}" style="padding:9px 14px; border:1px solid #e0e0e0; text-align:center; font-weight:700; cursor:pointer; background:${low ? '#ffebee' : Core.CS_BG[c] + '22'}; color:${low ? '#c62828' : '#1a1a1a'};" title="Click to view/edit stock">${low ? '⚠ ' : ''}${v.stock_qty}</td>`;
        }).join('')}
      </tr>`;
    });
    h += `</tbody></table>`;
    return h;
  }

  function pipeMatrixHtml(pipeItems) {
    const sorted = pipeItems.sort((a, b) => a.name.localeCompare(b.name));
    let h = `<div style="font-size:13px; font-weight:700; color:#1b5e20; padding:10px 16px; background:#e8f5e9; border-bottom:1px solid #c8e6c9;">🪠 Pipes</div>`;
    h += `<table style="border-collapse:collapse; width:100%; font-size:13px;"><thead><tr>
      <th style="background:#2e7d32; color:#fff; padding:9px 14px; border:1px solid #388e3c; text-align:left;">Pipe Name</th>
      <th style="background:#2e7d32; color:#fff; padding:9px 14px; border:1px solid #388e3c; text-align:center;">Stock</th>
      <th style="background:#2e7d32; color:#fff; padding:9px 14px; border:1px solid #388e3c; text-align:center;">Unit</th>
      <th style="background:#2e7d32; color:#fff; padding:9px 14px; border:1px solid #388e3c; text-align:center;">Status</th>
    </tr></thead><tbody>`;
    sorted.forEach((i, idx) => {
      const low = i.stock_qty <= i.min_stock && i.min_stock > 0;
      h += `<tr class="wire-cell" data-id="${i.id}" style="cursor:pointer; background:${low ? '#fff8f8' : (idx % 2 === 0 ? '#fff' : '#f1f8e9')};">
        <td style="padding:10px 14px; border:1px solid #dcedc8; font-weight:600; color:#1b5e20;">${esc(i.name)}</td>
        <td style="padding:10px 14px; border:1px solid #dcedc8; text-align:center; font-size:16px; font-weight:800; color:${low ? '#c62828' : '#2e7d32'};">${i.stock_qty}</td>
        <td style="padding:10px 14px; border:1px solid #dcedc8; text-align:center; color:#555; font-size:12px;">${esc(i.unit)}</td>
        <td style="padding:10px 14px; border:1px solid #dcedc8; text-align:center;"><span class="badge ${low ? 'low' : 'confirmed'}">${low ? '⚠ LOW' : '✓ OK'}</span></td>
      </tr>`;
    });
    h += `</tbody></table>`;
    return h;
  }

  function plainItemTable(items) {
    let h = `<table style="border-collapse:collapse; width:100%; font-size:13px;"><thead><tr>
      <th style="padding:9px 14px; border-bottom:2px solid #e0e0e0; text-align:left;">Item Name</th>
      <th style="padding:9px 14px; border-bottom:2px solid #e0e0e0; text-align:center;">Stock</th>
      <th style="padding:9px 14px; border-bottom:2px solid #e0e0e0; text-align:center;">Unit</th>
      <th style="padding:9px 14px; border-bottom:2px solid #e0e0e0; text-align:center;">Status</th>
    </tr></thead><tbody>`;
    items.forEach((i, idx) => {
      const low = i.stock_qty <= i.min_stock && i.min_stock > 0;
      h += `<tr class="wire-cell" data-id="${i.id}" style="cursor:pointer; background:${idx % 2 === 0 ? '#fff' : '#fafafa'};">
        <td style="padding:9px 14px; border-bottom:1px solid #f0f0f0; font-weight:500;">${esc(i.name)}</td>
        <td style="padding:9px 14px; border-bottom:1px solid #f0f0f0; text-align:center; font-weight:700;">${i.stock_qty}</td>
        <td style="padding:9px 14px; border-bottom:1px solid #f0f0f0; text-align:center; color:#555;">${esc(i.unit)}</td>
        <td style="padding:9px 14px; border-bottom:1px solid #f0f0f0; text-align:center;"><span class="badge ${low ? 'low' : 'confirmed'}">${low ? '⚠ Low' : '✓ OK'}</span></td>
      </tr>`;
    });
    h += `</tbody></table>`;
    return h;
  }

  /* ---------- ITEM MASTER: full list + add/stock in/out ---------- */

  function renderMaster() {
    const main = document.getElementById('main');
    const items = Core.listItems({ location: currentLoc });

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Inventory</div>
          <div class="page-desc">Full item list. Quotation reads prices from here; confirmed sales deduct stock here.</div>
        </div>
        <button class="btn amber" id="btn-add-item">+ Add Item</button>
      </div>

      ${tabsHtml()}

      <div class="card">
        <div class="card-title">Item Master — ${currentLoc === 'GODOWN' ? 'Godown' : 'Office'} (${items.length})</div>
        ${items.length ? `
          <table>
            <thead><tr><th>Item</th><th>Brand</th><th>Cost</th><th>Sell</th><th>Stock</th><th></th></tr></thead>
            <tbody>
              ${items.map(i => `
                <tr>
                  <td><b>${esc(i.name)}</b><div style="font-size:11px; color:var(--ink-dim);">${esc(i.category || '')}</div></td>
                  <td>${esc(i.brand) || '—'}</td>
                  <td>₹${i.cost_price}</td>
                  <td>₹${i.sell_price}</td>
                  <td>${i.stock_qty <= i.min_stock && i.min_stock > 0 ? `<span class="badge low">${i.stock_qty} ${esc(i.unit)}</span>` : `${i.stock_qty} ${esc(i.unit)}`}</td>
                  <td style="text-align:right;">
                    <button class="btn sm ghost stock-in-btn" data-id="${i.id}">Stock In</button>
                    <button class="btn sm ghost stock-out-btn" data-id="${i.id}">Stock Out</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No items yet in ${currentLoc === 'GODOWN' ? 'Godown' : 'Office'}. <b>Add your first item.</b></div>`}
      </div>
    `;

    document.getElementById('btn-add-item').onclick = openAddItemModal;
    wireTabEvents();
    document.querySelectorAll('.stock-in-btn').forEach(b => b.onclick = () => openStockModal(b.dataset.id, 'in'));
    document.querySelectorAll('.stock-out-btn').forEach(b => b.onclick = () => openStockModal(b.dataset.id, 'out'));
  }

  /* ---------- shared: add item + stock in/out modals ---------- */

  function openAddItemModal() {
    showModal('Add Item', `
      <div class="field"><label>Item Name *</label><input id="f-name" placeholder="e.g. 2.5 SQMM WIRE RED, or 20MM PVC PIPE"></div>
      <div class="hint" style="margin-bottom:10px;">Tip: end wire names with a colour (RED/YELLOW/GREEN/BLUE/BLACK/WHITE/GREY) and pipe names with a size (20MM, 25MM...) to get the matrix view automatically.</div>
      <div class="field-row">
        <div class="field"><label>Category</label><input id="f-cat" placeholder="Wire / Switch / Light..."></div>
        <div class="field"><label>Brand *</label><input id="f-brand" placeholder="e.g. Havells, Polycab"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Unit</label>
          <select id="f-unit"><option>Nos</option><option>Mtr</option><option>Box</option><option>Coil</option><option>Kg</option></select>
        </div>
        <div class="field"><label>Min Stock Level</label><input id="f-threshold" type="number" value="0"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Cost Price (₹)</label><input id="f-cost" type="number" value="0"></div>
        <div class="field"><label>Sell Price (₹)</label><input id="f-sell" type="number" value="0"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>HSN Code</label><input id="f-hsn" placeholder="Optional"></div>
        <div class="field"><label>Location</label>
          <select id="f-location"><option value="GODOWN" ${currentLoc === 'GODOWN' ? 'selected' : ''}>🏭 Godown</option><option value="OFFICE" ${currentLoc === 'OFFICE' ? 'selected' : ''}>🏢 Office</option></select>
        </div>
      </div>
      <button class="btn amber" id="save-item" style="width:100%; justify-content:center; margin-top:6px;">Save Item</button>
    `);
    document.getElementById('save-item').onclick = () => {
      const name = document.getElementById('f-name').value.trim();
      if (!name) { toast('Item name is required'); return; }
      Core.addItem({
        name, category: document.getElementById('f-cat').value.trim(),
        brand: document.getElementById('f-brand').value.trim(),
        unit: document.getElementById('f-unit').value,
        cost_price: document.getElementById('f-cost').value,
        sell_price: document.getElementById('f-sell').value,
        hsn: document.getElementById('f-hsn').value.trim(),
        min_stock: document.getElementById('f-threshold').value,
        location: document.getElementById('f-location').value
      });
      closeModal(); toast('Item added'); render();
    };
  }

  // row/matrix clicks now jump into the proper Stock In / Stock Out tab

  function renderSO() { renderSIorSO('so'); }

    document.getElementById(prefix + '-item').onchange = () => onQItemChange(prefix);
    document.getElementById(prefix + '-add-btn').onclick = () => addToStockQueue(prefix);

    if (submitBtn) submitBtn.onclick = () => submitStockQueue(prefix);
    const clearBtn = document.getElementById(prefix + '-clear-btn');
    if (clearBtn) clearBtn.onclick = () => { if (confirm('Clear the batch?')) { if (isIn) siQueue = []; else soQueue = []; render(); } };

      const creditEl = document.getElementById(prefix + '-credit');
      const dateEl = document.getElementById(prefix + '-date');

  function fillQItems(prefix) {
    const brand = document.getElementById(prefix + '-brand').value;
    const sel = document.getElementById(prefix + '-item');
    const items = Core.listItems({ location: currentLoc }).filter(i => !brand || (i.brand || 'Unknown Brand') === brand);
    sel.innerHTML = '<option value="">— Select Item —</option>' + items.map(i =>
      `<option value="${i.id}">${esc(i.name)} (${esc(i.unit)}) — Stock: ${i.stock_qty}${i.stock_qty <= i.min_stock && i.min_stock > 0 ? ' ⚠' : ''}</option>`).join('');
    document.getElementById(prefix + '-clr-box').style.display = 'none';
    document.getElementById(prefix + '-cur-stk').textContent = '';
    if (prefix === 'si') siSelItemId = ''; else soSelItemId = '';
  }

  function onQItemChange(prefix) {
    const itemId = document.getElementById(prefix + '-item').value;
    if (prefix === 'si') siSelItemId = itemId; else soSelItemId = itemId;
    const stkEl = document.getElementById(prefix + '-cur-stk');
    const clrBox = document.getElementById(prefix + '-clr-box');
    if (!itemId) { clrBox.style.display = 'none'; stkEl.textContent = ''; return; }
    const item = Core.getItem(itemId);
    if (!item) return;
    showStockFor(prefix, item);

    if (Core.isWire(item)) {
      const base = Core.baseName(item.name), brand = item.brand || '';
      const variants = Core.listItems({ location: currentLoc }).filter(i => (i.brand || '') === brand && Core.baseName(i.name) === base);
      const colored = variants.filter(i => Core.WIRE_COLORS.some(c => i.name.toUpperCase().endsWith(' ' + c)));
      if (colored.length > 1) {
        const btnsEl = document.getElementById(prefix + '-clr-btns');
        btnsEl.innerHTML = '';
        const curColor = Core.WIRE_COLORS.find(c => item.name.toUpperCase().endsWith(' ' + c));
        Core.WIRE_COLORS.forEach(c => {
          const v = colored.find(i => i.name.toUpperCase().endsWith(' ' + c));
          if (!v) return;
          const vlow = v.stock_qty <= v.min_stock && v.min_stock > 0;
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.style.cssText = (CLR_CSS[c] || 'background:#888;color:#fff') + ';padding:6px 12px;border-radius:20px;border:none;font-size:11px;font-weight:700;cursor:pointer;' + (c === curColor ? 'outline:3px solid var(--navy-700);' : '');
          btn.innerHTML = `● ${c} <span style="font-size:10px;opacity:.85">(${v.stock_qty})${vlow ? ' ⚠' : ''}</span>`;
          btn.onclick = () => {
            btnsEl.querySelectorAll('button').forEach(b => b.style.outline = 'none');
            btn.style.outline = '3px solid var(--navy-700)';
            if (prefix === 'si') siSelItemId = v.id; else soSelItemId = v.id;
            showStockFor(prefix, v);
            document.getElementById(prefix + '-qty').focus();
          };
          btnsEl.appendChild(btn);
        });
        clrBox.style.display = 'block';
        return;
      }
    }
    clrBox.style.display = 'none';
  }
  function showStockFor(prefix, item) {
    const low = item.stock_qty <= item.min_stock && item.min_stock > 0;
    const el = document.getElementById(prefix + '-cur-stk');
    el.innerHTML = `Current stock: <b style="color:${low ? 'var(--red)' : 'var(--green)'}">${item.stock_qty} ${esc(item.unit)}</b>${low ? ' ⚠' : ''}`;
  }

  function addToStockQueue(prefix) {
    const isIn = prefix === 'si';
    const itemId = isIn ? siSelItemId : soSelItemId;
    const qty = Number(document.getElementById(prefix + '-qty').value);
    if (!itemId) { toast('Select an item'); return; }
    if (!qty || qty <= 0) { toast('Enter quantity'); return; }
    const item = Core.getItem(itemId);
    if (!item) return;
    if (!isIn && qty > item.stock_qty) { toast('Not enough stock! Available: ' + item.stock_qty); return; }
    const queue = isIn ? siQueue : soQueue;
    const existing = queue.find(x => x.itemId === itemId);
    if (existing) { existing.qty += qty; toast('Qty updated ✓'); }
    else { queue.push({ itemId, qty, name: item.name, brand: item.brand || '', unit: item.unit }); toast('Added to batch ✓'); }
    document.getElementById(prefix + '-qty').value = '';
    document.getElementById(prefix + '-qty').focus();
    renderStockQueue(prefix);
  }

  function renderStockQueue(prefix) {
    const isIn = prefix === 'si';
    const queue = isIn ? siQueue : soQueue;
    const card = document.getElementById(prefix + '-q-card');
    const countEl = document.getElementById(prefix + '-q-count');
    if (countEl) countEl.textContent = queue.length;
    if (!card) return;
    card.style.display = queue.length ? 'block' : 'none';
    if (!queue.length) return;
    const wrap = document.getElementById(prefix + '-q-table');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>Item</th><th>Brand</th><th>Qty</th><th>Unit</th><th></th></tr></thead>
        <tbody>
          ${queue.map((x, i) => `
            <tr>
              <td>${esc(x.name)}</td>
              <td style="color:var(--navy-700);">${esc(x.brand)}</td>
              <td style="font-weight:700;">${x.qty}</td>
              <td>${esc(x.unit)}</td>
              <td style="text-align:right;"><button class="btn sm danger q-rm-btn" data-prefix="${prefix}" data-idx="${i}">✕</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    wrap.querySelectorAll('.q-rm-btn').forEach(b => b.onclick = () => {
      const q = b.dataset.prefix === 'si' ? siQueue : soQueue;
      q.splice(Number(b.dataset.idx), 1);
      renderStockQueue(b.dataset.prefix);
    });
  }

  async function submitStockQueue(prefix) {
    const isIn = prefix === 'si';
    const queue = isIn ? siQueue : soQueue;
    if (!queue.length) { toast('Batch is empty'); return; }
    const partyEl = document.getElementById(prefix + '-party');
    const party = partyEl.value.trim();
    if (!party) { toast(`Enter ${isIn ? 'Supplier' : 'Customer'} name`); partyEl.focus(); return; }
    const note = document.getElementById(prefix + '-note').value.trim();
    const remarks = document.getElementById(prefix + '-remarks').value.trim();
    const fullNote = note + (remarks ? ' | Remark: ' + remarks : '');
    const date = document.getElementById(prefix + '-date').value || todayStr();
    const operator = document.getElementById(prefix + '-operator').value.trim();
    if (operator) localStorage.setItem('sse_operator', operator);
    const creditDays = !isIn ? (Number(document.getElementById(prefix + '-credit').value) || 0) : 0;

    if (!isIn) {
      const short = queue.filter(x => x.qty > Core.getItem(x.itemId).stock_qty);
      if (short.length) { toast('Not enough stock: ' + short.map(x => x.name).join(', ')); return; }
    }

    const dupes = Core.findLikelyDuplicates(queue.map(x => ({ itemId: x.itemId, qty: x.qty, partyName: party, name: x.name })), isIn ? 'in' : 'out', date);
    if (dupes.length) {
      const names = dupes.map(d => d.name).join(', ');
      if (!confirm(`⚠ Possible duplicate detected!\n\nSame item, qty, party and date already exists:\n${names}\n\nContinue anyway?`)) return;
    }
    if (!confirm(`Submit ${isIn ? 'Stock IN' : 'Stock OUT'} for ${queue.length} item(s) to ${isIn ? 'Supplier' : 'Customer'}: ${party}?\nDate: ${date}${note ? ' | Ref: ' + note : ''}${operator ? ' | By: ' + operator : ''}`)) return;

    const submitBtn = document.getElementById(prefix + '-submit-btn');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting…'; }

    const failures = [];
    for (const x of queue) {
      const result = await Core.stockMove(x.itemId, isIn ? 'in' : 'out', x.qty, {
        ref_type: isIn ? 'purchase' : 'sale_manual', party_name: party, operator,
        credit_days: creditDays, notes: fullNote, date
      });
      if (!result.ok) failures.push({ name: x.name, error: result.error });
    }
    Core.autoSaveParty(party, isIn ? 'SUPPLIER' : 'CUSTOMER');
    const submitted = queue.length - failures.length;

    if (failures.length) {
      // keep only the failed items in the batch so nothing already
      // submitted gets re-sent, and the user can see what to fix/retry
      if (isIn) siQueue = queue.filter(x => failures.some(f => f.name === x.name));
      else soQueue = queue.filter(x => failures.some(f => f.name === x.name));
      alert(`⚠ ${failures.length} item(s) were rejected by the server and NOT recorded:\n\n` +
        failures.map(f => `• ${f.name}: ${f.error}`).join('\n') +
        (submitted ? `\n\n${submitted} other item(s) submitted successfully.` : ''));
    } else {
      if (isIn) siQueue = []; else soQueue = [];
    }
    toast(submitted ? `${submitted} item${submitted > 1 ? 's' : ''} submitted 🎉` : 'Submission failed');
    render();
  }

          <div class="field" style="display:flex; align-items:flex-end;"><button class="btn amber" id="dmg-add-btn" style="width:100%; justify-content:center;">+ Add to Batch</button></div>

      <div class="card" id="dmg-q-card" style="${dmgQueue.length ? '' : 'display:none;'}">

        <div id="dmg-q-table"></div>
        <div class="field-row" style="margin-top:12px;">
          <div class="field"><label>Party (optional)</label><input id="dmg-party" placeholder="Supplier / customer name"></div>

        <div style="display:flex; gap:8px;">

          <button class="btn danger" id="dmg-clear-btn">Clear</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Recent Damage / Return History</div>
        ${history.length ? `
          <table>
            <thead><tr><th>Date</th><th>Type</th><th>Item</th><th>Qty</th><th>Party</th><th>Notes</th></tr></thead>
            <tbody>
              ${history.map(l => {
                const item = Core.getItem(l.item_id);
                const isDmg = l.ref_type === 'damage';
                return `<tr>
                  <td>${fmtDate(l.date)}</td>
                  <td><span class="badge ${isDmg ? 'lost' : 'confirmed'}">${isDmg ? '🔴 DAMAGE' : '🟢 RETURN'}</span></td>
                  <td>${esc(item ? item.name : '?')}</td>
                  <td style="font-weight:700;">${l.qty}</td>
                  <td style="font-size:12px;">${esc(l.party_name || '—')}</td>
                  <td style="font-size:12px; color:var(--ink-dim);">${esc(l.notes || '—')}</td>

              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No damage or return entries yet.</div>`}
      </div>
    `;

    wireTabEvents();
    fillDmgItems();
    document.getElementById('dmg-brand').onchange = fillDmgItems;
    document.getElementById('dmg-item').onchange = (e) => {
      dmgSelItemId = e.target.value;
      const item = Core.getItem(dmgSelItemId);
      const stk = document.getElementById('dmg-cur-stk');
      if (!item) { stk.textContent = ''; return; }
      const low = item.stock_qty <= item.min_stock && item.min_stock > 0;
      stk.innerHTML = `Current stock: <b style="color:${low ? 'var(--red)' : 'var(--green)'}">${item.stock_qty} ${esc(item.unit)}</b>${low ? ' ⚠' : ''}`;

  function fillDmgItems() {
    const brand = document.getElementById('dmg-brand').value;
    const sel = document.getElementById('dmg-item');
    const items = Core.listItems({ location: currentLoc }).filter(i => !brand || (i.brand || 'Unknown Brand') === brand);

      `<option value="${i.id}">${esc(i.name)} (${esc(i.unit)}) — Stock: ${i.stock_qty}${i.stock_qty <= i.min_stock && i.min_stock > 0 ? ' ⚠' : ''}</option>`).join('');
    dmgSelItemId = '';
    document.getElementById('dmg-cur-stk').textContent = '';

  function addToDmgQueue() {
    if (!dmgSelItemId) { toast('Select an item'); return; }
    const qty = Number(document.getElementById('dmg-qty').value);
    if (!qty || qty <= 0) { toast('Enter a valid quantity'); return; }

    const item = Core.getItem(dmgSelItemId);

    const existing = dmgQueue.find(x => x.itemId === dmgSelItemId && x.entryType === entryType);

    else dmgQueue.push({ itemId: dmgSelItemId, qty, entryType, name: item.name, brand: item.brand || '', unit: item.unit });

    renderDmgQueue();

  function renderDmgQueue() {
    const card = document.getElementById('dmg-q-card');
    const countEl = document.getElementById('dmg-q-count');
    if (countEl) countEl.textContent = dmgQueue.length;
    if (!card) return;
    card.style.display = dmgQueue.length ? 'block' : 'none';
    if (!dmgQueue.length) return;
    const wrap = document.getElementById('dmg-q-table');
    wrap.innerHTML = `
      <table>
        <thead><tr><th>Type</th><th>Item</th><th>Brand</th><th>Qty</th><th></th></tr></thead>
        <tbody>
          ${dmgQueue.map((x, i) => `
            <tr>
              <td><span class="badge ${x.entryType === 'DAMAGE' ? 'lost' : 'confirmed'}">${x.entryType === 'DAMAGE' ? '🔴 DAMAGE' : '🟢 RETURN'}</span></td>
              <td>${esc(x.name)}</td>
              <td style="color:var(--navy-700);">${esc(x.brand)}</td>
              <td style="font-weight:700;">${x.qty} ${esc(x.unit)}</td>
              <td style="text-align:right;"><button class="btn sm danger dmg-rm-btn" data-idx="${i}">✕</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;

  }

  async function submitDmgQueue() {
    if (!dmgQueue.length) { toast('Batch is empty'); return; }
    const party_name = document.getElementById('dmg-party').value.trim();
    const notes = document.getElementById('dmg-note').value.trim();
    const date = document.getElementById('dmg-date').value || todayStr();
    const queue = dmgQueue;
    const failures = [];
    for (const x of queue) {
      const result = await Core.recordDamageOrReturn(x.itemId, x.qty, x.entryType, { party_name, notes, date });
      if (!result.ok) failures.push({ name: x.name, error: result.error });
    }
    const submitted = queue.length - failures.length;
    if (failures.length) {
      dmgQueue = queue.filter(x => failures.some(f => f.name === x.name));
      alert(`⚠ ${failures.length} item(s) rejected:\n\n` + failures.map(f => `• ${f.name}: ${f.error}`).join('\n') +
        (submitted ? `\n\n${submitted} other item(s) submitted successfully.` : ''));
    } else {
      dmgQueue = [];
    }
    toast(submitted ? `${submitted} item${submitted > 1 ? 's' : ''} submitted` : 'Submission failed');
    render();
  }

  /* ---------- TRANSFER: move stock between Godown and Office ---------- */

  function renderTransfer() {
    const main = document.getElementById('main');
    const toLoc = currentLoc === 'GODOWN' ? 'OFFICE' : 'GODOWN';
    const brands = Core.itemBrands(currentLoc);
    const history = Core.listTransfers().filter(l => {

    }).slice(0, 20);

      <div class="page-head">
        <div>
          <div class="page-title">Transfer</div>
          <div class="page-desc">Move stock between Godown and Office. The current location tab (top right) is your "from" side.</div>

      </div>
      ${tabsHtml()}

      <div class="card">
        <div class="card-title">${currentLoc === 'GODOWN' ? '🏭 Godown' : '🏢 Office'} → ${toLoc === 'GODOWN' ? '🏭 Godown' : '🏢 Office'}</div>
        <div class="field"><label>Brand</label>
          <select id="tr-brand"><option value="">— All Brands —</option>${brands.map(b => `<option>${esc(b)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>Item</label><select id="tr-item"><option value="">— Select Item —</option></select></div>

          <div class="field"><label>Quantity</label><input id="tr-qty" type="number" min="1"></div>
          <div class="field"><label>Date</label><input id="tr-date" type="date" value="${todayStr()}"></div>
        </div>
        <div class="field"><label>Note (optional)</label><input id="tr-note" placeholder="Reason for transfer"></div>
        <button class="btn amber" id="tr-submit-btn" style="width:100%; justify-content:center;">🔁 Transfer Stock</button>
      </div>

      <div class="card">
        <div class="card-title">Recent Transfers</div>
        ${history.length ? `
          <table>
            <thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Route</th><th>Note</th></tr></thead>
            <tbody>
              ${history.map(l => {
                const item = Core.getItem(l.item_id);
                return `<tr>
                  <td>${fmtDate(l.date)}</td>
                  <td>${esc(item ? item.name : '?')}</td>
                  <td style="font-weight:700;">${l.qty}</td>
                  <td style="font-size:12px;">${esc(l.party_name || '')}</td>
                  <td style="font-size:12px; color:var(--ink-dim);">${esc(l.notes || '—')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No transfers yet.</div>`}
      </div>
    `;

    wireTabEvents();
    fillTrItems();
    document.getElementById('tr-brand').onchange = fillTrItems;
    document.getElementById('tr-item').onchange = (e) => {
      trSelItemId = e.target.value;
      const item = Core.getItem(trSelItemId);
      const stk = document.getElementById('tr-cur-stk');
      if (!item) { stk.textContent = ''; return; }
      const low = item.stock_qty <= item.min_stock && item.min_stock > 0;
      stk.innerHTML = `Current stock: <b style="color:${low ? 'var(--red)' : 'var(--green)'}">${item.stock_qty} ${esc(item.unit)}</b>${low ? ' ⚠' : ''}`;
    };
    document.getElementById('tr-submit-btn').onclick = async () => {
      if (!trSelItemId) { toast('Select an item'); return; }
      const qty = Number(document.getElementById('tr-qty').value);

      const item = Core.getItem(trSelItemId);
      if (!confirm(`Transfer ${qty} ${item.unit} of ${item.name} from ${currentLoc} to ${toLoc}?`)) return;
      const result = await Core.transferStock(trSelItemId, toLoc, qty, document.getElementById('tr-note').value.trim(), document.getElementById('tr-date').value || todayStr());

      render();

  }

          return `

      </div>

      Core.toggleBillPaid(decodeURIComponent(b.dataset.key));
      toast('Updated'); renderRoleLedger(role);

  /* ---------- DASHBOARD: today + month-over-month summary ---------- */

  function renderInvDashboard() {
    const main = document.getElementById('main');
    const td = todayStr();
    const locItems = Core.listItems({ location: currentLoc });
    const locItemIds = new Set(locItems.map(i => i.id));
    const txns = Core._db().stock_ledger.filter(l => locItemIds.has(l.item_id));

    const tIn = txns.filter(t => t.type === 'in' && t.date.slice(0, 10) === td).reduce((s, t) => s + t.qty, 0);
    const tOut = new Set(txns.filter(t => t.type === 'out' && t.date.slice(0, 10) === td).map(t => t.item_id)).size;
    const low = locItems.filter(i => i.stock_qty <= i.min_stock && i.min_stock > 0);

    const thisM = td.slice(0, 7);
    const lastMDate = new Date(); lastMDate.setMonth(lastMDate.getMonth() - 1);
    const lastM = lastMDate.toISOString().slice(0, 7);
    const sumQty = (type, month) => txns.filter(t => t.type === type && t.date.slice(0, 7) === month).reduce((s, t) => s + t.qty, 0);
    const txnCount = (month) => txns.filter(t => t.date.slice(0, 7) === month).length;

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Inventory Dashboard</div>
          <div class="page-desc">${currentLoc === 'GODOWN' ? 'Godown' : 'Office'} snapshot — today and this month vs last.</div>
        </div>
      </div>
      ${tabsHtml()}

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${locItems.length}</div><div class="stat-label">Total Items</div></div>
        <div class="stat"><div class="stat-num" style="color:${low.length ? 'var(--red)' : 'inherit'}">${low.length}</div><div class="stat-label">Low Stock</div></div>
        <div class="stat"><div class="stat-num" style="color:var(--green);">${tIn}</div><div class="stat-label">Today IN Qty</div></div>
        <div class="stat"><div class="stat-num" style="color:#e65100;">${tOut}</div><div class="stat-label">Today OUT Items</div></div>
      </div>

      <div class="card">
        <div class="card-title">This Month vs Last</div>
        <div class="stat-row" style="margin-bottom:0;">
          <div class="stat"><div class="stat-num" style="color:var(--green);">${sumQty('in', thisM)}</div><div class="stat-label">Month IN</div><div class="hint">Last: ${sumQty('in', lastM)}</div></div>
          <div class="stat"><div class="stat-num" style="color:#e65100;">${sumQty('out', thisM)}</div><div class="stat-label">Month OUT</div><div class="hint">Last: ${sumQty('out', lastM)}</div></div>
          <div class="stat"><div class="stat-num">${txnCount(thisM)}</div><div class="stat-label">Month Txns</div><div class="hint">Last: ${txnCount(lastM)}</div></div>
        </div>
      </div>

      ${low.length ? `
        <div class="card" style="border-color:#e6c9c5;">
          <div class="card-title" style="color:var(--red);">⚠ Low Stock (${low.length})</div>
          ${low.map(i => `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--paper-dim); font-size:13px;"><span><b>${esc(i.name)}</b> <span class="hint">${esc(i.category || '')} · ${esc(i.brand || '—')}</span></span><span class="badge low">${i.stock_qty} / min ${i.min_stock}</span></div>`).join('')}
        </div>
      ` : `<div class="card"><div class="empty">✅ All items adequately stocked.</div></div>`}
    `;
    wireTabEvents();
  }

  function renderFmResults() {
    const period = document.getElementById('fm-period').value;
    const td = todayStr();
    let fromDate = '', toDate = td;
    if (period === 'today') fromDate = td;
    else if (period === 'custom') { fromDate = document.getElementById('fm-from').value || td; toDate = document.getElementById('fm-to').value || td; }
    else { const d = new Date(); d.setDate(d.getDate() - Number(period)); fromDate = d.toISOString().slice(0, 10); }

    const locItemIds = new Set(Core.listItems({ location: currentLoc }).map(i => i.id));
    const filtered = Core._db().stock_ledger.filter(l => l.type === 'out' && locItemIds.has(l.item_id) && l.date.slice(0, 10) >= fromDate && l.date.slice(0, 10) <= toDate);
    const outByItem = {};
    filtered.forEach(l => { outByItem[l.item_id] = (outByItem[l.item_id] || 0) + l.qty; });

    const el = document.getElementById('fm-results');
    if (!Object.keys(outByItem).length) { el.innerHTML = `<div class="card"><div class="empty">No stock movement in this period.</div></div>`; return; }

    const byCat = {};
    Object.entries(outByItem).forEach(([id, qty]) => {
      const it = Core.getItem(id);
      const cat = it ? (it.category || 'Other') : 'Other';
      (byCat[cat] = byCat[cat] || []).push({ id, qty, it });
    });
    Object.values(byCat).forEach(arr => arr.sort((a, b) => b.qty - a.qty));
    const totalOut = Object.values(outByItem).reduce((s, v) => s + v, 0);
    const label = period === 'today' ? 'Today' : period === 'custom' ? `${fromDate} to ${toDate}` : `Last ${period} Days`;

    el.innerHTML = `
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; margin-bottom:12px;">
          <div class="card-title" style="margin-bottom:0; color:#e65100;">🔥 Fast Moving — ${label}</div>
          <div class="hint">${Object.keys(byCat).length} categories · ${Object.keys(outByItem).length} items · <b style="color:#e65100;">${totalOut} total OUT</b></div>
        </div>
        ${Object.keys(byCat).sort().map(cat => `
          <div style="margin-bottom:14px;">
            <div style="font-size:12px; font-weight:700; color:var(--navy-700); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em;">📂 ${esc(cat)}</div>

              <div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--paper-dim);">
                <span>${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '　'} ${esc(row.it ? row.it.name : '?')} ${row.it && row.it.brand ? `<span class="hint">(${esc(row.it.brand)})</span>` : ''}</span>

              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderRpSummary() {

  function renderStockValue() {

    const brands = Core.itemBrands(currentLoc);
    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Stock Value</div>
          <div class="page-desc">What's sitting in stock is worth, at cost and at sell price.</div>
        </div>
      </div>
      ${tabsHtml()}
      <div class="card" style="padding-bottom:10px;">
        <label>Brand</label>
        <select id="sv-brand"><option value="">— All Brands —</option>${brands.map(b => `<option>${esc(b)}</option>`).join('')}</select>

      <div id="sv-summary" class="stat-row"></div>

    `;
    wireTabEvents();
    document.getElementById('sv-brand').onchange = renderSvTable;
    renderSvTable();
  }

  function renderSvTable() {
    const brandF = document.getElementById('sv-brand').value;
    let list = Core.listItems({ location: currentLoc });
    if (brandF) list = list.filter(i => (i.brand || 'Unknown Brand') === brandF);

    let totalPurchase = 0, totalSell = 0, withRate = 0;
    list.forEach(i => {
      if (i.cost_price || i.sell_price) withRate++;
      totalPurchase += i.stock_qty * (i.cost_price || 0);
      totalSell += i.stock_qty * (i.sell_price || 0);
    });
    document.getElementById('sv-summary').innerHTML = `
      <div class="stat"><div class="stat-num">${list.length}</div><div class="stat-label">Total Items</div></div>
      <div class="stat"><div class="stat-num">${withRate}</div><div class="stat-label">Items With Rate</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--green);">₹${totalPurchase.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</div><div class="stat-label">Purchase Value</div></div>
      <div class="stat"><div class="stat-num" style="color:#e65100;">₹${totalSell.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</div><div class="stat-label">Sell Value</div></div>
    `;
    const tbl = document.getElementById('sv-table');
    if (!list.length) { tbl.innerHTML = `<div class="empty">No items found.</div>`; return; }
    tbl.innerHTML = `
      <table>
        <thead><tr><th>Item</th><th>Brand</th><th>Stock</th><th>Unit</th><th>Cost Rate</th><th>Sell Rate</th><th>Purchase Value</th><th>Sell Value</th></tr></thead>
        <tbody>
          ${list.sort((a, b) => a.name.localeCompare(b.name)).map(i => {
            const pv = i.stock_qty * (i.cost_price || 0), sv = i.stock_qty * (i.sell_price || 0);
            return `<tr>
              <td style="font-weight:600;">${esc(i.name)}</td>
              <td style="color:var(--navy-700);">${esc(i.brand) || '—'}</td>
              <td style="font-weight:700;">${i.stock_qty}</td>
              <td>${esc(i.unit)}</td>
              <td>₹${i.cost_price}</td>
              <td>₹${i.sell_price}</td>
              <td style="font-weight:700; color:var(--green);">₹${pv.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</td>
              <td style="font-weight:700; color:#e65100;">₹${sv.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  return { render };
})();

/* ===== quotation.js ===== */
/* =========================================================================
   QUOTATION module
   Pipeline stage 3: Indent -> Pricing (pulled from Inventory) -> Quotation
   Confirming here is what triggers stock-out (Inventory) + lead-won (Leads).
   ========================================================================= */

const Quotation = (() => {

  let pendingIndentParty = null; // set by App.go('quotation', {newIndentFor}) from Leads

  function render(params = {}) {
    if (params.newIndentFor) pendingIndentParty = params.newIndentFor;

    const main = document.getElementById('main');
    const indents = Core.listIndents();
    const quotations = Core.listQuotations();

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Quotation</div>
          <div class="page-desc">Raise an indent, price it against Inventory, generate the document, confirm the sale.</div>
        </div>
        <button class="btn amber" id="btn-new-indent">+ New Indent</button>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${indents.filter(i => i.status === 'requested').length}</div><div class="stat-label">Awaiting Pricing</div></div>
        <div class="stat"><div class="stat-num">${quotations.filter(q => q.status === 'draft').length}</div><div class="stat-label">Awaiting Confirmation</div></div>
        <div class="stat"><div class="stat-num">${quotations.filter(q => q.status === 'confirmed').length}</div><div class="stat-label">Confirmed Sales</div></div>
        <div class="stat"><div class="stat-num">₹${quotations.filter(q => q.status === 'confirmed').reduce((s, q) => s + q.total, 0)}</div><div class="stat-label">Confirmed Value</div></div>
      </div>

      <div class="card">
        <div class="card-title">Indents</div>
        ${indents.length ? `
          <table>
            <thead><tr><th>Party</th><th>Items</th><th>Status</th><th>Raised</th><th></th></tr></thead>
            <tbody>
              ${indents.map(i => {
                const party = Core.getParty(i.party_id);
                return `
                  <tr>
                    <td><b>${esc(party ? party.name : '—')}</b></td>
                    <td>${i.lines.length} item(s)</td>
                    <td><span class="badge ${i.status}">${i.status}</span></td>
                    <td>${fmtDate(i.created_at)}</td>
                    <td style="text-align:right;">
                      ${i.status === 'requested' ? `<button class="btn sm amber price-btn" data-id="${i.id}">Price This</button>` : ''}
                      ${i.status === 'priced' ? `<button class="btn sm amber gen-btn" data-id="${i.id}">Generate Quotation</button>` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No indents yet. <b>Raise one from a lead's or client's page, or here.</b></div>`}
      </div>

      <div class="card">
        <div class="card-title">Documents</div>
        ${quotations.length ? `
          <table>
            <thead><tr><th>Doc No.</th><th>Party</th><th>Type</th><th>Total</th><th>Status</th><th></th></tr></thead>
            <tbody>
              ${quotations.map(q => {
                const party = Core.getParty(q.party_id);
                return `
                  <tr>
                    <td><b>${q.doc_no}</b></td>
                    <td>${esc(party ? party.name : '—')}</td>
                    <td>${q.doc_type}</td>
                    <td>₹${q.total}</td>
                    <td><span class="badge ${q.status}">${q.status}</span></td>
                    <td style="text-align:right;">
                      ${q.status === 'draft' ? `
                        <button class="btn sm amber confirm-btn" data-id="${q.id}">Confirm Sale</button>
                        <button class="btn sm danger reject-btn" data-id="${q.id}">Reject</button>
                      ` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No quotations generated yet.</div>`}
      </div>
    `;

    document.getElementById('btn-new-indent').onclick = openIndentModal;
    document.querySelectorAll('.price-btn').forEach(b => b.onclick = () => openPricingModal(b.dataset.id));
    document.querySelectorAll('.gen-btn').forEach(b => b.onclick = () => openGenerateModal(b.dataset.id));
    document.querySelectorAll('.confirm-btn').forEach(b => b.onclick = async () => {
      b.disabled = true; b.textContent = 'Confirming…';
      const result = await Core.confirmQuotation(b.dataset.id);
      if (!result.ok) {
        alert(`⚠ Could not confirm — stock unavailable for:\n\n` + result.failures.map(f => `• ${f.name}: ${f.error}`).join('\n'));
        render();
        return;
      }
      toast('Sale confirmed — stock deducted, party updated');
      render();
    });
    document.querySelectorAll('.reject-btn').forEach(b => b.onclick = () => {
      Core.rejectQuotation(b.dataset.id);
      toast('Quotation rejected');
      render();
    });

    // auto-open the indent modal if we arrived here from a lead's "Raise Indent"
    if (pendingIndentParty) {
      const pid = pendingIndentParty;
      pendingIndentParty = null;
      openIndentModal(pid);
    }
  }

  let indentLines = [];

  function openIndentModal(presetPartyId = null) {
    indentLines = [{ item_id: '', qty: 1 }];
    const parties = Core.listParties({ type: 'lead' }).concat(Core.listParties({ type: 'customer' }));
    const items = Core.listItems();

    if (!parties.length) { toast('Add a lead or client first'); return; }
    if (!items.length) { toast('Add an item in Inventory first'); return; }

    showModal('New Indent', `
      <div class="field"><label>Party</label>
        <select id="f-party">${parties.map(p => `<option value="${p.id}" ${p.id === presetPartyId ? 'selected' : ''}>${esc(p.company || p.name)} (${p.type})</option>`).join('')}</select>
      </div>
      <label>Items Requested</label>
      <div id="indent-lines"></div>
      <button class="btn ghost sm" id="add-line" style="margin-top:4px;">+ Add another item</button>
      <div class="field" style="margin-top:12px;"><label>Notes</label><input id="f-notes" placeholder="Optional"></div>
      <button class="btn amber" id="save-indent" style="width:100%; justify-content:center; margin-top:10px;">Raise Indent</button>
    `);

    const items_opts = items.map(i => `<option value="${i.id}">${esc(i.name)} — ${i.location === 'OFFICE' ? '🏢 Office' : '🏭 Godown'} (${i.stock_qty} ${esc(i.unit)})</option>`).join('');

    function renderLines() {
      document.getElementById('indent-lines').innerHTML = indentLines.map((l, idx) => `
        <div class="field-row" style="margin-bottom:6px; align-items:flex-end;">
          <div class="field" style="margin-bottom:0;"><select class="line-item" data-idx="${idx}">${items_opts}</select></div>
          <div class="field" style="margin-bottom:0; flex:0 0 80px;"><input class="line-qty" data-idx="${idx}" type="number" min="1" value="${l.qty}"></div>
        </div>
      `).join('');
      document.querySelectorAll('.line-item').forEach(s => s.value = indentLines[s.dataset.idx].item_id || s.options[0].value);
      document.querySelectorAll('.line-item').forEach(s => s.onchange = () => indentLines[s.dataset.idx].item_id = s.value);
      document.querySelectorAll('.line-qty').forEach(s => s.onchange = () => indentLines[s.dataset.idx].qty = Number(s.value));
    }
    renderLines();

    document.getElementById('add-line').onclick = () => { indentLines.push({ item_id: '', qty: 1 }); renderLines(); };

    document.getElementById('save-indent').onclick = () => {
      const party_id = document.getElementById('f-party').value;
      const lines = indentLines.filter(l => l.item_id && l.qty > 0);
      if (!lines.length) { toast('Add at least one item'); return; }
      Core.createIndent(party_id, lines, document.getElementById('f-notes').value.trim());
      closeModal(); toast('Indent raised'); render();
    };
  }

  function openPricingModal(indent_id) {
    const priced = Core.priceIndent(indent_id);
    showModal('Pricing (pulled from Inventory)', `
      <table>
        <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
        <tbody>
          ${priced.map(l => `<tr><td>${esc(l.name)}</td><td>${l.qty}</td><td>₹${l.rate}</td><td>₹${l.amount}</td></tr>`).join('')}
        </tbody>
      </table>
      <div style="text-align:right; font-weight:700; margin-top:10px; font-size:14px;">
        Total: ₹${priced.reduce((s, l) => s + l.amount, 0).toFixed(2)}
      </div>
      <div class="hint">Prices pulled live from the Inventory item master. Update prices there if these look off.</div>
      <button class="btn amber" id="close-pricing" style="width:100%; justify-content:center; margin-top:12px;">Done — status set to Priced</button>
    `);
    document.getElementById('close-pricing').onclick = () => { closeModal(); render(); };
  }

  function openGenerateModal(indent_id) {
    const indent = Core.getIndent(indent_id);
    const priced = indent.lines.map(l => {
      const item = Core.getItem(l.item_id);
      const rate = item ? item.sell_price : 0;
      return { item_id: l.item_id, name: item ? item.name : '', qty: l.qty, rate, amount: +(rate * l.qty).toFixed(2) };
    });
    showModal('Generate Document', `
      <div class="field"><label>Document Type</label>
        <select id="f-doctype">
          <option value="QTN">Quotation (needs confirm later)</option>
          <option value="PI">Proforma Invoice (needs confirm later)</option>
          <option value="CB">Cash Bill (confirms + deducts stock immediately)</option>
        </select>
      </div>
      <div class="hint" style="margin-bottom:10px;">Total: ₹${priced.reduce((s, l) => s + l.amount, 0).toFixed(2)}</div>
      <button class="btn amber" id="gen-doc" style="width:100%; justify-content:center;">Generate</button>
    `);
    document.getElementById('gen-doc').onclick = async () => {
      const genBtn = document.getElementById('gen-doc');
      genBtn.disabled = true; genBtn.textContent = 'Generating…';
      const doc_type = document.getElementById('f-doctype').value;
      const genResult = await Core.createQuotation(indent_id, doc_type, priced);
      if (genResult.ok === false) {
        closeModal();
        alert(`⚠ Could not generate the document number: ${genResult.error}\n\nNothing was saved — try again.`);
        return;
      }
      const { quotation: q, confirmResult } = genResult;
      closeModal();
      if (doc_type === 'CB' && !confirmResult.ok) {
        alert(`${q.doc_no} was created but could NOT confirm — stock unavailable for:\n\n` +
          confirmResult.failures.map(f => `• ${f.name}: ${f.error}`).join('\n') +
          `\n\nIt's saved as a pending Cash Bill — fix stock and confirm it from the Documents list.`);
      } else {
        toast(doc_type === 'CB' ? `${q.doc_no} confirmed — stock deducted` : `${q.doc_no} created — awaiting confirmation`);
      }
      render();
    };
  }

  return { render };
})();

/* ===== app.js ===== */
/* =========================================================================
   APP SHELL — navigation between the three capabilities + shared UI helpers.
   Nothing business-logic-specific lives here; that's all in core.js and the
   three module files. This file just wires the sidebar to the views.
   ========================================================================= */

function esc(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtDate(iso) { const d = new Date(iso); return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

/* ---------- shared distance helpers (Leads GPS + Diary road distance) ---------- */
function haversine(a, b, c, d) {
  const R = 6371, dLat = (c - a) * Math.PI / 180, dLng = (d - b) * Math.PI / 180;
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(a * Math.PI / 180) * Math.cos(c * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
}
// Real road distance via OSRM (free, no key). Falls back to haversine if offline.
async function roadDist(lat1, lng1, lat2, lng2) {
  if (!lat1 || !lng1 || !lat2 || !lng2) return null;
  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${lng1},${lat1};${lng2},${lat2}?overview=false`;
    const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const data = await res.json();
    if (data.code === 'Ok' && data.routes && data.routes[0]) return data.routes[0].distance / 1000;
  } catch (e) { }
  return haversine(lat1, lng1, lat2, lng2);
}
// points = [{lat,lng},...] -> returns [0, dist(0->1), dist(1->2), ...] in km
async function allRoadDists(points) {
  if (points.length < 2) return points.map(() => 0);
  const promises = [];
  for (let i = 1; i < points.length; i++) {
    const p = points[i - 1], q = points[i];
    promises.push((p.lat && p.lng && q.lat && q.lng) ? roadDist(+p.lat, +p.lng, +q.lat, +q.lng) : Promise.resolve(null));
  }
  return [0, ...(await Promise.all(promises))];
}

function showModal(title, bodyHtml) {
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.id = 'active-modal';
  bg.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>${esc(title)}</h3><button class="modal-close" id="modal-close-btn">✕</button></div>
      <div>${bodyHtml}</div>
    </div>
  `;
  bg.onclick = (e) => { if (e.target === bg) closeModal(); };
  document.body.appendChild(bg);
  document.getElementById('modal-close-btn').onclick = closeModal;
}
function closeModal() { const m = document.getElementById('active-modal'); if (m) m.remove(); }

const App = (() => {
  const views = {
    dashboard: { label: 'Dashboard', icon: '◆', render: renderDashboard },
    leads: { label: 'Leads & Clients', icon: '①', render: (p) => Leads.render(p) },
    inventory: { label: 'Inventory', icon: '②', render: (p) => Inventory.render(p) },
    quotation: { label: 'Quotation', icon: '③', render: (p) => Quotation.render(p) },
  };
  let current = 'dashboard';

  function init() {
    document.getElementById('nav').innerHTML = Object.entries(views).map(([key, v]) => `
      <button class="nav-item" data-view="${key}"><span class="n-icon">${v.icon}</span> ${v.label}</button>
    `).join('');
    Object.keys(views).forEach(key => {
      document.querySelector(`[data-view="${key}"]`).onclick = () => go(key);
    });
    document.addEventListener('core:change', () => { if (current === 'dashboard') renderDashboard(); });
    document.addEventListener('core:sync', renderSyncStatus);
    renderSyncStatus();
    Core.tryAutoConnectCloud();
    go('dashboard');
  }

  function renderSyncStatus() {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const s = Core.cloudStatus();
    let dot = '#7f8ea3', label = 'Not connected';
    if (s.enabled && s.syncing) { dot = '#e8a53d'; label = 'Syncing…'; }
    else if (s.enabled && s.error) { dot = '#b0463c'; label = 'Sync error'; }
    else if (s.enabled) { dot = '#3f7d5c'; label = 'Synced'; }
    el.innerHTML = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dot};margin-right:6px;"></span>${label}`;
    el.title = s.error || '';
  }

  function openSettingsModal() {
    const s = Core.cloudStatus();
    showModal('Cloud Sync Settings', `
      <div class="hint" style="margin-bottom:12px;">
        Paste your Supabase project URL and anon/public API key. Create a free project at
        <a href="https://supabase.com" target="_blank">supabase.com</a> and run the setup SQL first — see the README that came with this app.
      </div>
      <div class="field"><label>Supabase URL</label><input id="cfg-url" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Anon / Publishable Key</label><input id="cfg-key" placeholder="eyJ..."></div>
      <button class="btn amber" id="cfg-save" style="width:100%; justify-content:center; margin-top:6px;">Connect</button>
      <div class="hint" style="margin-top:10px;">Status: ${s.enabled ? (s.error ? 'Error — ' + esc(s.error) : 'Connected') : 'Not connected (working offline, this device only)'}</div>
    `);
    document.getElementById('cfg-save').onclick = () => {
      const url = document.getElementById('cfg-url').value.trim();
      const key = document.getElementById('cfg-key').value.trim();
      if (!url || !key) { toast('Both fields are required'); return; }
      Core.enableCloudSync(url, key);
      closeModal(); toast('Connecting to cloud…');
    };
  }

  function go(view, params = {}) {
    current = view;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    views[view].render(params);
  }

  function renderDashboard() {
    const main = document.getElementById('main');
    const parties = Core._db().parties;
    const items = Core._db().items;
    const quotations = Core._db().quotations;
    const leads = parties.filter(p => p.type === 'lead' && p.status !== 'Closed' && p.status !== 'Lost');
    const lowStock = Core.lowStockItems();
    const pendingConfirm = quotations.filter(q => q.status === 'draft');
    const confirmedValue = quotations.filter(q => q.status === 'confirmed').reduce((s, q) => s + q.total, 0);

    const today = new Date().toISOString().slice(0, 10);
    const active = parties.filter(p => (p.type === 'lead' || p.type === 'customer') && p.status !== 'Closed' && p.status !== 'Lost');
    const overdue = active.filter(p => p.nextFollowUp && p.nextFollowUp < today).sort((a, b) => a.nextFollowUp.localeCompare(b.nextFollowUp));
    const dueToday = active.filter(p => p.nextFollowUp === today);
    const upcoming = active.filter(p => p.nextFollowUp && p.nextFollowUp > today).sort((a, b) => a.nextFollowUp.localeCompare(b.nextFollowUp)).slice(0, 5);
    const urgentCount = overdue.length + dueToday.length;

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-desc">One system, one spine: Lead → Client → Indent → Pricing → Quotation → Stock-out / Won.</div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${leads.length}</div><div class="stat-label">Open Leads</div></div>
        <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-label">Items Tracked</div></div>
        <div class="stat"><div class="stat-num">${pendingConfirm.length}</div><div class="stat-label">Awaiting Confirmation</div></div>
        <div class="stat"><div class="stat-num">₹${confirmedValue}</div><div class="stat-label">Confirmed Sales Value</div></div>
      </div>

      <div class="card" style="${urgentCount ? 'border-color:#e6c9c5;' : ''}">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <div class="card-title" style="margin-bottom:0;">🔔 Follow-ups Due</div>
          ${urgentCount ? `<span class="badge lost">${urgentCount} urgent</span>` : `<span style="font-size:12px; color:var(--green);">✅ All clear</span>`}
        </div>
        <div id="reminders-list">${remindersHtml(overdue, dueToday, upcoming)}</div>
      </div>

      <div class="card">
        <div class="card-title">Pipeline</div>
        <div class="pipeline">
          <span class="pipe-step">Lead (${parties.filter(p=>p.type==='lead').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Client (${parties.filter(p=>p.type==='customer').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Indent (${Core._db().indents.length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Priced (${Core._db().indents.filter(i=>i.status!=='requested').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Quoted (${quotations.length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Confirmed (${quotations.filter(q=>q.status==='confirmed').length})</span>
        </div>
      </div>

      ${lowStock.length ? `
        <div class="card" style="border-color:#e6c9c5;">
          <div class="card-title" style="color:var(--red);">Low Stock</div>
          ${lowStock.map(i => `<div style="font-size:13px; padding:3px 0;">${esc(i.name)} — ${i.stock_qty} ${esc(i.unit)} left</div>`).join('')}
        </div>
      ` : ''}

      ${!parties.length ? `
        <div class="card">
          <div class="empty">Nothing here yet. <b>Start in Leads & Clients</b> to add your first lead, or <b>Inventory</b> to add items.</div>
        </div>
      ` : ''}
    `;

    document.querySelectorAll('.rm-call-btn').forEach(b => b.onclick = () => Leads.openCallForm(b.dataset.id));
    document.querySelectorAll('.rm-edit-btn').forEach(b => b.onclick = () => Leads.openLeadForm(b.dataset.id));
    document.querySelectorAll('.rm-nav-btn').forEach(b => b.onclick = () =>
      window.open(`https://www.google.com/maps/dir/?api=1&destination=${b.dataset.lat},${b.dataset.lng}&travelmode=driving`, '_blank'));
  }

  function remindersHtml(overdue, dueToday, upcoming) {
    if (!overdue.length && !dueToday.length && !upcoming.length) {
      return `<div class="empty">No active leads with follow-ups. <b>Set a follow-up date</b> from a lead's Edit screen to see it here.</div>`;
    }
    let html = '';
    if (overdue.length) html += sectionLabel('🔴 Overdue', overdue.length) + overdue.map(p => reminderCard(p, 'overdue')).join('');
    if (dueToday.length) html += sectionLabel('🟡 Due Today', dueToday.length) + dueToday.map(p => reminderCard(p, 'today')).join('');
    if (upcoming.length) html += sectionLabel('🔵 Upcoming', upcoming.length) + upcoming.map(p => reminderCard(p, 'upcoming')).join('');
    return html;
  }
  function sectionLabel(label, count) {
    return `<div style="font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-dim); margin:14px 0 6px;">${label} (${count})</div>`;
  }
  function reminderCard(p, kind) {
    const today = new Date().toISOString().slice(0, 10);
    const daysAgo = Math.round((new Date(today) - new Date(p.nextFollowUp)) / 86400000);
    const daysLeft = Math.round((new Date(p.nextFollowUp) - new Date(today)) / 86400000);
    const dueTxt = kind === 'overdue' ? (daysAgo === 1 ? '1 day overdue' : `${daysAgo} days overdue`)
      : kind === 'today' ? 'Follow up today' : (daysLeft === 1 ? 'Tomorrow' : `In ${daysLeft} days · ${fmtDate(p.nextFollowUp)}`);
    return `
      <div style="padding:10px 0; border-bottom:1px solid var(--paper-dim);">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
          <div>
            <b>${esc(p.company || p.name)}</b>
            <div style="font-size:11px; color:var(--ink-dim); margin-top:2px;">
              <span class="badge ${(p.status || 'new').toLowerCase()}">${esc(p.status)}</span>
              ${p.phone ? ' 📱 ' + esc(p.phone) : ''}
            </div>
          </div>
          <span class="tag ${kind === 'overdue' ? 'urg-overdue' : kind === 'today' ? 'urg-today' : 'urg-upcoming'}">${dueTxt}</span>
        </div>
        <div style="display:flex; gap:6px; margin-top:8px;">
          <button class="btn sm ghost rm-call-btn" data-id="${p.id}">📞 Log Call</button>
          ${p.lat && p.lng ? `<button class="btn sm ghost rm-nav-btn" data-lat="${p.lat}" data-lng="${p.lng}">🧭 Navigate</button>` : ''}
          <button class="btn sm ghost rm-edit-btn" data-id="${p.id}">✏️ Edit</button>
        </div>
      </div>
    `;
  }

  return { init, go };
})();

document.addEventListener('DOMContentLoaded', App.init);
  </script>
</body>
