<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSE — Unified System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --navy-950: #0d1b2e;
  --navy-800: #16304f;
  --navy-700: #1e3f66;
  --amber: #e8a53d;
  --amber-dark: #c98a26;
  --paper: #f6f4ef;
  --paper-dim: #eae7de;
  --ink: #1b2430;
  --ink-dim: #5c6672;
  --line: #dcd8cd;
  --green: #3f7d5c;
  --red: #b0463c;
  --radius: 6px;
  --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}

/* ---------- shell ---------- */
.shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--navy-950);
  color: #cfd8e3;
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  min-height: 100vh;
}
.brand {
  padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 12px;
}
.brand-mark {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--amber);
  text-transform: uppercase;
}
.brand-name {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  margin-top: 4px;
}
.brand-sub {
  font-size: 11px;
  color: #7f8ea3;
  margin-top: 2px;
}

.nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  color: #b7c2d1;
  text-decoration: none;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: var(--navy-700); color: #fff; }
.nav-item .n-icon { width: 16px; text-align: center; font-family: var(--mono); color: var(--amber); }

.nav-step {
  padding: 14px 20px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #5f6f85;
  text-transform: uppercase;
}

.main { flex: 1; padding: 28px 36px; max-width: 1180px; }

.page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--navy-950); }
.page-desc { font-size: 13px; color: var(--ink-dim); margin-top: 2px; }

/* ---------- pipeline strip ---------- */
.pipeline {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
}
.pipe-step {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.03em;
  color: var(--ink-dim);
  background: #fff;
  border: 1px solid var(--line);
  padding: 6px 12px;
  white-space: nowrap;
  border-radius: 3px;
}
.pipe-step.current { border-color: var(--amber); color: var(--navy-950); background: #fff8ec; font-weight: 600; }
.pipe-arrow { color: var(--ink-dim); padding: 0 6px; font-size: 12px; }

/* ---------- cards / tables ---------- */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 18px;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--navy-950); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-dim); padding: 8px 10px; border-bottom: 1px solid var(--line); }
td { padding: 9px 10px; border-bottom: 1px solid var(--paper-dim); vertical-align: middle; }
tr:hover td { background: #fbfaf7; }

.empty { padding: 30px 10px; text-align: center; color: var(--ink-dim); font-size: 13px; }
.empty b { color: var(--ink); }

/* ---------- form controls ---------- */
label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
input, select, textarea {
  width: 100%;
  font-family: var(--sans);
  font-size: 13.5px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #fff;
  color: var(--ink);
}
input:focus, select:focus, textarea:focus { outline: 2px solid var(--amber); outline-offset: 0; border-color: var(--amber); }
.field { margin-bottom: 12px; }
.field-row { display: flex; gap: 12px; }
.field-row > .field { flex: 1; }

button { font-family: var(--sans); cursor: pointer; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 4px; border: none;
  font-size: 13px; font-weight: 600;
  background: var(--navy-700); color: #fff;
}
.btn:hover { background: var(--navy-800); }
.btn.amber { background: var(--amber); color: var(--navy-950); }
.btn.amber:hover { background: var(--amber-dark); }
.btn.ghost { background: transparent; color: var(--navy-700); border: 1px solid var(--line); }
.btn.ghost:hover { background: var(--paper-dim); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn.danger { background: transparent; color: var(--red); border: 1px solid #e6c9c5; }

/* ---------- badges ---------- */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.badge.new { background: #e6edf7; color: var(--navy-700); }
.badge.uncontacted { background: #f6e4e2; color: var(--red); }
.badge.contacted { background: #ede7fb; color: #7c5cd1; }
.badge.quoted { background: #fdf1de; color: var(--amber-dark); }
.badge.agreed { background: #e2f0e8; color: var(--green); }
.badge.closed { background: #e2f0e8; color: var(--green); }
.badge.lost { background: #f6e4e2; color: var(--red); }
.badge.won { background: #e2f0e8; color: var(--green); }
.badge.active { background: #e2f0e8; color: var(--green); }
.badge.requested { background: #eee; color: var(--ink-dim); }
.badge.priced { background: #fdf1de; color: var(--amber-dark); }
.badge.draft { background: #eee; color: var(--ink-dim); }
.badge.rejected { background: #f6e4e2; color: var(--red); }
.badge.low { background: #f6e4e2; color: var(--red); }
.badge.confirmed { background: #e2f0e8; color: var(--green); }

.tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--paper-dim); color: var(--ink-dim); }
.tag.urg-overdue { background: #f6e4e2; color: var(--red); }
.tag.urg-today { background: #fdf1de; color: var(--amber-dark); }
.tag.urg-upcoming { background: #e6edf7; color: var(--navy-700); }

.stage-pill { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--line); background: #fff; color: var(--ink-dim); }
.stage-pill.on { border-color: var(--navy-700); color: var(--navy-700); background: #eef2f8; }
.stage-pill.lost.on { border-color: var(--red); color: var(--red); background: #f6e4e2; }
.stage-pill.uncontacted.on { border-color: var(--red); color: var(--red); background: #f6e4e2; }

.cat-opt { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
.cat-opt.on { border-color: var(--amber); background: #fff8ec; }
.cat-opt .c-icon { font-size: 20px; }
.cat-opt .c-label { font-weight: 700; font-size: 13px; color: var(--navy-950); }
.cat-opt .c-sub { font-size: 11px; color: var(--ink-dim); }

/* ---------- modal ---------- */
.modal-bg { position: fixed; inset: 0; background: rgba(13,27,46,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal { background: #fff; border-radius: 8px; padding: 24px; width: 460px; max-width: 92vw; max-height: 86vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-head h3 { margin: 0; font-size: 16px; color: var(--navy-950); }
.modal-close { background: none; border: none; font-size: 18px; color: var(--ink-dim); }

.hint { font-size: 12px; color: var(--ink-dim); margin-top: 10px; }
.stat-row { display: flex; gap: 14px; margin-bottom: 18px; }
.stat { flex: 1; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--navy-950); font-family: var(--mono); }
.stat-label { font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy-950); color: #fff; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

@media (max-width: 780px) {
  .shell { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; }
  .brand { display: none; }
  .nav { flex-direction: row; }
  .nav-step { display: none; }
  .main { padding: 16px; }
  .field-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">SGE · SSE</div>
        <div class="brand-name">Unified System</div>
        <div class="brand-sub">Lead → Client → Stock → Quotation</div>
      </div>
      <div id="nav" class="nav"></div>
      <div style="margin-top:auto; padding:14px 20px; border-top:1px solid rgba(255,255,255,0.08);">
        <div id="sync-status" style="font-size:11.5px; color:#b7c2d1;"></div>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>

  <script>
/* ===== core.js ===== */
/* =========================================================================
   SSE CORE — shared data model + pipeline logic
   Lead -> Client -> Indent -> Pricing (Inventory) -> Quotation -> Confirm
                                                          |
                                                          +--> Stock-out (Inventory)
                                                          +--> Lead Won   (Leads)

   Storage: localStorage now (offline-first, same pattern as the original
   three apps). Supabase sync hooks are stubbed at the bottom — fill in a
   project URL + key later and call Core.enableCloudSync() to turn it on.
   Every module (leads.js, inventory.js, quotation.js) reads/writes ONLY
   through this file. No module should touch localStorage directly.
   ========================================================================= */

const Core = (() => {

  const DB_KEY = 'sse_unified_v1';

  const uid = (p) => p + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const now = () => new Date().toISOString();

  /* ---------- schema / default state ---------- */
  function emptyDB() {
    return {
      parties: [],      // {id,name,phone,email,address,gst,type,status,source,notes,created_at,updated_at}
      items: [],        // {id,name,category,brand,unit,cost_price,sell_price,hsn,stock_qty,min_stock}
      indents: [],       // {id,party_id,lines:[{item_id,qty}],status,created_at,notes}
      quotations: [],    // {id,indent_id,party_id,doc_type,doc_no,date,lines:[{item_id,name,qty,rate,amount}],total,status,created_at,confirmed_at}
      stock_ledger: [],  // {id,item_id,type,qty,ref_type,ref_id,party_id,date,notes}
      activity: [],      // {id,party_id,type,note,date}  -- lightweight timeline entries
      calls: [],         // {id,party_id,outcome,notes,date,lat,lng}
      diary_stops: [],   // {id,date,label,notes,address,lat,lng,ts,type} type: start|stop|end
      price_catalog: []  // {id,brand,name,mrp,hsn} — Quotation's own sell-price catalog,
                          // deliberately separate from Inventory's stock items: a brand/item
                          // can be quotable at a known MRP without being tracked stock.
    };
  }

  let db = load();

  function load() {
    try {
      const raw = localStorage.getItem(DB_KEY);
      if (!raw) return emptyDB();
      const parsed = JSON.parse(raw);
      const merged = Object.assign(emptyDB(), parsed);
      migrateItems(merged);
      return merged;
    } catch (e) {
      console.error('Core: failed to load DB, starting fresh', e);
      return emptyDB();
    }
  }

  // one-time backward-compat: items saved before the min_stock rename
  // carried a low_stock_threshold field instead — carry that value over.
  function migrateItems(state) {
    (state.items || []).forEach(i => {
      if (i.min_stock === undefined && i.low_stock_threshold !== undefined) {
        i.min_stock = i.low_stock_threshold;
        delete i.low_stock_threshold;
      }
      if (i.min_stock === undefined) i.min_stock = 0;
      if (!i.location) i.location = 'GODOWN';
    });
  }

  function persist() {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
    if (cloud.enabled) cloud.pushDirty();
    document.dispatchEvent(new CustomEvent('core:change'));
  }

  /* ---------- PARTIES (Leads / Clients / Suppliers) ----------
     Field set and pipeline match the original standalone Lead Manager
     exactly, so this module behaves identically to what the team already
     knows, just now feeding the shared spine. */

  const PARTY_TYPES = ['lead', 'customer', 'supplier'];
  // 7-stage pipeline, verbatim from the original app.
  const PARTY_STATUS = ['New', 'Uncontacted', 'Contacted', 'Quoted', 'Agreed', 'Closed', 'Lost'];
  const STATUS_HEX = {
    'New': '#3b82f6', 'Uncontacted': '#ef4444', 'Contacted': '#a78bfa',
    'Quoted': '#f59e0b', 'Agreed': '#34d399', 'Closed': '#6ee7b7', 'Lost': '#ef4444'
  };
  // Construction-phase categories — tells sales what a site will need next.
  const CATEGORIES = [
    { key: 'Beginning', label: 'Beginning', sub: 'Pillars / Foundation', icon: '🧱' },
    { key: 'Intermediate', label: 'Intermediate', sub: 'Wall Construction', icon: '🏗️' },
    { key: 'Advanced', label: 'Advanced', sub: 'Plastering', icon: '🏠' }
  ];
  const SOURCES = ['Cold Call', 'Referral', 'Walk-in', 'WhatsApp', 'LinkedIn', 'Exhibition', 'Website', 'Other'];
  const LEAD_TYPES = ['New Site', 'Existing Client'];
  const CALL_OUTCOMES = ['No Answer', 'Callback Later', 'Not Interested', 'Interested', 'Meeting Fixed', 'Closed Deal'];

  function addParty({ name, phone, email = '', address = '', gst = '', type = 'lead', source = 'Cold Call',
    company = '', leadType = 'New Site', category = '', nextFollowUp = '', lat = '', lng = '', notes = '', role = '', status = null }) {
    if (!name || !name.trim()) throw new Error('Party name is required');
    const existing = findPartyByNameOrPhone(name, phone);
    if (existing) return existing; // avoid duplicate lead/client records
    const party = {
      id: uid('party'), name: name.trim(), phone: phone || '', email, address, gst,
      type, status: status || (type === 'lead' ? 'New' : 'Closed'), source, company, leadType, category,
      nextFollowUp, lat, lng, notes, role,
      created_at: now(), updated_at: now()
    };
    db.parties.push(party);
    logActivity(party.id, 'created', `Added as ${type}`);
    persist();
    return party;
  }

  function findPartyByNameOrPhone(name, phone) {
    const n = (name || '').trim().toLowerCase();
    const p = (phone || '').trim();
    return db.parties.find(x =>
      (p && x.phone && x.phone.trim() === p) ||
      (n && x.name.trim().toLowerCase() === n)
    ) || null;
  }

  function getParty(id) { return db.parties.find(p => p.id === id) || null; }
  function listParties(filter = {}) {
    return db.parties.filter(p =>
      (!filter.type || p.type === filter.type) &&
      (!filter.status || p.status === filter.status)
    ).sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  }

  function updatePartyStatus(id, status, note = '') {
    const party = getParty(id);
    if (!party) return;
    party.status = status;
    party.updated_at = now();
    logActivity(id, 'status', note || `Status changed to ${status}`);
    persist();
  }

  /** Lead -> Client conversion. Keeps same party id, just flips type/status
   *  so every indent/quotation already linked to this party carries over. */
  function convertLeadToClient(id) {
    const party = getParty(id);
    if (!party) return;
    party.type = 'customer';
    party.status = 'Closed';
    party.updated_at = now();
    logActivity(id, 'converted', 'Lead converted to client');
    persist();
    return party;
  }

  function updateParty(id, fields) {
    const party = getParty(id);
    if (!party) return;
    Object.assign(party, fields, { updated_at: now() });
    persist();
    return party;
  }

  function deleteParty(id) {
    db.parties = db.parties.filter(p => p.id !== id);
    db.calls = db.calls.filter(c => c.party_id !== id);
    persist();
  }

  function logActivity(party_id, type, note) {
    db.activity.push({ id: uid('act'), party_id, type, note, date: now() });
  }

  function getPartyTimeline(party_id) {
    const acts = db.activity.filter(a => a.party_id === party_id);
    const inds = db.indents.filter(i => i.party_id === party_id);
    const quos = db.quotations.filter(q => q.party_id === party_id);
    const calls = db.calls.filter(c => c.party_id === party_id);
    return [...acts, ...inds.map(i => ({ id: i.id, type: 'indent', note: `Indent (${i.status})`, date: i.created_at })),
      ...quos.map(q => ({ id: q.id, type: 'quotation', note: `${q.doc_type} ${q.doc_no} — ${q.status}`, date: q.created_at })),
      ...calls.map(c => ({ id: c.id, type: 'call', note: `Call — ${c.outcome}${c.notes ? ': ' + c.notes : ''}`, date: c.date }))]
      .sort((a, b) => a.date.localeCompare(b.date));
  }

  function addCall(party_id, { outcome, notes = '', lat = '', lng = '' }) {
    if (!getParty(party_id)) throw new Error('Unknown party for call');
    const call = { id: uid('call'), party_id, outcome, notes, lat, lng, date: now() };
    db.calls.push(call);
    logActivity(party_id, 'call', `Call logged — ${outcome}`);
    persist();
    return call;
  }
  function listCalls(party_id) {
    return db.calls.filter(c => c.party_id === party_id).sort((a, b) => b.date.localeCompare(a.date));
  }
  function deleteCall(id) {
    db.calls = db.calls.filter(c => c.id !== id);
    persist();
  }

  /* ---------- DIARY (daily route / visit log) ---------- */

  function getDiaryStops(date) {
    return db.diary_stops.filter(s => s.date === date).sort((a, b) => a.ts.localeCompare(b.ts));
  }
  function addDiaryStop(date, { label, notes = '', address = '', lat = '', lng = '', type }) {
    const stops = getDiaryStops(date);
    const isFirst = stops.length === 0;
    const stop = {
      id: uid('stop'), date, label, notes, address, lat, lng,
      ts: now(), type: isFirst ? 'start' : type
    };
    db.diary_stops.push(stop);
    persist();
    return stop;
  }
  function deleteDiaryStop(id) {
    db.diary_stops = db.diary_stops.filter(s => s.id !== id);
    persist();
  }
  function diaryDates() {
    return Array.from(new Set(db.diary_stops.map(s => s.date))).sort().reverse();
  }

  /* ---------- PRICE CATALOG (Quotation's own brand/item/MRP list) ---------- */

  function addCatalogItem({ brand, name, mrp = 0, hsn = '' }) {
    if (!brand || !name) throw new Error('Brand and item name are required');
    const item = { id: uid('cat'), brand: brand.trim(), name: name.trim(), mrp: Number(mrp) || 0, hsn: hsn.trim() };
    db.price_catalog.push(item);
    persist();
    return item;
  }
  function updateCatalogItem(id, fields) {
    const item = db.price_catalog.find(i => i.id === id);
    if (!item) return;
    Object.assign(item, fields);
    persist();
    return item;
  }
  function deleteCatalogItem(id) {
    db.price_catalog = db.price_catalog.filter(i => i.id !== id);
    persist();
  }
  function catalogBrands() {
    return Array.from(new Set(db.price_catalog.map(i => i.brand))).sort();
  }
  function catalogItemsForBrand(brand) {
    return db.price_catalog.filter(i => i.brand === brand).sort((a, b) => a.name.localeCompare(b.name));
  }

  /* ---------- pricing classification — brand-agnostic, driven by item NAME ----------
     Matches the original exactly: any brand automatically gets coil/colour/FR
     treatment as long as its item names follow the normal convention. */
  function getCoilLength(itemName) {
    const n = (itemName || '').toUpperCase();
    if (n.includes('90MTR')) return 90;
    if (n.includes('180MTR')) return 180;
    if (n.includes('200MTR')) return 200;
    if (n.includes('300MTR')) return 300;
    const m = n.match(/(\d{2,4})\s*MTR\b/);
    return m ? parseInt(m[1], 10) : null;
  }
  function isWireOrCableItemName(name) {
    const n = (name || '').toUpperCase();
    return /SQMM/.test(n) || /\bWIRE\b/.test(n) || /\bCABLE\b/.test(n);
  }
  function isArmouredOrFlexibleItemName(name) {
    const n = (name || '').toUpperCase();
    return /ARMOURED|FLEXIBLE/.test(n);
  }
  function getDisplayBrand(b) {
    if (!b) return b;
    if (b.startsWith('POLYCAB')) return 'POLYCAB';
    if (b.startsWith('KEI')) return 'KEI';
    return b.split(' - ')[0].trim();
  }
  function getHSN(brand, itemName) {
    const n = (itemName || '').toUpperCase();
    if (isWireOrCableItemName(itemName)) return '85446090';
    if (n.includes('SWITCH') || n.includes('SOCKET') || n.includes('REGULATOR') || n.includes('BELL PUSH') || n.includes('INDICATOR')) return '85365020';
    if (n.includes('MCB') || n.includes('MCCB') || n.includes('ISOLAT')) return '85362000';
    if (n.includes(' DB ') || n.endsWith('DB') || n.includes('PANEL') || n.includes('ENCLOSER')) return '85371000';
    if (n.includes('MODULE PLATE') || n.includes('BLANK PLATE') || n.includes(' PLATE')) return '85389000';
    if (n.includes('DOWN LIGHT') || n.includes('SKIRTING LIGHT') || n.includes('FOOT LAMP')) return '94051090';
    if (n.includes('RJ') || n.includes('TV SOCKET') || n.includes('TELEPHONE') || n.includes('USB')) return '85363090';
    return '85369090';
  }
  const WIRE_COLOUR_STYLES = {
    RED: 'background:#fff0f0;color:#c62828;font-weight:700', YELLOW: 'background:#fffde7;color:#f57f17;font-weight:700',
    BLUE: 'background:#e3f2fd;color:#1565c0;font-weight:700', BLACK: 'background:#f5f5f5;color:#212121;font-weight:700',
    GREEN: 'background:#e8f5e9;color:#2e7d32;font-weight:700'
  };
  function getColourStyle(colour) { return WIRE_COLOUR_STYLES[(colour || '').toUpperCase()] || 'background:#f3e5f5;color:#6a1b9a;font-weight:700'; }

  /** Computes every derived field for one quotation line the exact way the
   *  original's addItem() does: coil-priced wire (MRP ÷ coil length),
   *  armoured/flexible (priced per metre already), or a plain item. */
  function computeQuotationLine({ brand, itemName, mrp, unit, discPct, netOverride, qty, coilLenOverride, frType, colour, hsn: hsnOverride }) {
    const coilMRP = Number(mrp) || 0;
    const displayBrand = getDisplayBrand(brand);
    const coilLenDetected = getCoilLength(itemName);
    const isWireItem = isWireOrCableItemName(itemName);
    const isIndCopper = isWireItem && !!coilLenDetected;
    const isArmFlx = isWireItem && !coilLenDetected;
    const buildSuffix = base => frType ? `${base} ${frType}` : base;
    let perMtrRate = '-', displayUnit, displayMRP, description, showPerMtr = false, finalRate;
    const finalQty = Number(qty) || 0;

    if (isIndCopper) {
      const len = Number(coilLenOverride) || coilLenDetected || 1;
      let coilRate = netOverride ? Number(netOverride) : (discPct ? coilMRP - (coilMRP * Number(discPct) / 100) : coilMRP);
      perMtrRate = (coilRate / len).toFixed(2);
      description = buildSuffix(itemName);
      if (unit === 'MTRS') { displayUnit = 'MTRS'; displayMRP = (coilMRP / len).toFixed(2); showPerMtr = false; finalRate = +perMtrRate; }
      else { displayUnit = 'COIL'; displayMRP = coilMRP; showPerMtr = true; finalRate = coilRate; }
    } else if (isArmFlx) {
      let coilRate = netOverride ? Number(netOverride) : (discPct ? coilMRP - (coilMRP * Number(discPct) / 100) : coilMRP);
      perMtrRate = '-'; displayUnit = 'MTRS'; displayMRP = coilMRP; showPerMtr = false; description = buildSuffix(itemName); finalRate = coilRate;
    } else {
      let coilRate = netOverride ? Number(netOverride) : (discPct ? coilMRP - (coilMRP * Number(discPct) / 100) : coilMRP);
      perMtrRate = '-'; displayUnit = unit; displayMRP = coilMRP; showPerMtr = false; description = itemName; finalRate = coilRate;
    }
    const colourCell = (isIndCopper || isArmFlx) ? (colour || '—') : '-';
    const hsn = hsnOverride || getHSN(brand, itemName);
    const amount = +(finalRate * finalQty).toFixed(2);
    return {
      brand: displayBrand, description, colour: colourCell, hsn, unit: displayUnit,
      qty: finalQty, mrp: displayMRP, discount: discPct || 0, rate: +finalRate.toFixed(2),
      perMtr: perMtrRate, showPerMtr, amount, coilLen: isIndCopper ? (Number(coilLenOverride) || coilLenDetected || 1) : null,
      isWireItem, isIndCopper, isArmFlx
    };
  }

  /* ---------- per-brand MRP visibility — local device setting, matches original ---------- */
  function getBrandMrpVisibility() {
    try { return JSON.parse(localStorage.getItem('SSE_BRAND_MRP_VIS') || '{}'); } catch (e) { return {}; }

  function setBrandMrpVisibility(map) {

  /* ---------- ITEMS (Inventory master + pricing, shared by Quotation) ----------
     Brand + wire-colour / pipe-size matrix logic matches the original
     standalone Godown Inventory app exactly. */

  const WIRE_COLORS = ['RED', 'YELLOW', 'GREEN', 'BLUE', 'BLACK', 'WHITE', 'GREY'];
  const PIPE_SIZES = ['15MM', '20MM', '25MM', '32MM', '40MM', '50MM', '63MM', '75MM', '90MM', '100MM', '110MM', '125MM', '150MM', '160MM', '200MM'];
  const CS_BG = { RED: '#e53935', YELLOW: '#FDD835', GREEN: '#7CB342', BLUE: '#1E88E5', BLACK: '#212121', WHITE: '#f5f5f5', GREY: '#9E9E9E' };
  const CS_TX = { RED: '#fff', YELLOW: '#333', GREEN: '#fff', BLUE: '#fff', BLACK: '#FF8F00', WHITE: '#333', GREY: '#fff' };

  function isWire(item) { const n = (item.name || '').toUpperCase(); return n.includes('WIRE') || n.includes('SQMM') || n.includes('CABLE'); }
  function isPipe(item) { const n = (item.name || '').toUpperCase(); return n.includes('PIPE') || n.includes('CONDUIT') || n.includes('TUBE') || n.includes('PVC') || n.includes('CPVC') || n.includes('UPVC'); }
  function isPurePipe(item) { const n = item.name.toUpperCase(); return isPipe(item) && !n.includes('BEND') && !n.includes('FLEXIBLE'); }
  function baseName(name) {
    let n = name.toUpperCase();
    WIRE_COLORS.forEach(c => { n = n.replace(new RegExp('\\s+' + c + '$'), '').trim(); });
    return n;
  }
  function getPipeSize(name) { const n = (name || '').toUpperCase(); return PIPE_SIZES.find(s => n.includes(s)) || null; }

  function addItem({ name, category = '', brand = '', unit = 'Nos', cost_price = 0, sell_price = 0, hsn = '', min_stock = 0, location = 'GODOWN' }) {
    if (!name || !name.trim()) throw new Error('Item name is required');
    const item = {
      id: uid('item'), name: name.trim(), category, brand, unit,
      cost_price: Number(cost_price) || 0, sell_price: Number(sell_price) || 0,
      hsn, stock_qty: 0, min_stock: Number(min_stock) || 0, location
    };
    db.items.push(item);
    persist();
    return item;
  }

  function getItem(id) { return db.items.find(i => i.id === id) || null; }
  function listItems(filter = {}) {
    return db.items.filter(i => !filter.location || (i.location || 'GODOWN') === filter.location)
      .slice().sort((a, b) => a.name.localeCompare(b.name));

  function updateItemPrice(id, { cost_price, sell_price }) {
    const item = getItem(id);
    if (!item) return;
    if (cost_price !== undefined) item.cost_price = Number(cost_price) || 0;
    if (sell_price !== undefined) item.sell_price = Number(sell_price) || 0;
    persist();

  /* ---------- STOCK LEDGER (Inventory in/out — single source of truth) ---------- */

  /** The one path every stock-affecting action goes through. Applies the
   *  change optimistically (instant UI, same as before), then pushes just
   *  that ledger row to Supabase and waits for confirmation. If the server
   *  rejects it (e.g. the negative-stock guard trigger fires because
   *  another device already used up the stock), the local change is rolled
   *  back and the caller gets {ok:false, error} to show the user. If the
   *  device is offline, the optimistic change is kept and synced later —
   *  full offline conflict resolution isn't attempted. */
  async function stockMove(item_id, type, qty, opts = {}) {
    const item = getItem(item_id);
    if (!item) throw new Error('Unknown item for stock move');
    qty = Number(qty) || 0;
    if (qty <= 0) return { ok: false, error: 'Invalid quantity' };

    item.stock_qty += (type === 'in' ? qty : -qty);
    const row = {
      id: uid('stk'), item_id, type, qty,
      ref_type: opts.ref_type || 'manual', ref_id: opts.ref_id || null,
      party_id: opts.party_id || null, party_name: opts.party_name || '', operator: opts.operator || '',
      credit_days: Number(opts.credit_days) || 0, date: opts.date || now(), notes: opts.notes || ''
    };
    db.stock_ledger.push(row);
    persist();

    const result = await cloud.pushLedgerRowVerified(row);
    if (!result.ok) {
      // server rejected it — roll back the optimistic local change
      item.stock_qty -= (type === 'in' ? qty : -qty);
      db.stock_ledger = db.stock_ledger.filter(r => r.id !== row.id);
      persist();
    }
    return result;
  }

  /** Mirrors the original's autoSaveParty: if the typed name matches an
   *  existing party, upgrades its role if used as both supplier and
   *  customer; otherwise creates a lightweight party record so future
   *  entries autocomplete. Reuses the same shared parties table Leads
   *  uses — a supplier typed here shows up as a real party everywhere. */
  function autoSaveParty(name, role) {
    name = (name || '').trim();
    if (!name || name === 'INTERNAL TRANSFER') return;
    const existing = findPartyByNameOrPhone(name, '');
    if (existing) {
      if (existing.role !== 'BOTH' && existing.role && existing.role !== role) {
        existing.role = 'BOTH'; existing.updated_at = now();
      } else if (!existing.role) {
        existing.role = role; existing.updated_at = now();
      }
      return existing;
    }
    const party = {
      id: uid('party'), name, phone: '', email: '', address: '', gst: '',
      type: 'supplier', status: 'Closed', role, source: 'Stock Entry',
      company: '', leadType: '', category: '', nextFollowUp: '', lat: '', lng: '', notes: '',
      created_at: now(), updated_at: now()
    };
    db.parties.push(party);
    persist();
    return party;
  }
  function ledgerPartyNames() {
    return db.parties.map(p => p.name).filter(Boolean).sort();
  }

  function lowStockItems() {
    return db.items.filter(i => i.min_stock > 0 && i.stock_qty <= i.min_stock);
  }
  function itemBrands(location) {
    const scoped = location ? db.items.filter(i => (i.location || 'GODOWN') === location) : db.items;
    return Array.from(new Set(scoped.map(i => i.brand || 'Unknown Brand'))).sort();
  }

  /* ---------- DAMAGE / RETURN ----------
     DAMAGE = stock leaves (item was damaged). RETURN = stock comes back
     (a damaged item was replaced/returned to supplier and credited back). */
  async function recordDamageOrReturn(item_id, qty, entryType, { party_name = '', notes = '', date = null } = {}) {
    const item = getItem(item_id);
    if (!item) throw new Error('Unknown item');
    qty = Number(qty) || 0;
    if (qty <= 0) return { ok: false, error: 'Invalid quantity' };
    if (entryType === 'DAMAGE' && qty > item.stock_qty) return { ok: false, error: `Not enough stock. Available: ${item.stock_qty}` };
    const moveType = entryType === 'DAMAGE' ? 'out' : 'in';
    return stockMove(item_id, moveType, qty, { ref_type: entryType === 'DAMAGE' ? 'damage' : 'return', party_name, notes, date });
  }

  function listDamageLog(filter = {}) {
    return db.stock_ledger.filter(l => (l.ref_type === 'damage' || l.ref_type === 'return') &&
      (!filter.entryType || (filter.entryType === 'DAMAGE' ? l.ref_type === 'damage' : l.ref_type === 'return')))
      .sort((a, b) => b.date.localeCompare(a.date));
  }

  /* ---------- TRANSFER: moves stock between GODOWN and OFFICE.
     Auto-creates a matching item at the destination location if one
     doesn't already exist there (same name+brand). */
  async function transferStock(item_id, toLocation, qty, notes = '', date = null) {
    const item = getItem(item_id);
    if (!item) throw new Error('Unknown item');
    qty = Number(qty) || 0;
    if (qty <= 0) return { ok: false, error: 'Invalid quantity' };
    if (qty > item.stock_qty) return { ok: false, error: `Not enough stock. Available: ${item.stock_qty}` };
    const fromLocation = item.location || 'GODOWN';
    let dest = db.items.find(i => i.name === item.name && (i.brand || '') === (item.brand || '') && (i.location || 'GODOWN') === toLocation);
    if (!dest) {
      dest = { id: uid('item'), name: item.name, category: item.category, brand: item.brand, unit: item.unit,
        cost_price: item.cost_price, sell_price: item.sell_price, hsn: item.hsn, stock_qty: 0,
        min_stock: item.min_stock, location: toLocation };
      db.items.push(dest);
      persist();
    }
    const ts = date || now();
    const outResult = await stockMove(item.id, 'out', qty, { ref_type: 'transfer_out', ref_id: dest.id, party_name: `TRANSFER TO ${toLocation}`, notes, date: ts });
    if (!outResult.ok) return outResult;
    const inResult = await stockMove(dest.id, 'in', qty, { ref_type: 'transfer_in', ref_id: item.id, party_name: `TRANSFER FROM ${fromLocation}`, notes, date: ts });
    if (!inResult.ok) return inResult;
    return { ok: true, dest };
  }

  function listTransfers() {
    return db.stock_ledger.filter(l => l.ref_type === 'transfer_out').sort((a, b) => b.date.localeCompare(a.date));
  }

  /** Flags entries in a proposed batch that look like accidental re-submits:
   *  same item, qty, party, and day already logged. Matches the original's
   *  duplicate-detection warning shown before submit. */
  function findLikelyDuplicates(batch, moveType, dateStr) {
    return batch.filter(x => db.stock_ledger.some(l =>
      l.item_id === x.itemId && l.type === moveType && l.qty === x.qty &&
      (l.party_name || '') === x.partyName && (l.date || '').slice(0, 10) === dateStr));
  }

  /* ---------- LEDGER: party transaction history + bill grouping ---------- */

  function partyLedger(partyName, { type = '', from = '', to = '' } = {}) {
    let list = db.stock_ledger.filter(l => (l.party_name || '') === partyName && (l.ref_type === 'purchase' || l.ref_type === 'sale_manual'));
    if (type) list = list.filter(l => (type === 'IN' ? l.type === 'in' : l.type === 'out'));
    if (from) list = list.filter(l => l.date.slice(0, 10) >= from);
    if (to) list = list.filter(l => l.date.slice(0, 10) <= to);
    return list.sort((a, b) => b.date.localeCompare(a.date));
  }

  function calcMaturityDate(txnDate, creditDays) {
    if (!creditDays) return null;
    const d = new Date(txnDate.slice(0, 10) + 'T00:00:00');
    d.setDate(d.getDate() + creditDays);
    return d.toISOString().slice(0, 10);
  }
  function daysRemaining(maturityDate) {
    if (!maturityDate) return null;
    const today = new Date(new Date().toISOString().slice(0, 10));
    const maturity = new Date(maturityDate + 'T00:00:00');
    return Math.floor((maturity - today) / 86400000);
  }

  function billKeyOf(l) {
    const billNo = (l.notes || '').split(' | Remark: ')[0].trim();
    return `${l.type}||${l.party_name || ''}||${billNo}||${l.date.slice(0, 10)}`;
  }

  /** Groups raw ledger rows into bills the way the original does: one bill
   *  = same type + party + reference-note + date. Each bill carries its own
   *  credit days (taken from its rows), paid status, and computed status. */
  function groupIntoBills(rows) {
    const map = new Map();
    rows.forEach(l => {
      const key = billKeyOf(l);
      if (!map.has(key)) {
        map.set(key, {
          key, type: l.type, party: l.party_name || '',
          billNo: (l.notes || '').split(' | Remark: ')[0].trim(),
          date: l.date.slice(0, 10), creditDays: l.credit_days || 0,
          paid: !!l.is_paid, rows: []
        });
      }
      const bill = map.get(key);
      const item = getItem(l.item_id);
      bill.rows.push({ name: item ? item.name : '?', qty: l.qty, unit: item ? item.unit : '', id: l.id });
    });
    return Array.from(map.values());
  }
  function billStatus(b) {
    if (b.paid) return 'paid';
    if (!b.creditDays) return 'no-credit';
    const mat = calcMaturityDate(b.date, b.creditDays);
    const dr = mat ? daysRemaining(mat) : null;
    if (dr === null) return 'no-credit';
    if (dr < 0) return 'overdue';
    if (dr <= 7) return 'due-soon';
    return 'not-due';
  }
  function toggleBillPaid(billKey) {
    const newPaid = !billPaidState(billKey);
    db.stock_ledger.forEach(l => { if (billKeyOf(l) === billKey) l.is_paid = newPaid; });
    persist();
  }
  function billPaidState(billKey) {
    const row = db.stock_ledger.find(l => billKeyOf(l) === billKey);
    return row ? !!row.is_paid : false;
  }
  function supplierLedgerBills() { return groupIntoBills(db.stock_ledger.filter(l => l.ref_type === 'purchase')); }
  function customerLedgerBills() { return groupIntoBills(db.stock_ledger.filter(l => l.ref_type === 'sale_manual')); }

  /* ---------- INDENTS (what a client wants, before pricing) ---------- */

  function createIndent(party_id, lines, notes = '') {
    if (!getParty(party_id)) throw new Error('Unknown party for indent');
    const indent = {
      id: uid('ind'), party_id,
      lines: lines.map(l => ({ item_id: l.item_id, qty: Number(l.qty) || 0 })),
      status: 'requested', created_at: now(), notes
    };
    db.indents.push(indent);
    logActivity(party_id, 'indent', 'Indent raised');
    persist();
    return indent;
  }

  function listIndents(filter = {}) {
    return db.indents.filter(i => !filter.status || i.status === filter.status)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));
  }
  function getIndent(id) { return db.indents.find(i => i.id === id) || null; }

  /** Pull current sell price from Items for every line — the "Pricing pulls
   *  Inventory" step. Does not mutate the indent, just returns priced lines
   *  for the caller (Quotation) to use when building the document. */
  function priceIndent(indent_id) {
    const indent = getIndent(indent_id);
    if (!indent) throw new Error('Unknown indent');
    const priced = indent.lines.map(l => {
      const item = getItem(l.item_id);
      const rate = item ? item.sell_price : 0;
      return { item_id: l.item_id, name: item ? item.name : '(unknown item)', qty: l.qty, rate, amount: +(rate * l.qty).toFixed(2) };
    });
    indent.status = 'priced';
    persist();
    return priced;
  }

  /* ---------- QUOTATIONS ---------- */

  /* ---------- Document numbering — matches original exactly:
     SGE-SSE-{TYPE}-{serial padded 3}/{FY label}/{CUSTOMER NAME}
     Serial is per-party + per-doc-type + per-financial-year, starting from
     DOC_SERIAL_START (PI starts its own series at 100). A save retries up
     to 20 times on a doc_no collision (two people saving at once) — same
     server-verified pattern as stock moves. */
  const DOC_SERIAL_START = { QTN: 1, CB: 1, PI: 100 };

  function getFinancialYear(dateObj) {
    const y = dateObj.getFullYear(), m = dateObj.getMonth() + 1;
    const startYear = (m >= 4) ? y : y - 1;
    const endYear = startYear + 1;
    const pad2 = n => String(n).slice(-2);
    return { label: `${pad2(startYear)}-${pad2(endYear)}`, startStr: `${startYear}-04-01`, endExclusiveStr: `${endYear}-04-01` };
  }

  function nextDocSerialLocal(partyId, docType, fy) {
    const count = db.quotations.filter(q => q.party_id === partyId && q.doc_type === docType &&
      q.date.slice(0, 10) >= fy.startStr && q.date.slice(0, 10) < fy.endExclusiveStr).length;
    return (DOC_SERIAL_START[docType] || 1) + count;
  }

  /** Builds the doc number and inserts the quotation, retrying with the next
   *  serial if Supabase rejects it as a duplicate (requires a UNIQUE
   *  constraint on doc_no — see supabase-quotation-setup.sql). Falls back to
   *  a single local-only assignment if cloud sync isn't connected. */
  async function assignDocNoAndSave(quotation, isCmp) {
    const party = getParty(quotation.party_id);
    const custName = (party ? (party.company || party.name) : 'CUSTOMER').trim().toUpperCase();
    const dateObj = new Date(quotation.date || now());
    const fy = getFinancialYear(dateObj);
    let serial = nextDocSerialLocal(quotation.party_id, quotation.doc_type, fy);
    let lastError = null;
    for (let attempt = 0; attempt < 20; attempt++) {
      const docNo = `SGE-SSE-${quotation.doc_type}${isCmp ? '-CMP' : ''}-${String(serial + attempt).padStart(3, '0')}/${fy.label}/${custName}`;
      quotation.doc_no = docNo;
      if (!cloud.enabled) return { ok: true }; // offline/local-only: no collision possible to check against
      const result = await cloud.pushRowVerified('quotations', quotation);
      if (result.ok) return { ok: true };
      lastError = result.error;
      if (!/doc_no/i.test(result.error || '')) return { ok: false, error: result.error };
      // duplicate doc_no — loop and try the next serial
    }
    return { ok: false, error: lastError || 'Could not assign a unique document number after 20 attempts.' };
  }

  async function createQuotation(indent_id, doc_type, pricedLines) {
    const indent = getIndent(indent_id);
    if (!indent) throw new Error('Unknown indent');
    const total = +pricedLines.reduce((s, l) => s + l.amount, 0).toFixed(2);
    const quotation = {
      id: uid('quo'), indent_id, party_id: indent.party_id, doc_type,
      doc_no: '(assigning…)', date: now(), lines: pricedLines, total,
      status: 'draft', created_at: now(), confirmed_at: null
    };
    const numberResult = await assignDocNoAndSave(quotation, false);
    if (!numberResult.ok) return { ok: false, error: numberResult.error };

    db.quotations.push(quotation);
    indent.status = 'quoted';
    logActivity(indent.party_id, 'quotation', `${doc_type} ${quotation.doc_no} created — ₹${total}`);
    persist();

    // Cash Bill = money already changed hands -> confirm immediately.
    // Quotation / Proforma Invoice = still a proposal -> wait for explicit confirm.
    let confirmResult = { ok: true };
    if (doc_type === 'CB') confirmResult = await confirmQuotation(quotation.id);

    return { quotation, confirmResult };
  }

  function listQuotations(filter = {}) {
    return db.quotations.filter(q => !filter.status || q.status === filter.status)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));
  }
  function getQuotation(id) { return db.quotations.find(q => q.id === id) || null; }

  /** The loop-back: confirming a quotation deducts stock (existing Inventory
   *  stock-out concept) and marks the party Won (existing Lead concept).
   *  Each line is a server-verified stock move — if any item doesn't have
   *  enough real stock (e.g. sold on another device in the meantime), that
   *  line is rejected and reported, and the quotation is only marked
   *  confirmed if every line succeeded. */
  async function confirmQuotation(id) {
    const quotation = getQuotation(id);
    if (!quotation || quotation.status === 'confirmed') return { ok: true, quotation };
    const failures = [];
    for (const l of quotation.lines) {
      const result = await stockMove(l.item_id, 'out', l.qty, { ref_type: 'sale', ref_id: quotation.id, party_id: quotation.party_id, notes: `${quotation.doc_type} ${quotation.doc_no}` });
      if (!result.ok) failures.push({ item_id: l.item_id, name: l.name, error: result.error });
    }
    if (failures.length) {
      persist();
      return { ok: false, failures, quotation };
    }
    quotation.status = 'confirmed';
    quotation.confirmed_at = now();
    const indent = getIndent(quotation.indent_id);
    if (indent) indent.status = 'confirmed';
    const party = getParty(quotation.party_id);
    if (party && party.type === 'lead') {
      updatePartyStatus(party.id, 'Closed', `Won via ${quotation.doc_type} ${quotation.doc_no}`);
    } else {
      logActivity(quotation.party_id, 'sale', `${quotation.doc_type} ${quotation.doc_no} confirmed — ₹${quotation.total}`);
    }
    persist();
    return { ok: true, quotation };
  }

  function rejectQuotation(id, note = '') {
    const quotation = getQuotation(id);
    if (!quotation) return;
    quotation.status = 'rejected';
    logActivity(quotation.party_id, 'quotation', note || `${quotation.doc_type} ${quotation.doc_no} rejected`);
    persist();
  }

  /* ---------- cloud sync ----------
     Small-team pattern: on every change, push each table's full contents
     to Supabase (upsert). On load and every 20s, pull all tables down and
     merge in anything from other devices. Simple, not clever — fine for a
     handful of users on a small dataset. */
  const TABLES = ['parties', 'items', 'indents', 'quotations', 'stock_ledger', 'activity', 'calls', 'diary_stops', 'price_catalog'];
  // Baked-in defaults so every device auto-connects with zero setup.
  // Safe to have in client-side code — this is a publishable/anon key,
  // meant to be public; real protection comes from Row Level Security
  // policies on the Supabase side, not from hiding this value.
  const DEFAULT_CLOUD_URL = 'https://mfuagpygapzmjwjngjvy.supabase.co';
  const DEFAULT_CLOUD_KEY = 'sb_publishable_Azv64m9E5HSPWE_oQhC0Rw_xxMvQpE0';

  const cloud = {
    enabled: false, url: null, key: null, syncing: false, lastError: null,

    async init(url, key) {
      this.url = url.replace(/\/$/, ''); this.key = key; this.enabled = true;
      localStorage.setItem('sse_cloud_cfg', JSON.stringify({ url: this.url, key }));
      await this.pullAll();     // bring down anything already on the server
      this.pushDirty();         // then push up anything only local (e.g. data added before connecting)
      setInterval(() => this.pullAll(), 20000);
    },

    tryAutoConnect() {
      const raw = localStorage.getItem('sse_cloud_cfg');
      if (raw) {
        try { const cfg = JSON.parse(raw); this.init(cfg.url, cfg.key); return; } catch (e) {}
      }
      // no saved override — fall back to the baked-in project so this
      // works out of the box on any device, no settings screen needed.
      if (DEFAULT_CLOUD_URL && DEFAULT_CLOUD_KEY) this.init(DEFAULT_CLOUD_URL, DEFAULT_CLOUD_KEY);
    },

    headers() {
      // Supabase's newer sb_publishable_/sb_secret_ keys are not JWTs and
      // must go on the apikey header only — sending them as
      // "Authorization: Bearer sb_publishable_..." is rejected. (Legacy
      // eyJ... anon keys also work fine with just the apikey header, so
      // this is safe either way.)
      return { 'apikey': this.key, 'Content-Type': 'application/json' };
    },

    async pushTable(table) {
      if (!this.enabled) return;
      const rows = db[table];
      if (!rows.length) return;
      // stock_qty on 'items' is server-authoritative (computed by trigger
      // from stock_ledger) — never let the client's optimistic local value
      // overwrite it on push.
      const payload = table === 'items' ? rows.map(({ stock_qty, ...rest }) => rest) : rows;
      try {
        this.syncing = true;
        const res = await fetch(`${this.url}/rest/v1/${table}`, {
          method: 'POST',
          headers: Object.assign(this.headers(), { 'Prefer': 'resolution=merge-duplicates' }),
          body: JSON.stringify(payload)
        });
        this.lastError = res.ok ? null : await res.text();
      } catch (e) { this.lastError = e.message; }
      this.syncing = false;
      document.dispatchEvent(new CustomEvent('core:sync'));
    },

    /** Pushes a single row to any table and waits for Postgres to accept or
     *  reject it. Returns {ok:true} on success, {ok:true, offline:true} if
     *  unreachable (accepted optimistically, will sync later), or
     *  {ok:false, error} if the server actively rejected the row. */
    async pushRowVerified(table, row) {
      if (!this.enabled) return { ok: true };
      try {
        const res = await fetch(`${this.url}/rest/v1/${table}`, {
          method: 'POST',
          headers: Object.assign(this.headers(), { 'Prefer': 'return=minimal' }),
          body: JSON.stringify([row])
        });
        if (!res.ok) {
          const text = await res.text();
          return { ok: false, error: parseServerError(text) };
        }
        return { ok: true };
      } catch (e) {
        return { ok: true, offline: true };
      }
    },

    async pushLedgerRowVerified(row) { return this.pushRowVerified('stock_ledger', row); },

    pushDirty() { TABLES.forEach(t => this.pushTable(t)); },

    async pullAll() {
      if (!this.enabled) return;
      try {
        this.syncing = true;
        for (const table of TABLES) {
          const res = await fetch(`${this.url}/rest/v1/${table}?select=*`, { headers: this.headers() });
          if (!res.ok) { this.lastError = await res.text(); continue; }
          const remote = await res.json();
          mergeTable(table, remote);
        }
        this.lastError = null;
        migrateItems(db);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        document.dispatchEvent(new CustomEvent('core:change'));
      } catch (e) { this.lastError = e.message; }
      this.syncing = false;
      document.dispatchEvent(new CustomEvent('core:sync'));
    }
  };

  /** Merge remote rows into local table — simple last-id-wins union.
      Good enough for a small team where two people rarely edit the exact
      same record in the same few seconds. */
  function mergeTable(table, remoteRows) {
    const local = db[table];
    const byId = new Map(local.map(r => [r.id, r]));
    remoteRows.forEach(r => byId.set(r.id, r));
    db[table] = Array.from(byId.values());
  }

  function parseServerError(text) {
    try {
      const j = JSON.parse(text);
      return (j.message || j.hint || text).replace(/^P0001: /, '');
    } catch (e) { return text; }
  }

  function enableCloudSync(url, key) { cloud.init(url, key); }
  function cloudStatus() { return { enabled: cloud.enabled, syncing: cloud.syncing, error: cloud.lastError }; }
  function tryAutoConnectCloud() { cloud.tryAutoConnect(); }

  /* ---------- dev helper: reset ---------- */
  function _resetAll() { db = emptyDB(); persist(); }

  return {
    // parties
    addParty, getParty, listParties, updatePartyStatus, updateParty, deleteParty, convertLeadToClient, getPartyTimeline,
    PARTY_TYPES, PARTY_STATUS, STATUS_HEX, CATEGORIES, SOURCES, LEAD_TYPES, CALL_OUTCOMES,
    // calls
    addCall, listCalls, deleteCall,
    // diary
    getDiaryStops, addDiaryStop, deleteDiaryStop, diaryDates,
    // price catalog
    addCatalogItem, updateCatalogItem, deleteCatalogItem, catalogBrands, catalogItemsForBrand,
    // pricing helpers
    getCoilLength, isWireOrCableItemName, isArmouredOrFlexibleItemName, getDisplayBrand, getHSN,
    getColourStyle, computeQuotationLine, getBrandMrpVisibility, setBrandMrpVisibility, isBrandMrpVisible,
    getFinancialYear,
    // items
    addItem, getItem, listItems, updateItemPrice,
    WIRE_COLORS, PIPE_SIZES, CS_BG, CS_TX, isWire, isPipe, isPurePipe, baseName, getPipeSize, itemBrands,
    // stock
    stockMove, lowStockItems, recordDamageOrReturn, listDamageLog, transferStock, listTransfers,
    autoSaveParty, ledgerPartyNames, findLikelyDuplicates,
    partyLedger, calcMaturityDate, daysRemaining, groupIntoBills, billStatus, toggleBillPaid,
    supplierLedgerBills, customerLedgerBills,
    // indents
    createIndent, listIndents, getIndent, priceIndent,
    // quotations
    createQuotation, listQuotations, getQuotation, confirmQuotation, rejectQuotation,
    // cloud sync
    enableCloudSync, cloudStatus, tryAutoConnectCloud,
    // misc
    _resetAll, _db: () => db
  };
})();

  /** Matches the original standalone app's GPS logic exactly:
   *  - watches position instead of a single one-shot reading
   *  - discards first reading if it's a wild cell-tower guess (>500m)
   *  - needs at least 3 readings before trusting any of them
   *  - locks in early on ≤20m accuracy, else best of up to 15 readings
   *  - 40s hard timeout, then falls back to best reading so far
   *  - reverse-geocodes the final coordinates into a readable address */
  function getLocation(btn, disp) {
    if (!navigator.geolocation) { disp.textContent = 'GPS not available on this device/browser.'; return; }
    btn.textContent = '📡 Searching satellites…';
    btn.disabled = true;

    const readings = [];
    let watchId = null, settled = false;

    function finish(best) {
      if (settled) return;
      settled = true;
      if (watchId !== null) navigator.geolocation.clearWatch(watchId);
      clearTimeout(timer);
      const { latitude: lat, longitude: lng, accuracy } = best;
      const accText = accuracy < 15 ? '🎯 Precise' : accuracy < 40 ? '✅ Good' : accuracy < 100 ? '⚠️ Fair' : '📶 Coarse';
      btn.disabled = false;
      btn.textContent = `${accText} ±${Math.round(accuracy)}m — Recapture`;

      _locData = { lat: lat.toFixed(6), lng: lng.toFixed(6) };
      disp.textContent = `Locating address…`;

      fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
        { headers: { 'Accept-Language': 'en' } })
        .then(r => r.json())
        .then(data => {
          let shortAddr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
          if (data && data.address) {
            const a = data.address;
            const parts = [
              a.building || a.amenity || a.shop || a.office,
              a.house_number ? (a.road || '') + ' ' + a.house_number : (a.road || a.pedestrian || a.footway || a.path),
              a.suburb || a.neighbourhood || a.quarter || a.residential,
              a.city || a.town || a.village || a.county, a.state
            ].map(s => (s || '').trim()).filter(Boolean);
            shortAddr = parts.join(', ') || (data.display_name || '').split(',').slice(0, 4).join(',').trim();
          }
          disp.innerHTML = `📍 <b>${esc(shortAddr)}</b><br><span style="color:var(--ink-dim);">±${Math.round(accuracy)}m accuracy</span>`;
          _locData.address = shortAddr;
          const addrField = document.getElementById('lf-address');
          if (addrField && !addrField.value.trim()) addrField.value = shortAddr;
        })
        .catch(() => {
          const fallback = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
          disp.innerHTML = `📍 ${fallback}<br><span style="color:var(--ink-dim);">±${Math.round(accuracy)}m accuracy (offline — coords only)</span>`;
          _locData.address = fallback;
        });
    }

    const timer = setTimeout(() => {
      if (settled) return;
      if (readings.length > 0) finish(readings.reduce((b, r) => r.accuracy < b.accuracy ? r : b));
      else {
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        settled = true; btn.disabled = false; btn.textContent = '📍 Try Again';
        disp.textContent = 'GPS timeout. Step outside, keep phone still and retry.';
      }
    }, 40000);

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        if (settled) return;
        const c = pos.coords;
        if (readings.length === 0 && c.accuracy > 500) {
          btn.textContent = `📡 Weak signal (±${Math.round(c.accuracy)}m) — waiting for GPS…`;
          return;
        }
        readings.push(c);
        const count = readings.length;
        const a = Math.round(c.accuracy);
        btn.textContent = `📡 ±${a}m ${count >= 3 ? '— locking…' : '— warming up…'}`;
        if (count < 3) return;
        if (c.accuracy <= 20) { finish(c); return; }
        if (count >= 15) finish(readings.reduce((b, r) => r.accuracy < b.accuracy ? r : b));
      },
      (err) => {
        if (settled) return;
        clearTimeout(timer);
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        settled = true; btn.disabled = false; btn.textContent = '📍 Get GPS';
        disp.textContent = err.code === 1 ? 'Permission denied. Allow Location in browser settings.'
          : err.code === 2 ? 'GPS signal not found. Go outside and retry.'
          : 'GPS timed out. Step outside, keep phone still.';
      },
      { enableHighAccuracy: true, timeout: 40000, maximumAge: 0 }
    );
  }

    // stop cards
    let html = '';
    stops.forEach((stop, i) => {
      const isFirst = i === 0, prev = i > 0 ? stops[i - 1] : null;
      let travel = '';
      if (prev) {
        const tMins = Math.round((new Date(stop.ts) - new Date(prev.ts)) / 60000);
        const roadKm = dists[i] ? dists[i].toFixed(1) + ' km by road' : null;
        travel = `<div class="hint" style="margin:2px 0 2px 14px; border-left:2px dashed var(--line); padding-left:12px;">${tMins < 60 ? tMins + ' min' : (tMins / 60).toFixed(1) + ' hr'} travel${roadKm ? ' · 🛣️ ' + roadKm : ''}</div>`;
      }
      const dot = isFirst ? '🏢' : stop.type === 'end' ? '🏁' : '📍';
      const label = isFirst ? 'START' : stop.type === 'end' ? 'END' : 'STOP';
      html += travel + `

          <div style="font-size:20px;">${dot}</div>
          <div style="flex:1;">

      if (!confirm('Delete this stop?')) return;
      Core.deleteDiaryStop(b.dataset.id); toast('Stop deleted'); render();
    });

    // summary card with totals + downloadable text
    let totalMins = 0, totalDist = 0;
    for (let i = 1; i < stops.length; i++) {
      totalMins += Math.round((new Date(stops[i].ts) - new Date(stops[i - 1].ts)) / 60000);
      if (dists[i]) totalDist += dists[i];

    const hrs = Math.floor(totalMins / 60), mins = totalMins % 60;

  function buildSummaryText(stops, dists, totalDist, hrs, mins) {
    const readableDate = new Date(diaryDate + 'T00:00:00').toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    let lines = [`DAILY VISIT REPORT`, readableDate, ''];
    stops.forEach((stop, i) => {
      const mapsLink = (stop.lat && stop.lng) ? `https://maps.google.com/?q=${stop.lat},${stop.lng}` : null;
      if (i === 0) {
        lines.push(`Started from ${stop.label} — ${fmtDate(stop.ts)}`);
      } else {
        const prev = stops[i - 1];
        const tMins = Math.round((new Date(stop.ts) - new Date(prev.ts)) / 60000);
        const roadKm = dists[i] ? dists[i].toFixed(1) + ' km by road' : null;
        lines.push(`  -> ${tMins < 60 ? tMins + ' min' : (tMins / 60).toFixed(1) + ' hr'} travel${roadKm ? ' · ' + roadKm : ''}`);
        lines.push(`${stop.type === 'end' ? 'Returned to' : 'Visited'} ${stop.label} — ${fmtDate(stop.ts)}`);
      }
      if (stop.address) lines.push(`   ${stop.address}`);
      if (mapsLink) lines.push(`   ${mapsLink}`);
      if (stop.notes) lines.push(`   Note: ${stop.notes}`);
    });
    lines.push('', `Total Road Distance: ${totalDist.toFixed(1)} km`, `Total Duration: ${hrs > 0 ? hrs + 'h ' : ''}${mins} min`, `Total Stops: ${stops.length}`, '', `Generated by SSE Unified System`);
    return lines.join('\n');
  }

  function downloadSummary(text) {
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Visit_Report_${diaryDate}.txt`; a.click();
    URL.revokeObjectURL(url);
    toast('Report downloaded');
  }
  function shareSummary(text) {
    if (navigator.share) navigator.share({ title: `Visit Report — ${diaryDate}`, text }).catch(() => { });
    else navigator.clipboard.writeText(text).then(() => toast('Copied — paste into WhatsApp')).catch(() => toast('Copy not supported on this browser'));
  }
