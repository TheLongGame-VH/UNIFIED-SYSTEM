<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSE — Unified System</title>
<style>
:root {
  --navy-950: #0d1b2e;
  --navy-800: #16304f;
  --navy-700: #1e3f66;
  --amber: #e8a53d;
  --amber-dark: #c98a26;
  --paper: #f6f4ef;
  --paper-dim: #eae7de;
  --ink: #1b2430;
  --ink-dim: #5c6672;
  --line: #dcd8cd;
  --green: #3f7d5c;
  --red: #b0463c;
  --radius: 6px;
  --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}

/* ---------- shell ---------- */
.shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--navy-950);
  color: #cfd8e3;
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  min-height: 100vh;
}
.brand {
  padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 12px;
}
.brand-mark {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--amber);
  text-transform: uppercase;
}
.brand-name {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  margin-top: 4px;
}
.brand-sub {
  font-size: 11px;
  color: #7f8ea3;
  margin-top: 2px;
}

.nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  color: #b7c2d1;
  text-decoration: none;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: var(--navy-700); color: #fff; }
.nav-item .n-icon { width: 16px; text-align: center; font-family: var(--mono); color: var(--amber); }

.nav-step {
  padding: 14px 20px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #5f6f85;
  text-transform: uppercase;
}

.main { flex: 1; padding: 28px 36px; max-width: 1180px; }

.page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--navy-950); }
.page-desc { font-size: 13px; color: var(--ink-dim); margin-top: 2px; }

/* ---------- pipeline strip ---------- */
.pipeline {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
}
.pipe-step {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.03em;
  color: var(--ink-dim);
  background: #fff;
  border: 1px solid var(--line);
  padding: 6px 12px;
  white-space: nowrap;
  border-radius: 3px;
}
.pipe-step.current { border-color: var(--amber); color: var(--navy-950); background: #fff8ec; font-weight: 600; }
.pipe-arrow { color: var(--ink-dim); padding: 0 6px; font-size: 12px; }

/* ---------- cards / tables ---------- */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 18px;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--navy-950); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-dim); padding: 8px 10px; border-bottom: 1px solid var(--line); }
td { padding: 9px 10px; border-bottom: 1px solid var(--paper-dim); vertical-align: middle; }
tr:hover td { background: #fbfaf7; }

.empty { padding: 30px 10px; text-align: center; color: var(--ink-dim); font-size: 13px; }
.empty b { color: var(--ink); }

/* ---------- form controls ---------- */
label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
input, select, textarea {
  width: 100%;
  font-family: var(--sans);
  font-size: 13.5px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #fff;
  color: var(--ink);
}
input:focus, select:focus, textarea:focus { outline: 2px solid var(--amber); outline-offset: 0; border-color: var(--amber); }
.field { margin-bottom: 12px; }
.field-row { display: flex; gap: 12px; }
.field-row > .field { flex: 1; }

button { font-family: var(--sans); cursor: pointer; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 4px; border: none;
  font-size: 13px; font-weight: 600;
  background: var(--navy-700); color: #fff;
}
.btn:hover { background: var(--navy-800); }
.btn.amber { background: var(--amber); color: var(--navy-950); }
.btn.amber:hover { background: var(--amber-dark); }
.btn.ghost { background: transparent; color: var(--navy-700); border: 1px solid var(--line); }
.btn.ghost:hover { background: var(--paper-dim); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn.danger { background: transparent; color: var(--red); border: 1px solid #e6c9c5; }

/* ---------- badges ---------- */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.badge.new { background: #e6edf7; color: var(--navy-700); }
.badge.uncontacted { background: #f6e4e2; color: var(--red); }
.badge.contacted { background: #ede7fb; color: #7c5cd1; }
.badge.quoted { background: #fdf1de; color: var(--amber-dark); }
.badge.agreed { background: #e2f0e8; color: var(--green); }
.badge.closed { background: #e2f0e8; color: var(--green); }
.badge.lost { background: #f6e4e2; color: var(--red); }
.badge.won { background: #e2f0e8; color: var(--green); }
.badge.active { background: #e2f0e8; color: var(--green); }
.badge.requested { background: #eee; color: var(--ink-dim); }
.badge.priced { background: #fdf1de; color: var(--amber-dark); }
.badge.draft { background: #eee; color: var(--ink-dim); }
.badge.rejected { background: #f6e4e2; color: var(--red); }
.badge.low { background: #f6e4e2; color: var(--red); }
.badge.confirmed { background: #e2f0e8; color: var(--green); }

.tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--paper-dim); color: var(--ink-dim); }
.tag.urg-overdue { background: #f6e4e2; color: var(--red); }
.tag.urg-today { background: #fdf1de; color: var(--amber-dark); }
.tag.urg-upcoming { background: #e6edf7; color: var(--navy-700); }

.stage-pill { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1.5px solid var(--line); background: #fff; color: var(--ink-dim); }
.stage-pill.on { border-color: var(--navy-700); color: var(--navy-700); background: #eef2f8; }
.stage-pill.lost.on { border-color: var(--red); color: var(--red); background: #f6e4e2; }
.stage-pill.uncontacted.on { border-color: var(--red); color: var(--red); background: #f6e4e2; }

.cat-opt { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 8px; cursor: pointer; margin-bottom: 6px; }
.cat-opt.on { border-color: var(--amber); background: #fff8ec; }
.cat-opt .c-icon { font-size: 20px; }
.cat-opt .c-label { font-weight: 700; font-size: 13px; color: var(--navy-950); }
.cat-opt .c-sub { font-size: 11px; color: var(--ink-dim); }

/* ---------- modal ---------- */
.modal-bg { position: fixed; inset: 0; background: rgba(13,27,46,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal { background: #fff; border-radius: 8px; padding: 24px; width: 460px; max-width: 92vw; max-height: 86vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-head h3 { margin: 0; font-size: 16px; color: var(--navy-950); }
.modal-close { background: none; border: none; font-size: 18px; color: var(--ink-dim); }

.hint { font-size: 12px; color: var(--ink-dim); margin-top: 10px; }
.stat-row { display: flex; gap: 14px; margin-bottom: 18px; }
.stat { flex: 1; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--navy-950); font-family: var(--mono); }
.stat-label { font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy-950); color: #fff; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

@media (max-width: 780px) {
  .shell { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; }
  .brand { display: none; }
  .nav { flex-direction: row; }
  .nav-step { display: none; }
  .main { padding: 16px; }
  .field-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">SGE · SSE</div>
        <div class="brand-name">Unified System</div>
        <div class="brand-sub">Lead → Client → Stock → Quotation</div>
      </div>
      <div id="nav" class="nav"></div>
      <div style="margin-top:auto; padding:14px 20px; border-top:1px solid rgba(255,255,255,0.08);">
        <div id="sync-status" style="font-size:11.5px; color:#b7c2d1;"></div>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>

  <script>
/* ===== core.js ===== */
/* =========================================================================
   SSE CORE — shared data model + pipeline logic
   Lead -> Client -> Indent -> Pricing (Inventory) -> Quotation -> Confirm
                                                          |
                                                          +--> Stock-out (Inventory)
                                                          +--> Lead Won   (Leads)

   Storage: localStorage now (offline-first, same pattern as the original
   three apps). Supabase sync hooks are stubbed at the bottom — fill in a
   project URL + key later and call Core.enableCloudSync() to turn it on.
   Every module (leads.js, inventory.js, quotation.js) reads/writes ONLY
   through this file. No module should touch localStorage directly.
   ========================================================================= */

const Core = (() => {

  const DB_KEY = 'sse_unified_v1';

  const uid = (p) => p + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const now = () => new Date().toISOString();

  /* ---------- schema / default state ---------- */
  function emptyDB() {
    return {
      parties: [],      // {id,name,phone,email,address,gst,type,status,source,notes,created_at,updated_at}
      items: [],        // {id,name,category,brand,unit,cost_price,sell_price,hsn,stock_qty,low_stock_threshold}
      indents: [],       // {id,party_id,lines:[{item_id,qty}],status,created_at,notes}
      quotations: [],    // {id,indent_id,party_id,doc_type,doc_no,date,lines:[{item_id,name,qty,rate,amount}],total,status,created_at,confirmed_at}
      stock_ledger: [],  // {id,item_id,type,qty,ref_type,ref_id,party_id,date,notes}
      activity: [],      // {id,party_id,type,note,date}  -- lightweight timeline entries
      calls: []          // {id,party_id,outcome,notes,date,lat,lng}
    };
  }

  let db = load();

  function load() {
    try {
      const raw = localStorage.getItem(DB_KEY);
      if (!raw) return emptyDB();
      const parsed = JSON.parse(raw);
      // guard against missing keys if schema grows later
      return Object.assign(emptyDB(), parsed);
    } catch (e) {
      console.error('Core: failed to load DB, starting fresh', e);
      return emptyDB();
    }
  }

  function persist() {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
    if (cloud.enabled) cloud.pushDirty();
    document.dispatchEvent(new CustomEvent('core:change'));
  }

  /* ---------- PARTIES (Leads / Clients / Suppliers) ----------
     Field set and pipeline match the original standalone Lead Manager
     exactly, so this module behaves identically to what the team already
     knows, just now feeding the shared spine. */

  const PARTY_TYPES = ['lead', 'customer', 'supplier'];
  // 7-stage pipeline, verbatim from the original app.
  const PARTY_STATUS = ['New', 'Uncontacted', 'Contacted', 'Quoted', 'Agreed', 'Closed', 'Lost'];
  const STATUS_HEX = {
    'New': '#3b82f6', 'Uncontacted': '#ef4444', 'Contacted': '#a78bfa',
    'Quoted': '#f59e0b', 'Agreed': '#34d399', 'Closed': '#6ee7b7', 'Lost': '#ef4444'
  };
  // Construction-phase categories — tells sales what a site will need next.
  const CATEGORIES = [
    { key: 'Beginning', label: 'Beginning', sub: 'Pillars / Foundation', icon: '🧱' },
    { key: 'Intermediate', label: 'Intermediate', sub: 'Wall Construction', icon: '🏗️' },
    { key: 'Advanced', label: 'Advanced', sub: 'Plastering', icon: '🏠' }
  ];
  const SOURCES = ['Cold Call', 'Referral', 'Walk-in', 'WhatsApp', 'LinkedIn', 'Exhibition', 'Website', 'Other'];
  const LEAD_TYPES = ['New Site', 'Existing Client'];
  const CALL_OUTCOMES = ['No Answer', 'Callback Later', 'Not Interested', 'Interested', 'Meeting Fixed', 'Closed Deal'];

  function addParty({ name, phone, email = '', address = '', gst = '', type = 'lead', source = 'Cold Call',
    company = '', leadType = 'New Site', category = '', nextFollowUp = '', lat = '', lng = '', notes = '' }) {
    if (!name || !name.trim()) throw new Error('Party name is required');
    const existing = findPartyByNameOrPhone(name, phone);
    if (existing) return existing; // avoid duplicate lead/client records
    const party = {
      id: uid('party'), name: name.trim(), phone: phone || '', email, address, gst,
      type, status: type === 'lead' ? 'New' : 'Closed', source, company, leadType, category,
      nextFollowUp, lat, lng, notes,
      created_at: now(), updated_at: now()
    };
    db.parties.push(party);
    logActivity(party.id, 'created', `Added as ${type}`);
    persist();
    return party;
  }

  function findPartyByNameOrPhone(name, phone) {
    const n = (name || '').trim().toLowerCase();
    const p = (phone || '').trim();
    return db.parties.find(x =>
      (p && x.phone && x.phone.trim() === p) ||
      (n && x.name.trim().toLowerCase() === n)
    ) || null;
  }

  function getParty(id) { return db.parties.find(p => p.id === id) || null; }
  function listParties(filter = {}) {
    return db.parties.filter(p =>
      (!filter.type || p.type === filter.type) &&
      (!filter.status || p.status === filter.status)
    ).sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  }

  function updatePartyStatus(id, status, note = '') {
    const party = getParty(id);
    if (!party) return;
    party.status = status;
    party.updated_at = now();
    logActivity(id, 'status', note || `Status changed to ${status}`);
    persist();
  }

  /** Lead -> Client conversion. Keeps same party id, just flips type/status
   *  so every indent/quotation already linked to this party carries over. */
  function convertLeadToClient(id) {
    const party = getParty(id);
    if (!party) return;
    party.type = 'customer';
    party.status = 'Closed';
    party.updated_at = now();
    logActivity(id, 'converted', 'Lead converted to client');
    persist();
    return party;
  }

  function updateParty(id, fields) {
    const party = getParty(id);
    if (!party) return;
    Object.assign(party, fields, { updated_at: now() });
    persist();
    return party;
  }

  function deleteParty(id) {
    db.parties = db.parties.filter(p => p.id !== id);
    db.calls = db.calls.filter(c => c.party_id !== id);
    persist();
  }

  function logActivity(party_id, type, note) {
    db.activity.push({ id: uid('act'), party_id, type, note, date: now() });
  }

  function getPartyTimeline(party_id) {
    const acts = db.activity.filter(a => a.party_id === party_id);
    const inds = db.indents.filter(i => i.party_id === party_id);
    const quos = db.quotations.filter(q => q.party_id === party_id);
    const calls = db.calls.filter(c => c.party_id === party_id);
    return [...acts, ...inds.map(i => ({ id: i.id, type: 'indent', note: `Indent (${i.status})`, date: i.created_at })),
      ...quos.map(q => ({ id: q.id, type: 'quotation', note: `${q.doc_type} ${q.doc_no} — ${q.status}`, date: q.created_at })),
      ...calls.map(c => ({ id: c.id, type: 'call', note: `Call — ${c.outcome}${c.notes ? ': ' + c.notes : ''}`, date: c.date }))]
      .sort((a, b) => a.date.localeCompare(b.date));
  }

  function addCall(party_id, { outcome, notes = '', lat = '', lng = '' }) {
    if (!getParty(party_id)) throw new Error('Unknown party for call');
    const call = { id: uid('call'), party_id, outcome, notes, lat, lng, date: now() };
    db.calls.push(call);
    logActivity(party_id, 'call', `Call logged — ${outcome}`);
    persist();
    return call;
  }
  function listCalls(party_id) {
    return db.calls.filter(c => c.party_id === party_id).sort((a, b) => b.date.localeCompare(a.date));
  }
  function deleteCall(id) {
    db.calls = db.calls.filter(c => c.id !== id);
    persist();
  }

  /* ---------- ITEMS (Inventory master + pricing, shared by Quotation) ---------- */

  function addItem({ name, category = '', brand = '', unit = 'Nos', cost_price = 0, sell_price = 0, hsn = '', low_stock_threshold = 0 }) {
    if (!name || !name.trim()) throw new Error('Item name is required');
    const item = {
      id: uid('item'), name: name.trim(), category, brand, unit,
      cost_price: Number(cost_price) || 0, sell_price: Number(sell_price) || 0,
      hsn, stock_qty: 0, low_stock_threshold: Number(low_stock_threshold) || 0
    };
    db.items.push(item);
    persist();
    return item;
  }

  function getItem(id) { return db.items.find(i => i.id === id) || null; }
  function listItems() { return db.items.slice().sort((a, b) => a.name.localeCompare(b.name)); }

  function updateItemPrice(id, { cost_price, sell_price }) {
    const item = getItem(id);
    if (!item) return;
    if (cost_price !== undefined) item.cost_price = Number(cost_price) || 0;
    if (sell_price !== undefined) item.sell_price = Number(sell_price) || 0;
    persist();
  }

  /* ---------- STOCK LEDGER (Inventory in/out — single source of truth) ---------- */

  function stockMove(item_id, type, qty, { ref_type = 'manual', ref_id = null, party_id = null, notes = '' } = {}) {
    const item = getItem(item_id);
    if (!item) throw new Error('Unknown item for stock move');
    qty = Number(qty) || 0;
    if (qty <= 0) return;
    item.stock_qty += (type === 'in' ? qty : -qty);
    db.stock_ledger.push({
      id: uid('stk'), item_id, type, qty, ref_type, ref_id, party_id, date: now(), notes
    });
    persist();
  }

  function lowStockItems() {
    return db.items.filter(i => i.low_stock_threshold > 0 && i.stock_qty <= i.low_stock_threshold);
  }

  /* ---------- INDENTS (what a client wants, before pricing) ---------- */

  function createIndent(party_id, lines, notes = '') {
    if (!getParty(party_id)) throw new Error('Unknown party for indent');
    const indent = {
      id: uid('ind'), party_id,
      lines: lines.map(l => ({ item_id: l.item_id, qty: Number(l.qty) || 0 })),
      status: 'requested', created_at: now(), notes
    };
    db.indents.push(indent);
    logActivity(party_id, 'indent', 'Indent raised');
    persist();
    return indent;
  }

  function listIndents(filter = {}) {
    return db.indents.filter(i => !filter.status || i.status === filter.status)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));
  }
  function getIndent(id) { return db.indents.find(i => i.id === id) || null; }

  /** Pull current sell price from Items for every line — the "Pricing pulls
   *  Inventory" step. Does not mutate the indent, just returns priced lines
   *  for the caller (Quotation) to use when building the document. */
  function priceIndent(indent_id) {
    const indent = getIndent(indent_id);
    if (!indent) throw new Error('Unknown indent');
    const priced = indent.lines.map(l => {
      const item = getItem(l.item_id);
      const rate = item ? item.sell_price : 0;
      return { item_id: l.item_id, name: item ? item.name : '(unknown item)', qty: l.qty, rate, amount: +(rate * l.qty).toFixed(2) };
    });
    indent.status = 'priced';
    persist();
    return priced;
  }

  /* ---------- QUOTATIONS ---------- */

  function nextDocNo(doc_type) {
    const count = db.quotations.filter(q => q.doc_type === doc_type).length + 1;
    const prefix = { QTN: 'QTN', CB: 'CB', PI: 'PI' }[doc_type] || 'DOC';
    const yr = new Date().getFullYear();
    return `${prefix}-${yr}-${String(count).padStart(3, '0')}`;
  }

  function createQuotation(indent_id, doc_type, pricedLines) {
    const indent = getIndent(indent_id);
    if (!indent) throw new Error('Unknown indent');
    const total = +pricedLines.reduce((s, l) => s + l.amount, 0).toFixed(2);
    const quotation = {
      id: uid('quo'), indent_id, party_id: indent.party_id, doc_type,
      doc_no: nextDocNo(doc_type), date: now(), lines: pricedLines, total,
      status: 'draft', created_at: now(), confirmed_at: null
    };
    db.quotations.push(quotation);
    indent.status = 'quoted';
    logActivity(indent.party_id, 'quotation', `${doc_type} ${quotation.doc_no} created — ₹${total}`);
    persist();

    // Cash Bill = money already changed hands -> confirm immediately.
    // Quotation / Proforma Invoice = still a proposal -> wait for explicit confirm.
    if (doc_type === 'CB') confirmQuotation(quotation.id);

    return quotation;
  }

  function listQuotations(filter = {}) {
    return db.quotations.filter(q => !filter.status || q.status === filter.status)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));
  }
  function getQuotation(id) { return db.quotations.find(q => q.id === id) || null; }

  /** The loop-back: confirming a quotation deducts stock (existing Inventory
   *  stock-out concept) and marks the party Won (existing Lead concept). */
  function confirmQuotation(id) {
    const quotation = getQuotation(id);
    if (!quotation || quotation.status === 'confirmed') return quotation;
    quotation.lines.forEach(l => {
      stockMove(l.item_id, 'out', l.qty, { ref_type: 'sale', ref_id: quotation.id, party_id: quotation.party_id, notes: `${quotation.doc_type} ${quotation.doc_no}` });
    });
    quotation.status = 'confirmed';
    quotation.confirmed_at = now();
    const indent = getIndent(quotation.indent_id);
    if (indent) indent.status = 'confirmed';
    const party = getParty(quotation.party_id);
    if (party && party.type === 'lead') {
      updatePartyStatus(party.id, 'Closed', `Won via ${quotation.doc_type} ${quotation.doc_no}`);
    } else {
      logActivity(quotation.party_id, 'sale', `${quotation.doc_type} ${quotation.doc_no} confirmed — ₹${quotation.total}`);
    }
    persist();
    return quotation;
  }

  function rejectQuotation(id, note = '') {
    const quotation = getQuotation(id);
    if (!quotation) return;
    quotation.status = 'rejected';
    logActivity(quotation.party_id, 'quotation', note || `${quotation.doc_type} ${quotation.doc_no} rejected`);
    persist();
  }

  /* ---------- cloud sync ----------
     Small-team pattern: on every change, push each table's full contents
     to Supabase (upsert). On load and every 20s, pull all tables down and
     merge in anything from other devices. Simple, not clever — fine for a
     handful of users on a small dataset. */
  const TABLES = ['parties', 'items', 'indents', 'quotations', 'stock_ledger', 'activity', 'calls'];
  // Baked-in defaults so every device auto-connects with zero setup.
  // Safe to have in client-side code — this is a publishable/anon key,
  // meant to be public; real protection comes from Row Level Security
  // policies on the Supabase side, not from hiding this value.
  const DEFAULT_CLOUD_URL = 'https://mfuagpygapzmjwjngjvy.supabase.co';
  const DEFAULT_CLOUD_KEY = 'sb_publishable_Azv64m9E5HSPWE_oQhC0Rw_xxMvQpE0';

  const cloud = {
    enabled: false, url: null, key: null, syncing: false, lastError: null,

    async init(url, key) {
      this.url = url.replace(/\/$/, ''); this.key = key; this.enabled = true;
      localStorage.setItem('sse_cloud_cfg', JSON.stringify({ url: this.url, key }));
      await this.pullAll();     // bring down anything already on the server
      this.pushDirty();         // then push up anything only local (e.g. data added before connecting)
      setInterval(() => this.pullAll(), 20000);
    },

    tryAutoConnect() {
      const raw = localStorage.getItem('sse_cloud_cfg');
      if (raw) {
        try { const cfg = JSON.parse(raw); this.init(cfg.url, cfg.key); return; } catch (e) {}
      }
      // no saved override — fall back to the baked-in project so this
      // works out of the box on any device, no settings screen needed.
      if (DEFAULT_CLOUD_URL && DEFAULT_CLOUD_KEY) this.init(DEFAULT_CLOUD_URL, DEFAULT_CLOUD_KEY);
    },

    headers() {
      // Supabase's newer sb_publishable_/sb_secret_ keys are not JWTs and
      // must go on the apikey header only — sending them as
      // "Authorization: Bearer sb_publishable_..." is rejected. (Legacy
      // eyJ... anon keys also work fine with just the apikey header, so
      // this is safe either way.)
      return { 'apikey': this.key, 'Content-Type': 'application/json' };
    },

    async pushTable(table) {
      if (!this.enabled) return;
      const rows = db[table];
      if (!rows.length) return;
      try {
        this.syncing = true;
        const res = await fetch(`${this.url}/rest/v1/${table}`, {
          method: 'POST',
          headers: Object.assign(this.headers(), { 'Prefer': 'resolution=merge-duplicates' }),
          body: JSON.stringify(rows)
        });
        this.lastError = res.ok ? null : await res.text();
      } catch (e) { this.lastError = e.message; }
      this.syncing = false;
      document.dispatchEvent(new CustomEvent('core:sync'));
    },

    pushDirty() { TABLES.forEach(t => this.pushTable(t)); },

    async pullAll() {
      if (!this.enabled) return;
      try {
        this.syncing = true;
        for (const table of TABLES) {
          const res = await fetch(`${this.url}/rest/v1/${table}?select=*`, { headers: this.headers() });
          if (!res.ok) { this.lastError = await res.text(); continue; }
          const remote = await res.json();
          mergeTable(table, remote);
        }
        this.lastError = null;
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        document.dispatchEvent(new CustomEvent('core:change'));
      } catch (e) { this.lastError = e.message; }
      this.syncing = false;
      document.dispatchEvent(new CustomEvent('core:sync'));
    }
  };

  /** Merge remote rows into local table — simple last-id-wins union.
      Good enough for a small team where two people rarely edit the exact
      same record in the same few seconds. */
  function mergeTable(table, remoteRows) {
    const local = db[table];
    const byId = new Map(local.map(r => [r.id, r]));
    remoteRows.forEach(r => byId.set(r.id, r));
    db[table] = Array.from(byId.values());
  }

  function enableCloudSync(url, key) { cloud.init(url, key); }
  function cloudStatus() { return { enabled: cloud.enabled, syncing: cloud.syncing, error: cloud.lastError }; }
  function tryAutoConnectCloud() { cloud.tryAutoConnect(); }

  /* ---------- dev helper: reset ---------- */
  function _resetAll() { db = emptyDB(); persist(); }

  return {
    // parties
    addParty, getParty, listParties, updatePartyStatus, updateParty, deleteParty, convertLeadToClient, getPartyTimeline,
    PARTY_TYPES, PARTY_STATUS, STATUS_HEX, CATEGORIES, SOURCES, LEAD_TYPES, CALL_OUTCOMES,
    // calls
    addCall, listCalls, deleteCall,
    // items
    addItem, getItem, listItems, updateItemPrice,
    // stock
    stockMove, lowStockItems,
    // indents
    createIndent, listIndents, getIndent, priceIndent,
    // quotations
    createQuotation, listQuotations, getQuotation, confirmQuotation, rejectQuotation,
    // cloud sync
    enableCloudSync, cloudStatus, tryAutoConnectCloud,
    // misc
    _resetAll, _db: () => db
  };
})();

/* ===== leads.js ===== */
/* =========================================================================
   LEADS / CLIENTS module
   Rebuilt to match the original standalone Lead Manager exactly: 7-stage
   pipeline, construction-phase categories, sources, lead type, follow-up
   urgency filters, GPS capture, and call logging.
   Pipeline stage 1 of the unified system: Lead -> Client
   ========================================================================= */

const Leads = (() => {

  let typeFilter = 'lead';      // 'lead' | 'customer'
  let statusFilter = 'All';
  let catFilter = 'All';
  let urgencyFilter = 'All';

  function todayStr() { return new Date().toISOString().slice(0, 10); }

  function render() {
    const main = document.getElementById('main');
    let leads = Core.listParties({ type: typeFilter });

    if (statusFilter !== 'All') leads = leads.filter(l => l.status === statusFilter);
    if (catFilter !== 'All') leads = leads.filter(l => l.category === catFilter);
    if (urgencyFilter !== 'All') {
      const today = todayStr();
      leads = leads.filter(l => {
        if (urgencyFilter === 'overdue') return l.nextFollowUp && l.nextFollowUp < today && l.status !== 'Closed' && l.status !== 'Lost';
        if (urgencyFilter === 'today') return l.nextFollowUp === today;
        if (urgencyFilter === 'upcoming') return l.nextFollowUp && l.nextFollowUp > today;
        return true;
      });
    }

    const all = Core.listParties({ type: typeFilter });
    const overdueCount = all.filter(l => l.nextFollowUp && l.nextFollowUp < todayStr() && l.status !== 'Closed' && l.status !== 'Lost').length;

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Leads &amp; Clients</div>
          <div class="page-desc">Where every relationship starts. Convert a lead to a client once they're ready to buy.</div>
        </div>
        <button class="btn amber" id="btn-add-party">+ Add Lead</button>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${all.length}</div><div class="stat-label">${typeFilter === 'lead' ? 'Open Leads' : 'Clients'}</div></div>
        <div class="stat"><div class="stat-num" style="color:${overdueCount ? 'var(--red)' : 'inherit'}">${overdueCount}</div><div class="stat-label">Overdue Follow-ups</div></div>
        <div class="stat"><div class="stat-num">${Core.listParties({ type: 'lead', status: 'Closed' }).length}</div><div class="stat-label">Closed Won</div></div>
        <div class="stat"><div class="stat-num">${Core.listParties({ type: 'lead', status: 'Lost' }).length}</div><div class="stat-label">Lost</div></div>
      </div>

      <div style="display:flex; gap:6px; margin-bottom:10px;">
        ${filterBtn('type', 'lead', 'Leads')}
        ${filterBtn('type', 'customer', 'Clients')}
      </div>

      <div class="card" style="padding-bottom:10px;">
        <div style="font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;">Pipeline Stage</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;">
          ${chip('status', 'All', 'All')}
          ${Core.PARTY_STATUS.map(s => chip('status', s, statusLabel(s))).join('')}
        </div>
        <div style="font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;">Construction Phase</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px;">
          ${chip('cat', 'All', '🏷️ All Types')}
          ${Core.CATEGORIES.map(c => chip('cat', c.key, `${c.icon} ${c.label}`)).join('')}
        </div>
        <div style="font-size:11px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px;">Follow-up Due</div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${chip('urg', 'All', '⏰ All Due')}
          ${chip('urg', 'overdue', '🔴 Overdue')}
          ${chip('urg', 'today', '🟡 Due Today')}
          ${chip('urg', 'upcoming', '🔵 Upcoming')}
        </div>
      </div>

      <div class="card">
        <div class="card-title">Party List (${leads.length})</div>
        ${leads.length ? cardsList(leads) : `<div class="empty">No ${typeFilter === 'lead' ? 'leads' : 'clients'} match this filter. <b>Add one or adjust filters.</b></div>`}
      </div>
    `;

    document.getElementById('btn-add-party').onclick = () => openLeadForm(null);
    document.querySelectorAll('.filter-btn[data-group="type"]').forEach(b => b.onclick = () => { typeFilter = b.dataset.val; statusFilter = 'All'; render(); });
    document.querySelectorAll('.filter-btn[data-group="status"]').forEach(b => b.onclick = () => { statusFilter = b.dataset.val; render(); });
    document.querySelectorAll('.filter-btn[data-group="cat"]').forEach(b => b.onclick = () => { catFilter = b.dataset.val; render(); });
    document.querySelectorAll('.filter-btn[data-group="urg"]').forEach(b => b.onclick = () => { urgencyFilter = b.dataset.val; render(); });
    document.querySelectorAll('.party-card').forEach(r => r.onclick = () => openPartyDetail(r.dataset.id));
  }

  function statusLabel(s) {
    const icons = { New: '🆕', Uncontacted: '📵', Contacted: '📞', Quoted: '📄', Agreed: '🤝', Closed: '✅', Lost: '❌' };
    return `${icons[s] || ''} ${s}`;
  }

  function chip(group, val, label) {
    const active = (group === 'status' ? statusFilter : group === 'cat' ? catFilter : urgencyFilter) === val;
    return `<button class="btn sm ${active ? '' : 'ghost'} filter-btn" data-group="${group}" data-val="${val}" style="font-size:11.5px; padding:5px 10px;">${label}</button>`;
  }
  function filterBtn(group, val, label) {
    const active = typeFilter === val;
    return `<button class="btn ${active ? '' : 'ghost'} sm filter-btn" data-group="${group}" data-val="${val}">${label}</button>`;
  }

  function cardsList(rows) {
    const today = todayStr();
    return rows.map(l => {
      const cat = Core.CATEGORIES.find(c => c.key === l.category);
      let urgTag = '';
      if (l.nextFollowUp) {
        if (l.nextFollowUp < today && l.status !== 'Closed' && l.status !== 'Lost') urgTag = `<span class="tag urg-overdue">Overdue ${fmtDate(l.nextFollowUp)}</span>`;
        else if (l.nextFollowUp === today) urgTag = `<span class="tag urg-today">Due Today</span>`;
        else if (l.nextFollowUp > today) urgTag = `<span class="tag urg-upcoming">Follow-up ${fmtDate(l.nextFollowUp)}</span>`;
      }
      return `
        <div class="party-card" data-id="${l.id}" style="cursor:pointer; padding:12px 4px; border-bottom:1px solid var(--paper-dim); display:flex; align-items:center; gap:12px;">
          <div style="font-size:22px; width:30px; text-align:center;">${cat ? cat.icon : '👤'}</div>
          <div style="flex:1; min-width:0;">
            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
              <b>${esc(l.company || l.name)}</b>
              <span class="badge ${(l.status || 'new').toLowerCase()}">${esc(l.status)}</span>
              ${l.leadType ? `<span style="font-size:11px; color:var(--ink-dim);">${l.leadType === 'New Site' ? '🆕' : '🔄'} ${esc(l.leadType)}</span>` : ''}
            </div>
            <div style="font-size:12px; color:var(--ink-dim); margin-top:2px;">${esc(l.name)}${l.phone ? ' · ' + esc(l.phone) : ''}${l.source ? ' · ' + esc(l.source) : ''}</div>
          </div>
          <div>${urgTag}</div>
        </div>
      `;
    }).join('');
  }

  /* ---------- Lead form: name/phone/company/source, pipeline stage picker,
     category picker, follow-up date, address + GPS, notes ---------- */

  let _editingId = null;
  let _locData = {};

  function openLeadForm(id) {
    _editingId = id;
    _locData = {};
    const l = id ? Core.getParty(id) : {};
    const status = l.status || 'New';

    showModal(id ? 'Edit Lead' : 'Add Lead', `
      <div class="field"><label>Name *</label><input id="lf-name" value="${esc(l.name || '')}" placeholder="Person name at site"></div>
      <div class="field"><label>Phone</label><input id="lf-phone" value="${esc(l.phone || '')}" placeholder="+91 98765 43210"></div>
      <div class="field-row">
        <div class="field"><label>Company / Site Name</label><input id="lf-company" value="${esc(l.company || '')}" placeholder="Site or company"></div>
        <div class="field"><label>Source</label>
          <select id="lf-source">${Core.SOURCES.map(s => `<option ${((l.source || 'Cold Call') === s) ? 'selected' : ''}>${s}</option>`).join('')}</select>
        </div>
      </div>
      <div class="field"><label>Lead Type</label>
        <select id="lf-leadtype">${Core.LEAD_TYPES.map(t => `<option ${(l.leadType || 'New Site') === t ? 'selected' : ''}>${t}</option>`).join('')}</select>
      </div>

      <label>Construction Phase</label>
      <div id="cat-picker" style="margin-bottom:12px;">
        ${Core.CATEGORIES.map(c => `
          <div class="cat-opt ${l.category === c.key ? 'on' : ''}" data-cat="${c.key}">
            <div class="c-icon">${c.icon}</div>
            <div><div class="c-label">${c.label}</div><div class="c-sub">${c.sub}</div></div>
          </div>
        `).join('')}
      </div>
      <input type="hidden" id="lf-category" value="${esc(l.category || '')}">

      <label>Pipeline Stage</label>
      <div style="background:var(--paper-dim); border-radius:8px; padding:10px; margin-bottom:12px;">
        <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;">
          ${['New', 'Contacted', 'Quoted', 'Agreed', 'Closed'].map(s => `<div class="stage-pill ${status === s ? 'on' : ''}" data-stage="${s}">${s}</div>`).join('')}
        </div>
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          <div class="stage-pill uncontacted ${status === 'Uncontacted' ? 'on' : ''}" data-stage="Uncontacted">📵 Uncontacted</div>
          <div class="stage-pill lost ${status === 'Lost' ? 'on' : ''}" data-stage="Lost">❌ Lost</div>
        </div>
      </div>
      <input type="hidden" id="lf-status" value="${esc(status)}">

      <div class="field"><label>Next Follow-up</label><input id="lf-followup" type="date" value="${l.nextFollowUp || ''}"></div>

      <div class="field">
        <label>Location</label>
        <button class="btn ghost sm" id="lf-gps-btn" type="button">📍 Capture Current Location</button>
        <div id="lf-loc-display" class="hint">${l.lat ? `Saved: ${l.lat}, ${l.lng}` : ''}</div>
        <input id="lf-address" style="margin-top:6px;" value="${esc(l.address || '')}" placeholder="Address (auto-fills if GPS used, or type manually)">
      </div>

      <div class="field"><label>Notes</label><textarea id="lf-notes" rows="2">${esc(l.notes || '')}</textarea></div>

      <div style="display:flex; gap:8px;">
        <button class="btn amber" id="save-lead" style="flex:1; justify-content:center;">${id ? 'Save Changes' : 'Save Lead'}</button>
        ${id ? `<button class="btn danger" id="del-lead">Delete</button>` : ''}
      </div>
    `);

    document.querySelectorAll('.cat-opt').forEach(el => el.onclick = () => {
      document.querySelectorAll('.cat-opt').forEach(x => x.classList.remove('on'));
      el.classList.add('on');
      document.getElementById('lf-category').value = el.dataset.cat;
    });
    document.querySelectorAll('.stage-pill').forEach(el => el.onclick = () => {
      document.querySelectorAll('.stage-pill').forEach(x => x.classList.remove('on'));
      el.classList.add('on');
      document.getElementById('lf-status').value = el.dataset.stage;
    });
    document.getElementById('lf-gps-btn').onclick = captureLoc;

    document.getElementById('save-lead').onclick = () => saveLead(id);
    const delBtn = document.getElementById('del-lead');
    if (delBtn) delBtn.onclick = () => {
      if (!confirm('Delete this lead? This cannot be undone.')) return;
      Core.deleteParty(id); closeModal(); toast('Lead deleted'); render();
    };
  }

  function captureLoc() {
    const btn = document.getElementById('lf-gps-btn');
    const disp = document.getElementById('lf-loc-display');
    if (!navigator.geolocation) { disp.textContent = 'GPS not available on this device/browser.'; return; }
    btn.textContent = '📡 Getting location…';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        _locData = { lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) };
        disp.textContent = `Captured: ${_locData.lat}, ${_locData.lng}`;
        btn.textContent = '📍 Recapture Location';
      },
      (err) => { disp.textContent = 'Could not get location: ' + err.message; btn.textContent = '📍 Capture Current Location'; },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  }

  function saveLead(id) {
    const name = document.getElementById('lf-name').value.trim();
    if (!name) { toast('Name is required'); return; }
    const fields = {
      name,
      phone: document.getElementById('lf-phone').value.trim(),
      company: document.getElementById('lf-company').value.trim(),
      source: document.getElementById('lf-source').value,
      leadType: document.getElementById('lf-leadtype').value,
      category: document.getElementById('lf-category').value,
      status: document.getElementById('lf-status').value,
      nextFollowUp: document.getElementById('lf-followup').value,
      address: document.getElementById('lf-address').value.trim(),
      lat: _locData.lat || (id ? Core.getParty(id).lat : ''),
      lng: _locData.lng || (id ? Core.getParty(id).lng : ''),
      notes: document.getElementById('lf-notes').value.trim(),
    };
    if (id) {
      Core.updateParty(id, fields);
      closeModal(); toast('Lead updated'); render();
    } else {
      Core.addParty(Object.assign({ type: 'lead' }, fields));
      closeModal(); toast('Lead saved'); render();
    }
  }

  /* ---------- Party detail: timeline + calls + convert/indent actions ---------- */

  function openPartyDetail(id) {
    const p = Core.getParty(id);
    if (!p) return;
    const timeline = Core.getPartyTimeline(id);
    const cat = Core.CATEGORIES.find(c => c.key === p.category);

    showModal(p.company || p.name, `
      <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center;">
        <span class="badge ${(p.status || 'new').toLowerCase()}">${esc(p.status)}</span>
        ${cat ? `<span class="tag">${cat.icon} ${cat.label}</span>` : ''}
        ${p.leadType ? `<span class="tag">${p.leadType}</span>` : ''}
      </div>
      <div style="font-size:13px; color:var(--ink-dim); margin-bottom:14px; line-height:1.7;">
        ${p.name ? `👤 ${esc(p.name)}<br>` : ''}
        ${p.phone ? `📞 ${esc(p.phone)}<br>` : ''}
        ${p.address ? `📍 ${esc(p.address)}<br>` : ''}
        ${p.nextFollowUp ? `📅 Follow-up: ${fmtDate(p.nextFollowUp)}<br>` : ''}
        ${p.source ? `Source: ${esc(p.source)}` : ''}
      </div>

      <div class="card-title">Timeline</div>
      <div style="max-height:170px; overflow-y:auto; margin-bottom:14px;">
        ${timeline.length ? timeline.map(t => `
          <div style="font-size:12.5px; padding:6px 0; border-bottom:1px solid var(--paper-dim);">
            <span style="color:var(--ink-dim);">${fmtDate(t.date)}</span> — ${esc(t.note)}
          </div>
        `).join('') : `<div class="hint">No activity yet.</div>`}
      </div>

      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn ghost sm" id="act-edit">Edit</button>
        <button class="btn ghost sm" id="act-call">📞 Log a Call</button>
        ${p.type === 'lead' ? `<button class="btn amber sm" id="act-convert">Convert to Client</button>` : ''}
        <button class="btn ghost sm" id="act-indent">Raise Indent →</button>
      </div>
    `);

    document.getElementById('act-edit').onclick = () => { closeModal(); openLeadForm(id); };
    document.getElementById('act-call').onclick = () => openCallForm(id);
    const convertBtn = document.getElementById('act-convert');
    if (convertBtn) convertBtn.onclick = () => { Core.convertLeadToClient(id); closeModal(); toast('Converted to client'); render(); };
    document.getElementById('act-indent').onclick = () => { closeModal(); App.go('quotation', { newIndentFor: id }); };
  }

  function openCallForm(party_id) {
    showModal('Log a Call', `
      <div class="field"><label>Outcome</label>
        <select id="cf-outcome">${Core.CALL_OUTCOMES.map(o => `<option>${o}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Notes</label><textarea id="cf-notes" rows="2" placeholder="What was discussed"></textarea></div>
      <button class="btn amber" id="save-call" style="width:100%; justify-content:center;">Save Call</button>
    `);
    document.getElementById('save-call').onclick = () => {
      Core.addCall(party_id, { outcome: document.getElementById('cf-outcome').value, notes: document.getElementById('cf-notes').value.trim() });
      closeModal(); toast('Call logged'); openPartyDetail(party_id);
    };
  }

  return { render };
})();

/* ===== inventory.js ===== */
/* =========================================================================
   INVENTORY module
   Pipeline stage 2: Item master + pricing that Quotation reads from,
   and the stock ledger that Quotation confirms write into.
   ========================================================================= */

const Inventory = (() => {

  function render() {
    const main = document.getElementById('main');
    const items = Core.listItems();
    const low = Core.lowStockItems();

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Inventory</div>
          <div class="page-desc">Item master, pricing, and stock. Quotation reads prices from here; confirmed sales deduct stock here.</div>
        </div>
        <button class="btn amber" id="btn-add-item">+ Add Item</button>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-label">Items</div></div>
        <div class="stat"><div class="stat-num">${items.reduce((s, i) => s + i.stock_qty, 0)}</div><div class="stat-label">Total Stock Units</div></div>
        <div class="stat"><div class="stat-num" style="color:${low.length ? 'var(--red)' : 'inherit'}">${low.length}</div><div class="stat-label">Low Stock Alerts</div></div>
      </div>

      ${low.length ? `
        <div class="card" style="border-color:#e6c9c5;">
          <div class="card-title" style="color:var(--red);">Low Stock</div>
          ${low.map(i => `<div style="font-size:13px; padding:4px 0;"><b>${esc(i.name)}</b> — ${i.stock_qty} ${esc(i.unit)} left (threshold ${i.low_stock_threshold})</div>`).join('')}
        </div>
      ` : ''}

      <div class="card">
        <div class="card-title">Item Master</div>
        ${items.length ? `
          <table>
            <thead><tr><th>Item</th><th>Brand</th><th>Cost</th><th>Sell</th><th>Stock</th><th></th></tr></thead>
            <tbody>
              ${items.map(i => `
                <tr>
                  <td><b>${esc(i.name)}</b><div style="font-size:11px; color:var(--ink-dim);">${esc(i.category || '')}</div></td>
                  <td>${esc(i.brand) || '—'}</td>
                  <td>₹${i.cost_price}</td>
                  <td>₹${i.sell_price}</td>
                  <td>${i.stock_qty <= i.low_stock_threshold && i.low_stock_threshold > 0 ? `<span class="badge low">${i.stock_qty} ${esc(i.unit)}</span>` : `${i.stock_qty} ${esc(i.unit)}`}</td>
                  <td style="text-align:right;">
                    <button class="btn sm ghost stock-in-btn" data-id="${i.id}">Stock In</button>
                    <button class="btn sm ghost stock-out-btn" data-id="${i.id}">Stock Out</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No items yet. <b>Add your first item.</b></div>`}
      </div>
    `;

    document.getElementById('btn-add-item').onclick = openAddItemModal;
    document.querySelectorAll('.stock-in-btn').forEach(b => b.onclick = () => openStockModal(b.dataset.id, 'in'));
    document.querySelectorAll('.stock-out-btn').forEach(b => b.onclick = () => openStockModal(b.dataset.id, 'out'));
  }

  function openAddItemModal() {
    showModal('Add Item', `
      <div class="field"><label>Item Name *</label><input id="f-name" placeholder="e.g. 2.5 sq mm Copper Wire"></div>
      <div class="field-row">
        <div class="field"><label>Category</label><input id="f-cat" placeholder="Wire / Switch / Light..."></div>
        <div class="field"><label>Brand</label><input id="f-brand" placeholder="Optional"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Unit</label>
          <select id="f-unit"><option>Nos</option><option>Mtr</option><option>Box</option><option>Coil</option><option>Kg</option></select>
        </div>
        <div class="field"><label>Low Stock Alert At</label><input id="f-threshold" type="number" value="0"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Cost Price (₹)</label><input id="f-cost" type="number" value="0"></div>
        <div class="field"><label>Sell Price (₹)</label><input id="f-sell" type="number" value="0"></div>
      </div>
      <div class="field"><label>HSN Code</label><input id="f-hsn" placeholder="Optional"></div>
      <button class="btn amber" id="save-item" style="width:100%; justify-content:center; margin-top:6px;">Save Item</button>
    `);
    document.getElementById('save-item').onclick = () => {
      const name = document.getElementById('f-name').value.trim();
      if (!name) { toast('Item name is required'); return; }
      Core.addItem({
        name, category: document.getElementById('f-cat').value.trim(),
        brand: document.getElementById('f-brand').value.trim(),
        unit: document.getElementById('f-unit').value,
        cost_price: document.getElementById('f-cost').value,
        sell_price: document.getElementById('f-sell').value,
        hsn: document.getElementById('f-hsn').value.trim(),
        low_stock_threshold: document.getElementById('f-threshold').value
      });
      closeModal(); toast('Item added'); render();
    };
  }

  function openStockModal(item_id, type) {
    const item = Core.getItem(item_id);
    showModal(`${type === 'in' ? 'Stock In' : 'Stock Out'} — ${item.name}`, `
      <div class="hint" style="margin-bottom:10px;">Current stock: <b>${item.stock_qty} ${esc(item.unit)}</b></div>
      <div class="field"><label>Quantity</label><input id="f-qty" type="number" min="1" value="1"></div>
      <div class="field"><label>Note</label><input id="f-note" placeholder="${type === 'in' ? 'e.g. Purchase from supplier' : 'e.g. Manual correction'}"></div>
      <button class="btn amber" id="save-stock" style="width:100%; justify-content:center; margin-top:6px;">Confirm ${type === 'in' ? 'Stock In' : 'Stock Out'}</button>
    `);
    document.getElementById('save-stock').onclick = () => {
      const qty = Number(document.getElementById('f-qty').value);
      if (!qty || qty <= 0) { toast('Enter a valid quantity'); return; }
      Core.stockMove(item_id, type, qty, { ref_type: type === 'in' ? 'purchase' : 'manual', notes: document.getElementById('f-note').value.trim() });
      closeModal(); toast(`Stock ${type === 'in' ? 'in' : 'out'} recorded`); render();
    };
  }

  return { render };
})();

/* ===== quotation.js ===== */
/* =========================================================================
   QUOTATION module
   Pipeline stage 3: Indent -> Pricing (pulled from Inventory) -> Quotation
   Confirming here is what triggers stock-out (Inventory) + lead-won (Leads).
   ========================================================================= */

const Quotation = (() => {

  let pendingIndentParty = null; // set by App.go('quotation', {newIndentFor}) from Leads

  function render(params = {}) {
    if (params.newIndentFor) pendingIndentParty = params.newIndentFor;

    const main = document.getElementById('main');
    const indents = Core.listIndents();
    const quotations = Core.listQuotations();

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Quotation</div>
          <div class="page-desc">Raise an indent, price it against Inventory, generate the document, confirm the sale.</div>
        </div>
        <button class="btn amber" id="btn-new-indent">+ New Indent</button>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${indents.filter(i => i.status === 'requested').length}</div><div class="stat-label">Awaiting Pricing</div></div>
        <div class="stat"><div class="stat-num">${quotations.filter(q => q.status === 'draft').length}</div><div class="stat-label">Awaiting Confirmation</div></div>
        <div class="stat"><div class="stat-num">${quotations.filter(q => q.status === 'confirmed').length}</div><div class="stat-label">Confirmed Sales</div></div>
        <div class="stat"><div class="stat-num">₹${quotations.filter(q => q.status === 'confirmed').reduce((s, q) => s + q.total, 0)}</div><div class="stat-label">Confirmed Value</div></div>
      </div>

      <div class="card">
        <div class="card-title">Indents</div>
        ${indents.length ? `
          <table>
            <thead><tr><th>Party</th><th>Items</th><th>Status</th><th>Raised</th><th></th></tr></thead>
            <tbody>
              ${indents.map(i => {
                const party = Core.getParty(i.party_id);
                return `
                  <tr>
                    <td><b>${esc(party ? party.name : '—')}</b></td>
                    <td>${i.lines.length} item(s)</td>
                    <td><span class="badge ${i.status}">${i.status}</span></td>
                    <td>${fmtDate(i.created_at)}</td>
                    <td style="text-align:right;">
                      ${i.status === 'requested' ? `<button class="btn sm amber price-btn" data-id="${i.id}">Price This</button>` : ''}
                      ${i.status === 'priced' ? `<button class="btn sm amber gen-btn" data-id="${i.id}">Generate Quotation</button>` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No indents yet. <b>Raise one from a lead's or client's page, or here.</b></div>`}
      </div>

      <div class="card">
        <div class="card-title">Documents</div>
        ${quotations.length ? `
          <table>
            <thead><tr><th>Doc No.</th><th>Party</th><th>Type</th><th>Total</th><th>Status</th><th></th></tr></thead>
            <tbody>
              ${quotations.map(q => {
                const party = Core.getParty(q.party_id);
                return `
                  <tr>
                    <td><b>${q.doc_no}</b></td>
                    <td>${esc(party ? party.name : '—')}</td>
                    <td>${q.doc_type}</td>
                    <td>₹${q.total}</td>
                    <td><span class="badge ${q.status}">${q.status}</span></td>
                    <td style="text-align:right;">
                      ${q.status === 'draft' ? `
                        <button class="btn sm amber confirm-btn" data-id="${q.id}">Confirm Sale</button>
                        <button class="btn sm danger reject-btn" data-id="${q.id}">Reject</button>
                      ` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No quotations generated yet.</div>`}
      </div>
    `;

    document.getElementById('btn-new-indent').onclick = openIndentModal;
    document.querySelectorAll('.price-btn').forEach(b => b.onclick = () => openPricingModal(b.dataset.id));
    document.querySelectorAll('.gen-btn').forEach(b => b.onclick = () => openGenerateModal(b.dataset.id));
    document.querySelectorAll('.confirm-btn').forEach(b => b.onclick = () => {
      Core.confirmQuotation(b.dataset.id);
      toast('Sale confirmed — stock deducted, party updated');
      render();
    });
    document.querySelectorAll('.reject-btn').forEach(b => b.onclick = () => {
      Core.rejectQuotation(b.dataset.id);
      toast('Quotation rejected');
      render();
    });

    // auto-open the indent modal if we arrived here from a lead's "Raise Indent"
    if (pendingIndentParty) {
      const pid = pendingIndentParty;
      pendingIndentParty = null;
      openIndentModal(pid);
    }
  }

  let indentLines = [];

  function openIndentModal(presetPartyId = null) {
    indentLines = [{ item_id: '', qty: 1 }];
    const parties = Core.listParties({ type: 'lead' }).concat(Core.listParties({ type: 'customer' }));
    const items = Core.listItems();

    if (!parties.length) { toast('Add a lead or client first'); return; }
    if (!items.length) { toast('Add an item in Inventory first'); return; }

    showModal('New Indent', `
      <div class="field"><label>Party</label>
        <select id="f-party">${parties.map(p => `<option value="${p.id}" ${p.id === presetPartyId ? 'selected' : ''}>${esc(p.company || p.name)} (${p.type})</option>`).join('')}</select>
      </div>
      <label>Items Requested</label>
      <div id="indent-lines"></div>
      <button class="btn ghost sm" id="add-line" style="margin-top:4px;">+ Add another item</button>
      <div class="field" style="margin-top:12px;"><label>Notes</label><input id="f-notes" placeholder="Optional"></div>
      <button class="btn amber" id="save-indent" style="width:100%; justify-content:center; margin-top:10px;">Raise Indent</button>
    `);

    const items_opts = items.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join('');

    function renderLines() {
      document.getElementById('indent-lines').innerHTML = indentLines.map((l, idx) => `
        <div class="field-row" style="margin-bottom:6px; align-items:flex-end;">
          <div class="field" style="margin-bottom:0;"><select class="line-item" data-idx="${idx}">${items_opts}</select></div>
          <div class="field" style="margin-bottom:0; flex:0 0 80px;"><input class="line-qty" data-idx="${idx}" type="number" min="1" value="${l.qty}"></div>
        </div>
      `).join('');
      document.querySelectorAll('.line-item').forEach(s => s.value = indentLines[s.dataset.idx].item_id || s.options[0].value);
      document.querySelectorAll('.line-item').forEach(s => s.onchange = () => indentLines[s.dataset.idx].item_id = s.value);
      document.querySelectorAll('.line-qty').forEach(s => s.onchange = () => indentLines[s.dataset.idx].qty = Number(s.value));
    }
    renderLines();

    document.getElementById('add-line').onclick = () => { indentLines.push({ item_id: '', qty: 1 }); renderLines(); };

    document.getElementById('save-indent').onclick = () => {
      const party_id = document.getElementById('f-party').value;
      const lines = indentLines.filter(l => l.item_id && l.qty > 0);
      if (!lines.length) { toast('Add at least one item'); return; }
      Core.createIndent(party_id, lines, document.getElementById('f-notes').value.trim());
      closeModal(); toast('Indent raised'); render();
    };
  }

  function openPricingModal(indent_id) {
    const priced = Core.priceIndent(indent_id);
    showModal('Pricing (pulled from Inventory)', `
      <table>
        <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
        <tbody>
          ${priced.map(l => `<tr><td>${esc(l.name)}</td><td>${l.qty}</td><td>₹${l.rate}</td><td>₹${l.amount}</td></tr>`).join('')}
        </tbody>
      </table>
      <div style="text-align:right; font-weight:700; margin-top:10px; font-size:14px;">
        Total: ₹${priced.reduce((s, l) => s + l.amount, 0).toFixed(2)}
      </div>
      <div class="hint">Prices pulled live from the Inventory item master. Update prices there if these look off.</div>
      <button class="btn amber" id="close-pricing" style="width:100%; justify-content:center; margin-top:12px;">Done — status set to Priced</button>
    `);
    document.getElementById('close-pricing').onclick = () => { closeModal(); render(); };
  }

  function openGenerateModal(indent_id) {
    const indent = Core.getIndent(indent_id);
    const priced = indent.lines.map(l => {
      const item = Core.getItem(l.item_id);
      const rate = item ? item.sell_price : 0;
      return { item_id: l.item_id, name: item ? item.name : '', qty: l.qty, rate, amount: +(rate * l.qty).toFixed(2) };
    });
    showModal('Generate Document', `
      <div class="field"><label>Document Type</label>
        <select id="f-doctype">
          <option value="QTN">Quotation (needs confirm later)</option>
          <option value="PI">Proforma Invoice (needs confirm later)</option>
          <option value="CB">Cash Bill (confirms + deducts stock immediately)</option>
        </select>
      </div>
      <div class="hint" style="margin-bottom:10px;">Total: ₹${priced.reduce((s, l) => s + l.amount, 0).toFixed(2)}</div>
      <button class="btn amber" id="gen-doc" style="width:100%; justify-content:center;">Generate</button>
    `);
    document.getElementById('gen-doc').onclick = () => {
      const doc_type = document.getElementById('f-doctype').value;
      const q = Core.createQuotation(indent_id, doc_type, priced);
      closeModal();
      toast(doc_type === 'CB' ? `${q.doc_no} confirmed — stock deducted` : `${q.doc_no} created — awaiting confirmation`);
      render();
    };
  }

  return { render };
})();

/* ===== app.js ===== */
/* =========================================================================
   APP SHELL — navigation between the three capabilities + shared UI helpers.
   Nothing business-logic-specific lives here; that's all in core.js and the
   three module files. This file just wires the sidebar to the views.
   ========================================================================= */

function esc(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtDate(iso) { const d = new Date(iso); return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

function showModal(title, bodyHtml) {
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.id = 'active-modal';
  bg.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>${esc(title)}</h3><button class="modal-close" id="modal-close-btn">✕</button></div>
      <div>${bodyHtml}</div>
    </div>
  `;
  bg.onclick = (e) => { if (e.target === bg) closeModal(); };
  document.body.appendChild(bg);
  document.getElementById('modal-close-btn').onclick = closeModal;
}
function closeModal() { const m = document.getElementById('active-modal'); if (m) m.remove(); }

const App = (() => {
  const views = {
    dashboard: { label: 'Dashboard', icon: '◆', render: renderDashboard },
    leads: { label: 'Leads & Clients', icon: '①', render: (p) => Leads.render(p) },
    inventory: { label: 'Inventory', icon: '②', render: (p) => Inventory.render(p) },
    quotation: { label: 'Quotation', icon: '③', render: (p) => Quotation.render(p) },
  };
  let current = 'dashboard';

  function init() {
    document.getElementById('nav').innerHTML = Object.entries(views).map(([key, v]) => `
      <button class="nav-item" data-view="${key}"><span class="n-icon">${v.icon}</span> ${v.label}</button>
    `).join('');
    Object.keys(views).forEach(key => {
      document.querySelector(`[data-view="${key}"]`).onclick = () => go(key);
    });
    document.addEventListener('core:change', () => { if (current === 'dashboard') renderDashboard(); });
    document.addEventListener('core:sync', renderSyncStatus);
    renderSyncStatus();
    Core.tryAutoConnectCloud();
    go('dashboard');
  }

  function renderSyncStatus() {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const s = Core.cloudStatus();
    let dot = '#7f8ea3', label = 'Not connected';
    if (s.enabled && s.syncing) { dot = '#e8a53d'; label = 'Syncing…'; }
    else if (s.enabled && s.error) { dot = '#b0463c'; label = 'Sync error'; }
    else if (s.enabled) { dot = '#3f7d5c'; label = 'Synced'; }
    el.innerHTML = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dot};margin-right:6px;"></span>${label}`;
    el.title = s.error || '';
  }

  function openSettingsModal() {
    const s = Core.cloudStatus();
    showModal('Cloud Sync Settings', `
      <div class="hint" style="margin-bottom:12px;">
        Paste your Supabase project URL and anon/public API key. Create a free project at
        <a href="https://supabase.com" target="_blank">supabase.com</a> and run the setup SQL first — see the README that came with this app.
      </div>
      <div class="field"><label>Supabase URL</label><input id="cfg-url" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Anon / Publishable Key</label><input id="cfg-key" placeholder="eyJ..."></div>
      <button class="btn amber" id="cfg-save" style="width:100%; justify-content:center; margin-top:6px;">Connect</button>
      <div class="hint" style="margin-top:10px;">Status: ${s.enabled ? (s.error ? 'Error — ' + esc(s.error) : 'Connected') : 'Not connected (working offline, this device only)'}</div>
    `);
    document.getElementById('cfg-save').onclick = () => {
      const url = document.getElementById('cfg-url').value.trim();
      const key = document.getElementById('cfg-key').value.trim();
      if (!url || !key) { toast('Both fields are required'); return; }
      Core.enableCloudSync(url, key);
      closeModal(); toast('Connecting to cloud…');
    };
  }

  function go(view, params = {}) {
    current = view;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    views[view].render(params);
  }

  function renderDashboard() {
    const main = document.getElementById('main');
    const parties = Core._db().parties;
    const items = Core._db().items;
    const quotations = Core._db().quotations;
    const leads = parties.filter(p => p.type === 'lead' && p.status !== 'Closed' && p.status !== 'Lost');
    const lowStock = Core.lowStockItems();
    const pendingConfirm = quotations.filter(q => q.status === 'draft');
    const confirmedValue = quotations.filter(q => q.status === 'confirmed').reduce((s, q) => s + q.total, 0);

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-desc">One system, one spine: Lead → Client → Indent → Pricing → Quotation → Stock-out / Won.</div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${leads.length}</div><div class="stat-label">Open Leads</div></div>
        <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-label">Items Tracked</div></div>
        <div class="stat"><div class="stat-num">${pendingConfirm.length}</div><div class="stat-label">Awaiting Confirmation</div></div>
        <div class="stat"><div class="stat-num">₹${confirmedValue}</div><div class="stat-label">Confirmed Sales Value</div></div>
      </div>

      <div class="card">
        <div class="card-title">Pipeline</div>
        <div class="pipeline">
          <span class="pipe-step">Lead (${parties.filter(p=>p.type==='lead').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Client (${parties.filter(p=>p.type==='customer').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Indent (${Core._db().indents.length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Priced (${Core._db().indents.filter(i=>i.status!=='requested').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Quoted (${quotations.length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Confirmed (${quotations.filter(q=>q.status==='confirmed').length})</span>
        </div>
      </div>

      ${lowStock.length ? `
        <div class="card" style="border-color:#e6c9c5;">
          <div class="card-title" style="color:var(--red);">Low Stock</div>
          ${lowStock.map(i => `<div style="font-size:13px; padding:3px 0;">${esc(i.name)} — ${i.stock_qty} ${esc(i.unit)} left</div>`).join('')}
        </div>
      ` : ''}

      ${!parties.length ? `
        <div class="card">
          <div class="empty">Nothing here yet. <b>Start in Leads & Clients</b> to add your first lead, or <b>Inventory</b> to add items.</div>
        </div>
      ` : ''}
    `;
  }

  return { init, go };
})();

document.addEventListener('DOMContentLoaded', App.init);
  </script>
</body>
</html>
