<!DOCTYPE  html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSE — Unified System</title>
<style>
:root {
  --navy-950: #0d1b2e;
  --navy-800: #16304f;
  --navy-700: #1e3f66;
  --amber: #e8a53d;
  --amber-dark: #c98a26;
  --paper: #f6f4ef;
  --paper-dim: #eae7de;
  --ink: #1b2430;
  --ink-dim: #5c6672;
  --line: #dcd8cd;
  --green: #3f7d5c;
  --red: #b0463c;
  --radius: 6px;
  --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.45;
}

/* ---------- shell ---------- */
.shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--navy-950);
  color: #cfd8e3;
  display: flex;
  flex-direction: column;
  padding: 20px 0;
  min-height: 100vh;
}
.brand {
  padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 12px;
}
.brand-mark {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--amber);
  text-transform: uppercase;
}
.brand-name {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  margin-top: 4px;
}
.brand-sub {
  font-size: 11px;
  color: #7f8ea3;
  margin-top: 2px;
}

.nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  color: #b7c2d1;
  text-decoration: none;
  cursor: pointer;
  font-size: 13.5px;
  font-weight: 500;
  border: none;
  background: none;
  text-align: left;
  width: 100%;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: var(--navy-700); color: #fff; }
.nav-item .n-icon { width: 16px; text-align: center; font-family: var(--mono); color: var(--amber); }

.nav-step {
  padding: 14px 20px 4px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: #5f6f85;
  text-transform: uppercase;
}

.main { flex: 1; padding: 28px 36px; max-width: 1180px; }

.page-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; }
.page-title { font-size: 22px; font-weight: 700; color: var(--navy-950); }
.page-desc { font-size: 13px; color: var(--ink-dim); margin-top: 2px; }

/* ---------- pipeline strip ---------- */
.pipeline {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  overflow-x: auto;
}
.pipe-step {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.03em;
  color: var(--ink-dim);
  background: #fff;
  border: 1px solid var(--line);
  padding: 6px 12px;
  white-space: nowrap;
  border-radius: 3px;
}
.pipe-step.current { border-color: var(--amber); color: var(--navy-950); background: #fff8ec; font-weight: 600; }
.pipe-arrow { color: var(--ink-dim); padding: 0 6px; font-size: 12px; }

/* ---------- cards / tables ---------- */
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 18px;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--navy-950); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.04em; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-dim); padding: 8px 10px; border-bottom: 1px solid var(--line); }
td { padding: 9px 10px; border-bottom: 1px solid var(--paper-dim); vertical-align: middle; }
tr:hover td { background: #fbfaf7; }

.empty { padding: 30px 10px; text-align: center; color: var(--ink-dim); font-size: 13px; }
.empty b { color: var(--ink); }

/* ---------- form controls ---------- */
label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
input, select, textarea {
  width: 100%;
  font-family: var(--sans);
  font-size: 13.5px;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #fff;
  color: var(--ink);
}
input:focus, select:focus, textarea:focus { outline: 2px solid var(--amber); outline-offset: 0; border-color: var(--amber); }
.field { margin-bottom: 12px; }
.field-row { display: flex; gap: 12px; }
.field-row > .field { flex: 1; }

button { font-family: var(--sans); cursor: pointer; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 4px; border: none;
  font-size: 13px; font-weight: 600;
  background: var(--navy-700); color: #fff;
}
.btn:hover { background: var(--navy-800); }
.btn.amber { background: var(--amber); color: var(--navy-950); }
.btn.amber:hover { background: var(--amber-dark); }
.btn.ghost { background: transparent; color: var(--navy-700); border: 1px solid var(--line); }
.btn.ghost:hover { background: var(--paper-dim); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn.danger { background: transparent; color: var(--red); border: 1px solid #e6c9c5; }

/* ---------- badges ---------- */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
.badge.new { background: #e6edf7; color: var(--navy-700); }
.badge.contacted { background: #fdf1de; color: var(--amber-dark); }
.badge.won { background: #e2f0e8; color: var(--green); }
.badge.lost { background: #f6e4e2; color: var(--red); }
.badge.active { background: #e2f0e8; color: var(--green); }
.badge.requested { background: #eee; color: var(--ink-dim); }
.badge.priced { background: #fdf1de; color: var(--amber-dark); }
.badge.quoted { background: #e6edf7; color: var(--navy-700); }
.badge.confirmed { background: #e2f0e8; color: var(--green); }
.badge.draft { background: #eee; color: var(--ink-dim); }
.badge.rejected { background: #f6e4e2; color: var(--red); }
.badge.low { background: #f6e4e2; color: var(--red); }

/* ---------- modal ---------- */
.modal-bg { position: fixed; inset: 0; background: rgba(13,27,46,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal { background: #fff; border-radius: 8px; padding: 24px; width: 460px; max-width: 92vw; max-height: 86vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-head h3 { margin: 0; font-size: 16px; color: var(--navy-950); }
.modal-close { background: none; border: none; font-size: 18px; color: var(--ink-dim); }

.hint { font-size: 12px; color: var(--ink-dim); margin-top: 10px; }
.stat-row { display: flex; gap: 14px; margin-bottom: 18px; }
.stat { flex: 1; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--navy-950); font-family: var(--mono); }
.stat-label { font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy-950); color: #fff; padding: 12px 18px; border-radius: 6px; font-size: 13px; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.2); }

@media (max-width: 780px) {
  .shell { flex-direction: column; }
  .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 10px; }
  .brand { display: none; }
  .nav { flex-direction: row; }
  .nav-step { display: none; }
  .main { padding: 16px; }
  .field-row { flex-direction: column; gap: 0; }
}
</style>
</head>
<body>
  <div class="shell">
    <div class="sidebar">
      <div class="brand">
        <div class="brand-mark">SGE · SSE</div>
        <div class="brand-name">Unified System</div>
        <div class="brand-sub">Lead → Client → Stock → Quotation</div>
      </div>
      <div id="nav" class="nav"></div>
      <div style="margin-top:auto; padding:14px 20px; border-top:1px solid rgba(255,255,255,0.08);">
        <div id="sync-status" style="font-size:11.5px; color:#b7c2d1; margin-bottom:8px;"></div>
        <button class="nav-item" id="btn-settings" style="padding:6px 12px;"><span class="n-icon">⚙</span> Cloud Sync Settings</button>
      </div>
    </div>
    <div class="main" id="main"></div>
  </div>

  <script>
/* ===== core.js ===== */
/* =========================================================================
   SSE CORE — shared data model + pipeline logic
   Lead -> Client -> Indent -> Pricing (Inventory) -> Quotation -> Confirm
                                                          |
                                                          +--> Stock-out (Inventory)
                                                          +--> Lead Won   (Leads)

   Storage: localStorage now (offline-first, same pattern as the original
   three apps). Supabase sync hooks are stubbed at the bottom — fill in a
   project URL + key later and call Core.enableCloudSync() to turn it on.
   Every module (leads.js, inventory.js, quotation.js) reads/writes ONLY
   through this file. No module should touch localStorage directly.
   ========================================================================= */

const Core = (() => {

  const DB_KEY = 'sse_unified_v1';

  const uid = (p) => p + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const now = () => new Date().toISOString();

  /* ---------- schema / default state ---------- */
  function emptyDB() {
    return {
      parties: [],      // {id,name,phone,email,address,gst,type,status,source,notes,created_at,updated_at}
      items: [],        // {id,name,category,brand,unit,cost_price,sell_price,hsn,stock_qty,low_stock_threshold}
      indents: [],       // {id,party_id,lines:[{item_id,qty}],status,created_at,notes}
      quotations: [],    // {id,indent_id,party_id,doc_type,doc_no,date,lines:[{item_id,name,qty,rate,amount}],total,status,created_at,confirmed_at}
      stock_ledger: [],  // {id,item_id,type,qty,ref_type,ref_id,party_id,date,notes}
      activity: []       // {id,party_id,type,note,date}  -- lightweight timeline entries
    };
  }

  let db = load();

  function load() {
    try {
      const raw = localStorage.getItem(DB_KEY);
      if (!raw) return emptyDB();
      const parsed = JSON.parse(raw);
      // guard against missing keys if schema grows later
      return Object.assign(emptyDB(), parsed);
    } catch (e) {
      console.error('Core: failed to load DB, starting fresh', e);
      return emptyDB();
    }
  }

  function persist() {
    localStorage.setItem(DB_KEY, JSON.stringify(db));
    if (cloud.enabled) cloud.pushDirty();
    document.dispatchEvent(new CustomEvent('core:change'));
  }

  /* ---------- PARTIES (Leads / Clients / Suppliers) ---------- */

  const PARTY_TYPES = ['lead', 'customer', 'supplier'];
  const PARTY_STATUS = ['new', 'contacted', 'won', 'lost', 'active'];

  function addParty({ name, phone, email = '', address = '', gst = '', type = 'lead', source = '', notes = '' }) {
    if (!name || !name.trim()) throw new Error('Party name is required');
    const existing = findPartyByNameOrPhone(name, phone);
    if (existing) return existing; // avoid duplicate lead/client records
    const party = {
      id: uid('party'), name: name.trim(), phone: phone || '', email, address, gst,
      type, status: type === 'lead' ? 'new' : 'active', source, notes,
      created_at: now(), updated_at: now()
    };
    db.parties.push(party);
    logActivity(party.id, 'created', `Added as ${type}`);
    persist();
    return party;
  }

  function findPartyByNameOrPhone(name, phone) {
    const n = (name || '').trim().toLowerCase();
    const p = (phone || '').trim();
    return db.parties.find(x =>
      (p && x.phone && x.phone.trim() === p) ||
      (n && x.name.trim().toLowerCase() === n)
    ) || null;
  }

  function getParty(id) { return db.parties.find(p => p.id === id) || null; }
  function listParties(filter = {}) {
    return db.parties.filter(p =>
      (!filter.type || p.type === filter.type) &&
      (!filter.status || p.status === filter.status)
    ).sort((a, b) => b.updated_at.localeCompare(a.updated_at));
  }

  function updatePartyStatus(id, status, note = '') {
    const party = getParty(id);
    if (!party) return;
    party.status = status;
    party.updated_at = now();
    logActivity(id, 'status', note || `Status changed to ${status}`);
    persist();
  }

  /** Lead -> Client conversion. Keeps same party id, just flips type/status
   *  so every indent/quotation already linked to this party carries over. */
  function convertLeadToClient(id) {
    const party = getParty(id);
    if (!party) return;
    party.type = 'customer';
    party.status = 'active';
    party.updated_at = now();
    logActivity(id, 'converted', 'Lead converted to client');
    persist();
    return party;
  }

  function logActivity(party_id, type, note) {
    db.activity.push({ id: uid('act'), party_id, type, note, date: now() });
  }

  function getPartyTimeline(party_id) {
    const acts = db.activity.filter(a => a.party_id === party_id);
    const inds = db.indents.filter(i => i.party_id === party_id);
    const quos = db.quotations.filter(q => q.party_id === party_id);
    return [...acts, ...inds.map(i => ({ id: i.id, type: 'indent', note: `Indent (${i.status})`, date: i.created_at })),
      ...quos.map(q => ({ id: q.id, type: 'quotation', note: `${q.doc_type} ${q.doc_no} — ${q.status}`, date: q.created_at }))]
      .sort((a, b) => a.date.localeCompare(b.date));
  }

  /* ---------- ITEMS (Inventory master + pricing, shared by Quotation) ---------- */

  function addItem({ name, category = '', brand = '', unit = 'Nos', cost_price = 0, sell_price = 0, hsn = '', low_stock_threshold = 0 }) {
    if (!name || !name.trim()) throw new Error('Item name is required');
    const item = {
      id: uid('item'), name: name.trim(), category, brand, unit,
      cost_price: Number(cost_price) || 0, sell_price: Number(sell_price) || 0,
      hsn, stock_qty: 0, low_stock_threshold: Number(low_stock_threshold) || 0
    };
    db.items.push(item);
    persist();
    return item;
  }

  function getItem(id) { return db.items.find(i => i.id === id) || null; }
  function listItems() { return db.items.slice().sort((a, b) => a.name.localeCompare(b.name)); }

  function updateItemPrice(id, { cost_price, sell_price }) {
    const item = getItem(id);
    if (!item) return;
    if (cost_price !== undefined) item.cost_price = Number(cost_price) || 0;
    if (sell_price !== undefined) item.sell_price = Number(sell_price) || 0;
    persist();
  }

  /* ---------- STOCK LEDGER (Inventory in/out — single source of truth) ---------- */

  function stockMove(item_id, type, qty, { ref_type = 'manual', ref_id = null, party_id = null, notes = '' } = {}) {
    const item = getItem(item_id);
    if (!item) throw new Error('Unknown item for stock move');
    qty = Number(qty) || 0;
    if (qty <= 0) return;
    item.stock_qty += (type === 'in' ? qty : -qty);
    db.stock_ledger.push({
      id: uid('stk'), item_id, type, qty, ref_type, ref_id, party_id, date: now(), notes
    });
    persist();
  }

  function lowStockItems() {
    return db.items.filter(i => i.low_stock_threshold > 0 && i.stock_qty <= i.low_stock_threshold);
  }

  /* ---------- INDENTS (what a client wants, before pricing) ---------- */

  function createIndent(party_id, lines, notes = '') {
    if (!getParty(party_id)) throw new Error('Unknown party for indent');
    const indent = {
      id: uid('ind'), party_id,
      lines: lines.map(l => ({ item_id: l.item_id, qty: Number(l.qty) || 0 })),
      status: 'requested', created_at: now(), notes
    };
    db.indents.push(indent);
    logActivity(party_id, 'indent', 'Indent raised');
    persist();
    return indent;
  }

  function listIndents(filter = {}) {
    return db.indents.filter(i => !filter.status || i.status === filter.status)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));
  }
  function getIndent(id) { return db.indents.find(i => i.id === id) || null; }

  /** Pull current sell price from Items for every line — the "Pricing pulls
   *  Inventory" step. Does not mutate the indent, just returns priced lines
   *  for the caller (Quotation) to use when building the document. */
  function priceIndent(indent_id) {
    const indent = getIndent(indent_id);
    if (!indent) throw new Error('Unknown indent');
    const priced = indent.lines.map(l => {
      const item = getItem(l.item_id);
      const rate = item ? item.sell_price : 0;
      return { item_id: l.item_id, name: item ? item.name : '(unknown item)', qty: l.qty, rate, amount: +(rate * l.qty).toFixed(2) };
    });
    indent.status = 'priced';
    persist();
    return priced;
  }

  /* ---------- QUOTATIONS ---------- */

  function nextDocNo(doc_type) {
    const count = db.quotations.filter(q => q.doc_type === doc_type).length + 1;
    const prefix = { QTN: 'QTN', CB: 'CB', PI: 'PI' }[doc_type] || 'DOC';
    const yr = new Date().getFullYear();
    return `${prefix}-${yr}-${String(count).padStart(3, '0')}`;
  }

  function createQuotation(indent_id, doc_type, pricedLines) {
    const indent = getIndent(indent_id);
    if (!indent) throw new Error('Unknown indent');
    const total = +pricedLines.reduce((s, l) => s + l.amount, 0).toFixed(2);
    const quotation = {
      id: uid('quo'), indent_id, party_id: indent.party_id, doc_type,
      doc_no: nextDocNo(doc_type), date: now(), lines: pricedLines, total,
      status: 'draft', created_at: now(), confirmed_at: null
    };
    db.quotations.push(quotation);
    indent.status = 'quoted';
    logActivity(indent.party_id, 'quotation', `${doc_type} ${quotation.doc_no} created — ₹${total}`);
    persist();

    // Cash Bill = money already changed hands -> confirm immediately.
    // Quotation / Proforma Invoice = still a proposal -> wait for explicit confirm.
    if (doc_type === 'CB') confirmQuotation(quotation.id);

    return quotation;
  }

  function listQuotations(filter = {}) {
    return db.quotations.filter(q => !filter.status || q.status === filter.status)
      .sort((a, b) => b.created_at.localeCompare(a.created_at));
  }
  function getQuotation(id) { return db.quotations.find(q => q.id === id) || null; }

  /** The loop-back: confirming a quotation deducts stock (existing Inventory
   *  stock-out concept) and marks the party Won (existing Lead concept). */
  function confirmQuotation(id) {
    const quotation = getQuotation(id);
    if (!quotation || quotation.status === 'confirmed') return quotation;
    quotation.lines.forEach(l => {
      stockMove(l.item_id, 'out', l.qty, { ref_type: 'sale', ref_id: quotation.id, party_id: quotation.party_id, notes: `${quotation.doc_type} ${quotation.doc_no}` });
    });
    quotation.status = 'confirmed';
    quotation.confirmed_at = now();
    const indent = getIndent(quotation.indent_id);
    if (indent) indent.status = 'confirmed';
    const party = getParty(quotation.party_id);
    if (party && party.type === 'lead') {
      updatePartyStatus(party.id, 'won', `Won via ${quotation.doc_type} ${quotation.doc_no}`);
    } else {
      logActivity(quotation.party_id, 'sale', `${quotation.doc_type} ${quotation.doc_no} confirmed — ₹${quotation.total}`);
    }
    persist();
    return quotation;
  }

  function rejectQuotation(id, note = '') {
    const quotation = getQuotation(id);
    if (!quotation) return;
    quotation.status = 'rejected';
    logActivity(quotation.party_id, 'quotation', note || `${quotation.doc_type} ${quotation.doc_no} rejected`);
    persist();
  }

  /* ---------- cloud sync ----------
     Small-team pattern: on every change, push each table's full contents
     to Supabase (upsert). On load and every 20s, pull all tables down and
     merge in anything from other devices. Simple, not clever — fine for a
     handful of users on a small dataset. */
  const TABLES = ['parties', 'items', 'indents', 'quotations', 'stock_ledger', 'activity'];
  const cloud = {
    enabled: false, url: null, key: null, syncing: false, lastError: null,

    async init(url, key) {
      this.url = url.replace(/\/$/, ''); this.key = key; this.enabled = true;
      localStorage.setItem('sse_cloud_cfg', JSON.stringify({ url: this.url, key }));
      await this.pullAll();     // bring down anything already on the server
      this.pushDirty();         // then push up anything only local (e.g. data added before connecting)
      setInterval(() => this.pullAll(), 20000);
    },

    tryAutoConnect() {
      const raw = localStorage.getItem('sse_cloud_cfg');
      if (!raw) return;
      try { const cfg = JSON.parse(raw); this.init(cfg.url, cfg.key); } catch (e) {}
    },

    headers() {
      // Supabase's newer sb_publishable_/sb_secret_ keys are not JWTs and
      // must go on the apikey header only — sending them as
      // "Authorization: Bearer sb_publishable_..." is rejected. (Legacy
      // eyJ... anon keys also work fine with just the apikey header, so
      // this is safe either way.)
      return { 'apikey': this.key, 'Content-Type': 'application/json' };
    },

    async pushTable(table) {
      if (!this.enabled) return;
      const rows = db[table];
      if (!rows.length) return;
      try {
        this.syncing = true;
        const res = await fetch(`${this.url}/rest/v1/${table}`, {
          method: 'POST',
          headers: Object.assign(this.headers(), { 'Prefer': 'resolution=merge-duplicates' }),
          body: JSON.stringify(rows)
        });
        this.lastError = res.ok ? null : await res.text();
      } catch (e) { this.lastError = e.message; }
      this.syncing = false;
      document.dispatchEvent(new CustomEvent('core:sync'));
    },

    pushDirty() { TABLES.forEach(t => this.pushTable(t)); },

    async pullAll() {
      if (!this.enabled) return;
      try {
        this.syncing = true;
        for (const table of TABLES) {
          const res = await fetch(`${this.url}/rest/v1/${table}?select=*`, { headers: this.headers() });
          if (!res.ok) { this.lastError = await res.text(); continue; }
          const remote = await res.json();
          mergeTable(table, remote);
        }
        this.lastError = null;
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        document.dispatchEvent(new CustomEvent('core:change'));
      } catch (e) { this.lastError = e.message; }
      this.syncing = false;
      document.dispatchEvent(new CustomEvent('core:sync'));
    }
  };

  /** Merge remote rows into local table — simple last-id-wins union.
      Good enough for a small team where two people rarely edit the exact
      same record in the same few seconds. */
  function mergeTable(table, remoteRows) {
    const local = db[table];
    const byId = new Map(local.map(r => [r.id, r]));
    remoteRows.forEach(r => byId.set(r.id, r));
    db[table] = Array.from(byId.values());
  }

  function enableCloudSync(url, key) { cloud.init(url, key); }
  function cloudStatus() { return { enabled: cloud.enabled, syncing: cloud.syncing, error: cloud.lastError }; }
  function tryAutoConnectCloud() { cloud.tryAutoConnect(); }

  /* ---------- dev helper: reset ---------- */
  function _resetAll() { db = emptyDB(); persist(); }

  return {
    // parties
    addParty, getParty, listParties, updatePartyStatus, convertLeadToClient, getPartyTimeline,
    PARTY_TYPES, PARTY_STATUS,
    // items
    addItem, getItem, listItems, updateItemPrice,
    // stock
    stockMove, lowStockItems,
    // indents
    createIndent, listIndents, getIndent, priceIndent,
    // quotations
    createQuotation, listQuotations, getQuotation, confirmQuotation, rejectQuotation,
    // cloud sync
    enableCloudSync, cloudStatus, tryAutoConnectCloud,
    // misc
    _resetAll, _db: () => db
  };
})();

const Quotation = (() => {

  let pendingIndentParty = null; // set by App.go('quotation', {newIndentFor}) from Leads

  function render(params = {}) {
    if (params.newIndentFor) pendingIndentParty = params.newIndentFor;

    const indents = Core.listIndents();
    const quotations = Core.listQuotations();

    main.innerHTML = `
      <div class="page-head">

          <div class="page-desc">Raise an indent, price it against Inventory, generate the document, confirm the sale.</div>

      </div>

        <div class="stat"><div class="stat-num">${indents.filter(i => i.status === 'requested').length}</div><div class="stat-label">Awaiting Pricing</div></div>
        <div class="stat"><div class="stat-num">${quotations.filter(q => q.status === 'draft').length}</div><div class="stat-label">Awaiting Confirmation</div></div>

        <div class="stat"><div class="stat-num">₹${quotations.filter(q => q.status === 'confirmed').reduce((s, q) => s + q.total, 0)}</div><div class="stat-label">Confirmed Value</div></div>
      </div>

      <div class="card">
        <div class="card-title">Indents</div>
        ${indents.length ? `
          <table>
            <thead><tr><th>Party</th><th>Items</th><th>Status</th><th>Raised</th><th></th></tr></thead>
            <tbody>
              ${indents.map(i => {
                const party = Core.getParty(i.party_id);
                return `
                  <tr>
                    <td><b>${esc(party ? party.name : '—')}</b></td>
                    <td>${i.lines.length} item(s)</td>
                    <td><span class="badge ${i.status}">${i.status}</span></td>
                    <td>${fmtDate(i.created_at)}</td>
                    <td style="text-align:right;">
                      ${i.status === 'requested' ? `<button class="btn sm amber price-btn" data-id="${i.id}">Price This</button>` : ''}
                      ${i.status === 'priced' ? `<button class="btn sm amber gen-btn" data-id="${i.id}">Generate Quotation</button>` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No indents yet. <b>Raise one from a lead's or client's page, or here.</b></div>`}
      </div>

      <div class="card">
        <div class="card-title">Documents</div>
        ${quotations.length ? `
          <table>
            <thead><tr><th>Doc No.</th><th>Party</th><th>Type</th><th>Total</th><th>Status</th><th></th></tr></thead>
            <tbody>
              ${quotations.map(q => {
                const party = Core.getParty(q.party_id);
                return `
                  <tr>
                    <td><b>${q.doc_no}</b></td>
                    <td>${esc(party ? party.name : '—')}</td>
                    <td>${q.doc_type}</td>
                    <td>₹${q.total}</td>
                    <td><span class="badge ${q.status}">${q.status}</span></td>
                    <td style="text-align:right;">
                      ${q.status === 'draft' ? `
                        <button class="btn sm amber confirm-btn" data-id="${q.id}">Confirm Sale</button>
                        <button class="btn sm danger reject-btn" data-id="${q.id}">Reject</button>
                      ` : ''}
                    </td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        ` : `<div class="empty">No quotations generated yet.</div>`}
      </div>
    `;

    document.getElementById('btn-new-indent').onclick = openIndentModal;
    document.querySelectorAll('.price-btn').forEach(b => b.onclick = () => openPricingModal(b.dataset.id));
    document.querySelectorAll('.gen-btn').forEach(b => b.onclick = () => openGenerateModal(b.dataset.id));
    document.querySelectorAll('.confirm-btn').forEach(b => b.onclick = () => {
      Core.confirmQuotation(b.dataset.id);
      toast('Sale confirmed — stock deducted, party updated');
      render();
    });

      Core.rejectQuotation(b.dataset.id);

      render();
    });

    if (pendingIndentParty) {
      const pid = pendingIndentParty;

      openIndentModal(pid);
    }
  }

  let indentLines = [];

  function openIndentModal(presetPartyId = null) {
    indentLines = [{ item_id: '', qty: 1 }];
    const parties = Core.listParties({ type: 'lead' }).concat(Core.listParties({ type: 'customer' }));

    if (!parties.length) { toast('Add a lead or client first'); return; }
    if (!items.length) { toast('Add an item in Inventory first'); return; }

    showModal('New Indent', `
      <div class="field"><label>Party</label>
        <select id="f-party">${parties.map(p => `<option value="${p.id}" ${p.id === presetPartyId ? 'selected' : ''}>${esc(p.name)} (${p.type})</option>`).join('')}</select>
      </div>
      <label>Items Requested</label>
      <div id="indent-lines"></div>
      <button class="btn ghost sm" id="add-line" style="margin-top:4px;">+ Add another item</button>
      <div class="field" style="margin-top:12px;"><label>Notes</label><input id="f-notes" placeholder="Optional"></div>
      <button class="btn amber" id="save-indent" style="width:100%; justify-content:center; margin-top:10px;">Raise Indent</button>
    `);

    const items_opts = items.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join('');

    function renderLines() {
      document.getElementById('indent-lines').innerHTML = indentLines.map((l, idx) => `
        <div class="field-row" style="margin-bottom:6px; align-items:flex-end;">
          <div class="field" style="margin-bottom:0;"><select class="line-item" data-idx="${idx}">${items_opts}</select></div>

        </div>
      `).join('');
      document.querySelectorAll('.line-item').forEach(s => s.value = indentLines[s.dataset.idx].item_id || s.options[0].value);
      document.querySelectorAll('.line-item').forEach(s => s.onchange = () => indentLines[s.dataset.idx].item_id = s.value);
      document.querySelectorAll('.line-qty').forEach(s => s.onchange = () => indentLines[s.dataset.idx].qty = Number(s.value));

    renderLines();

    document.getElementById('add-line').onclick = () => { indentLines.push({ item_id: '', qty: 1 }); renderLines(); };

    document.getElementById('save-indent').onclick = () => {
      const party_id = document.getElementById('f-party').value;
      const lines = indentLines.filter(l => l.item_id && l.qty > 0);
      if (!lines.length) { toast('Add at least one item'); return; }
      Core.createIndent(party_id, lines, document.getElementById('f-notes').value.trim());
      closeModal(); toast('Indent raised'); render();

  function openPricingModal(indent_id) {
    const priced = Core.priceIndent(indent_id);
    showModal('Pricing (pulled from Inventory)', `
      <table>
        <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
        <tbody>
          ${priced.map(l => `<tr><td>${esc(l.name)}</td><td>${l.qty}</td><td>₹${l.rate}</td><td>₹${l.amount}</td></tr>`).join('')}
        </tbody>
      </table>
      <div style="text-align:right; font-weight:700; margin-top:10px; font-size:14px;">
        Total: ₹${priced.reduce((s, l) => s + l.amount, 0).toFixed(2)}
      </div>
      <div class="hint">Prices pulled live from the Inventory item master. Update prices there if these look off.</div>
      <button class="btn amber" id="close-pricing" style="width:100%; justify-content:center; margin-top:12px;">Done — status set to Priced</button>
    `);
    document.getElementById('close-pricing').onclick = () => { closeModal(); render(); };
  }

  function openGenerateModal(indent_id) {
    const indent = Core.getIndent(indent_id);
    const priced = indent.lines.map(l => {
      const item = Core.getItem(l.item_id);
      const rate = item ? item.sell_price : 0;
      return { item_id: l.item_id, name: item ? item.name : '', qty: l.qty, rate, amount: +(rate * l.qty).toFixed(2) };
    });
    showModal('Generate Document', `
      <div class="field"><label>Document Type</label>
        <select id="f-doctype">
          <option value="QTN">Quotation (needs confirm later)</option>
          <option value="PI">Proforma Invoice (needs confirm later)</option>
          <option value="CB">Cash Bill (confirms + deducts stock immediately)</option>
        </select>
      </div>
      <div class="hint" style="margin-bottom:10px;">Total: ₹${priced.reduce((s, l) => s + l.amount, 0).toFixed(2)}</div>
      <button class="btn amber" id="gen-doc" style="width:100%; justify-content:center;">Generate</button>
    `);
    document.getElementById('gen-doc').onclick = () => {
      const doc_type = document.getElementById('f-doctype').value;
      const q = Core.createQuotation(indent_id, doc_type, priced);
      closeModal();
      toast(doc_type === 'CB' ? `${q.doc_no} confirmed — stock deducted` : `${q.doc_no} created — awaiting confirmation`);
      render();
    };
  }

  return { render };
})();

/* ===== app.js ===== */
/* =========================================================================
   APP SHELL — navigation between the three capabilities + shared UI helpers.
   Nothing business-logic-specific lives here; that's all in core.js and the
   three module files. This file just wires the sidebar to the views.
   ========================================================================= */

function esc(s) { return (s || '').toString().replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtDate(iso) { const d = new Date(iso); return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }); }

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

function showModal(title, bodyHtml) {
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.id = 'active-modal';
  bg.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3>${esc(title)}</h3><button class="modal-close" id="modal-close-btn">✕</button></div>
      <div>${bodyHtml}</div>
    </div>
  `;
  bg.onclick = (e) => { if (e.target === bg) closeModal(); };
  document.body.appendChild(bg);
  document.getElementById('modal-close-btn').onclick = closeModal;
}
function closeModal() { const m = document.getElementById('active-modal'); if (m) m.remove(); }

const App = (() => {
  const views = {
    dashboard: { label: 'Dashboard', icon: '◆', render: renderDashboard },
    leads: { label: 'Leads & Clients', icon: '①', render: (p) => Leads.render(p) },
    inventory: { label: 'Inventory', icon: '②', render: (p) => Inventory.render(p) },
    quotation: { label: 'Quotation', icon: '③', render: (p) => Quotation.render(p) },
  };
  let current = 'dashboard';

  function init() {
    document.getElementById('nav').innerHTML = Object.entries(views).map(([key, v]) => `
      <button class="nav-item" data-view="${key}"><span class="n-icon">${v.icon}</span> ${v.label}</button>
    `).join('');
    Object.keys(views).forEach(key => {
      document.querySelector(`[data-view="${key}"]`).onclick = () => go(key);
    });
    document.addEventListener('core:change', () => { if (current === 'dashboard') renderDashboard(); });
    document.addEventListener('core:sync', renderSyncStatus);
    document.getElementById('btn-settings').onclick = openSettingsModal;
    renderSyncStatus();
    Core.tryAutoConnectCloud();
    go('dashboard');
  }

  function renderSyncStatus() {
    const el = document.getElementById('sync-status');
    if (!el) return;
    const s = Core.cloudStatus();
    let dot = '#7f8ea3', label = 'Not connected';
    if (s.enabled && s.syncing) { dot = '#e8a53d'; label = 'Syncing…'; }
    else if (s.enabled && s.error) { dot = '#b0463c'; label = 'Sync error'; }
    else if (s.enabled) { dot = '#3f7d5c'; label = 'Synced'; }
    el.innerHTML = `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dot};margin-right:6px;"></span>${label}`;
    el.title = s.error || '';
  }

  function openSettingsModal() {
    const s = Core.cloudStatus();
    showModal('Cloud Sync Settings', `
      <div class="hint" style="margin-bottom:12px;">
        Paste your Supabase project URL and anon/public API key. Create a free project at
        <a href="https://supabase.com" target="_blank">supabase.com</a> and run the setup SQL first — see the README that came with this app.
      </div>
      <div class="field"><label>Supabase URL</label><input id="cfg-url" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Anon / Publishable Key</label><input id="cfg-key" placeholder="eyJ..."></div>
      <button class="btn amber" id="cfg-save" style="width:100%; justify-content:center; margin-top:6px;">Connect</button>
      <div class="hint" style="margin-top:10px;">Status: ${s.enabled ? (s.error ? 'Error — ' + esc(s.error) : 'Connected') : 'Not connected (working offline, this device only)'}</div>
    `);
    document.getElementById('cfg-save').onclick = () => {
      const url = document.getElementById('cfg-url').value.trim();
      const key = document.getElementById('cfg-key').value.trim();
      if (!url || !key) { toast('Both fields are required'); return; }
      Core.enableCloudSync(url, key);
      closeModal(); toast('Connecting to cloud…');
    };
  }

  function go(view, params = {}) {
    current = view;
    document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    views[view].render(params);
  }

  function renderDashboard() {
    const main = document.getElementById('main');
    const parties = Core._db().parties;
    const items = Core._db().items;
    const quotations = Core._db().quotations;
    const leads = parties.filter(p => p.type === 'lead' && p.status !== 'won' && p.status !== 'lost');
    const lowStock = Core.lowStockItems();
    const pendingConfirm = quotations.filter(q => q.status === 'draft');
    const confirmedValue = quotations.filter(q => q.status === 'confirmed').reduce((s, q) => s + q.total, 0);

    main.innerHTML = `
      <div class="page-head">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-desc">One system, one spine: Lead → Client → Indent → Pricing → Quotation → Stock-out / Won.</div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat"><div class="stat-num">${leads.length}</div><div class="stat-label">Open Leads</div></div>
        <div class="stat"><div class="stat-num">${items.length}</div><div class="stat-label">Items Tracked</div></div>
        <div class="stat"><div class="stat-num">${pendingConfirm.length}</div><div class="stat-label">Awaiting Confirmation</div></div>
        <div class="stat"><div class="stat-num">₹${confirmedValue}</div><div class="stat-label">Confirmed Sales Value</div></div>
      </div>

      <div class="card">
        <div class="card-title">Pipeline</div>
        <div class="pipeline">
          <span class="pipe-step">Lead (${parties.filter(p=>p.type==='lead').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Client (${parties.filter(p=>p.type==='customer').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Indent (${Core._db().indents.length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Priced (${Core._db().indents.filter(i=>i.status!=='requested').length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Quoted (${quotations.length})</span><span class="pipe-arrow">→</span>
          <span class="pipe-step">Confirmed (${quotations.filter(q=>q.status==='confirmed').length})</span>
        </div>
      </div>

      ${lowStock.length ? `
        <div class="card" style="border-color:#e6c9c5;">
          <div class="card-title" style="color:var(--red);">Low Stock</div>
          ${lowStock.map(i => `<div style="font-size:13px; padding:3px 0;">${esc(i.name)} — ${i.stock_qty} ${esc(i.unit)} left</div>`).join('')}
        </div>
      ` : ''}

      ${!parties.length ? `
        <div class="card">
          <div class="empty">Nothing here yet. <b>Start in Leads & Clients</b> to add your first lead, or <b>Inventory</b> to add items.</div>
        </div>
      ` : ''}
    `;
  }

  return { init, go };
})();

document.addEventListener('DOMContentLoaded', App.init);
  </script>
</body>
</html>
